Screen_EngineerRiskAssessment As screen:
    ContentLanguage: =""
    Fill: =Color.White
    LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    OnVisible: |-
        =ClearCollect(col_RAMSTake2General,
            {ID: 1, Question: "Do you have the correct PPE for the activity?", Answer: "N/A", Comments: ""},
            {ID: 2, Question: "Do you have the correct Risk Assessment?", Answer: "N/A", Comments: ""},
            {ID: 3, Question: "Do you have the correct Method Statement?", Answer: "N/A", Comments: ""},
            {ID: 4, Question: "Do you have the correct equipment to complete the activity?", Answer: "N/A", Comments: ""},
            {ID: 5, Question: "Is your equipment in-date calibration?", Answer: "N/A", Comments: ""}
        );
        ClearCollect(col_RAMSTake2Site,
            {ID: 1, Question: "Have you completed a site induction?", Answer: "N/A", Comments: ""},
            {ID: 2, Question: "Has the client informed you of the site emergency procedures?", Answer: "N/A", Comments: ""},
            {ID: 3, Question: "Has the client provided adequate welfare facilities?", Answer: "N/A", Comments: ""},
            {ID: 4, Question: "Has the client made you aware of the first aiders and first aid point?", Answer: "N/A", Comments: ""},
            {ID: 5, Question: "Has the client provided 110V or 240V power supply?", Answer: "N/A", Comments: ""}
        );
        ClearCollect(col_RAMSTake2Risks,
            {ID: 1, Risk: "Asbestos", Answer: "N/A", Comments: ""},
            {ID: 2, Risk: "Working at height (step ups, ladders, MEWPs)", Answer: "N/A", Comments: ""},
