        OnSelect: |-
            =Set(varTestMenu, Self.Selected);
            
            If(
                Self.Selected.MenuCategory = "Test Data",
                Set(varTestSubMenu, "Equipment")
            );
            
            Switch(
                Self.Selected.MenuCategory,
                
                "Temp Sealing",
            With(
                { wthTempSealing: ParseJSON(varActionRecord.TempSealingData) },
                ClearCollect(
                    col_TestTempSealing,
                    If(
                        IsBlank(wthTempSealing) || IsEmpty(wthTempSealing.Questions),
                        Table({ SortOrder: 0, Question: "No questions loaded", IsBespoke: false, ExpectedAnswer: "", Response: "", Complete: false }),
                        ForAll(
                            wthTempSealing.Questions As q,
                            {
                                SortOrder:      Value(q.SortOrder),
                                Question:       Text(q.Question),
                                IsBespoke:      Boolean(q.IsBespoke),
                                ExpectedAnswer: Text(q.ExpectedAnswer),
                                Response:       Text(q.Response),
                                Complete:       Boolean(q.Complete)
                            }
                        )
                    )
                )
            ),
                "Test Data",
                With(
                    { wthTestRun: LookUp(col_TestRun, TestNo = Round(Value(Self.Selected.Sort) - 3, 1)) },
            
                    Set(varSelectedTestNo,    Value(wthTestRun.TestNo));
                    Set(varSelectedTestRunID, wthTestRun.TestID);
                    Set(varTestRunRecord, LookUp(BESA_TestRuns, BESA_TestRun = varSelectedTestRunID));
            
                    With(
                        { wthTestRun: LookUp(col_TestRun, TestID = varSelectedTestRunID) },
            
                        ClearCollect(
                            col_PermPreAtmosphericConditions,
                            If(
                                !IsBlank(wthTestRun.PreTestData) &&
                                !IsEmpty(wthTestRun.PreTestData.InternalTemperatures),
                                ForAll(
                                    wthTestRun.PreTestData.InternalTemperatures As rec,
                                    {
                                        RowNumber:               Value(rec.RowNumber),
                                        Location:                Text(rec.Location),
                                        Temperature:             Value(rec.Temperature),
                                        'Corrected Temperature': Value(rec.CorrectedTemperature),
                                        Complete:                rec.Complete
                                    }
                                ),
                                Table()
                            )
                        );
            
                        ClearCollect(
                            col_PermPostAtmosphericConditions,
                            If(
                                !IsBlank(wthTestRun.PostTestData) &&
                                !IsEmpty(wthTestRun.PostTestData.InternalTemperatures),
                                ForAll(
                                    wthTestRun.PostTestData.InternalTemperatures As rec,
                                    {
                                        RowNumber:               Value(rec.RowNumber),
                                        Location:                Text(rec.Location),
                                        Temperature:             Value(rec.Temperature),
                                        'Corrected Temperature': Value(rec.CorrectedTemperature),
                                        Complete:                rec.Complete
                                    }
                                ),
                                Table()
                            )
                        )
                    );
            
                    //If(CountRows(col_EquipmentLocations) = 0,
                        ClearCollect(
                            col_EquipmentLocations,
                            If(
                                CountRows(Table(wthTestRun.EquipmentLocations)) = 0,
                                [
                                    {
                                        Location:       "",
                                        SetNumber:      "",
                                        TubeIdentifier: 0,
                                        Engineer:       Defaults(col_StaffMembers),
                                        RowNumber:      1
                                    }
                                ],
                                ForAll(
                                    Table(wthTestRun.EquipmentLocations) As item,
                                    {
                                        Location:       Text(item.Location),
                                        SetNumber:      Text(item.SetNumber),
                                        TubeIdentifier: Value(item.TubeIdentifier),
                                        Engineer:       item.Engineer,
                                        RowNumber:      Value(item.RowNumber)
                                    }
                                )
                            )
                        
                    );
            
                    //If(CountRows(col_EquipmentLocationsItems) = 0,
                        ClearCollect(
                            col_EquipmentLocationsItems,
                            If(
                                CountRows(Table(wthTestRun.EquipmentItems)) = 0,
                                [],
                                ForAll(
                                    Table(wthTestRun.EquipmentItems) As item,
                                    {
                                        SetNumber:       Text(item.SetNumber),
                                        SetLocationRef:  Value(item.SetLocationRef),
                                        EquipmentType:   Text(item.EquipmentType),
                                        SerialNumber:    Text(item.SerialNumber),
                                        Selected:        Boolean(item.Selected),
                                        ManometerType:   Text(item.ManometerType),
                                        FloorNo:         Value(item.FloorNo),
                                        LinkedFan:       item.LinkedFan,
                                        LinkedFan_Range: item.LinkedFan_Range
                                    }
                                )
                            )
                        );
                        ClearCollect(col_EquipmentLocationsItems_Display, col_EquipmentLocationsItems);
            
                    With(
                        { wthTempSealing: ParseJSON(varActionRecord.TempSealingData) },
            
                        ClearCollect(
                            col_TestTempSealing,
                            If(
                                IsBlank(wthTempSealing) || IsEmpty(wthTempSealing.Questions),
                                Table(
                                    {
                                        SortOrder:      0,
                                        Question:       "",
                                        IsBespoke:      false,
                                        ExpectedAnswer: "",
