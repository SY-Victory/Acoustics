                    OnSelect: |
                        =
                            Patch(
                                BESA_Tests,
                                LookUp(BESA_Tests, BESA_Test = varActionRecord.BESA_Test),
                                {
                                    'Test Info': JSON({
                                        TestType:       dropDomCom_31.Selected.Value,
                                        DomCom:         dropDomCom_16.Selected.Value,
                                        TestStandard:   dropDomCom_24.Selected.Value,
                                        StandardKey:    dropDomCom_24.Selected.StandardKey,
                                        YearBuilt:      Value(inputEnvelopeFloorArea_93.Text),
                                        PriCooling:     dropDomCom_27.Selected.Value,
                                        PriHeating:     dropDomCom_28.Selected.Value,
                                        PriVentilation: dropDomCom_29.Selected.Value,
                                        MasticSeals:    dropDomCom_30.Selected.Value,
                                        BuildingType:   dropDomCom_32.Selected.Value,
                                        Construction:   dropDomCom_33.Selected.Value,
                                        WarmRoof:       dropDomCom_34.Selected.Value
                                    }),
                                    'Section Status': JSON({
                                        TestDetails:  "Complete",
                                        Envelope:     Text(varSectionStatus.Envelope),
                                        ReportExport: Text(varSectionStatus.ReportExport)
                                    })
                                }
                            );
                        
                        // Refresh varActionRecord so subsequent reads get the patched values
                        Set(varActionRecord, LookUp(BESA_Tests, BESA_Test = varActionRecord.BESA_Test));
                        
                        // Update in-memory parsed variables
                        Set(varSectionStatus, ParseJSON(varActionRecord.'Section Status'));
                        Set(varTestInfo,      ParseJSON(varActionRecord.'Test Info'));
                        
                        // =============================================
                        // STEP 2 — Update col_PermTestMenu status in memory
                        // =============================================
                        UpdateIf(
                            col_PermTestMenu,
                            MenuCategory = "Test Details",
                            {
                                Status:       "Complete",
                                DisplayLabel: "Test Details ✓"
                            }
                        );
                        
                        // =============================================
                        // STEP 3 — Build active TempSealing question set
                        //           based on DomCom + StandardKey
                        // =============================================
                        ClearCollect(
                            col_TempSealQuestions_Active,
                            Filter(
                                col_TempSealQuestions,
                                DomCom       = dropDomCom_16.Selected.Value &&
                                TestStandard = dropDomCom_24.Selected.StandardKey
                            )
                        );
                        
                        // =============================================
                        // STEP 4 — Update TempSealingData on Pending runs
                        // =============================================
                        
                        // 4a — Pre-build the TempSealingData JSON string once
                        Set(
                            varTempSealingJSON,
                            JSON(
                                {
                                    TempSealingStatus: "Pending",
                                    Questions: ForAll(
                                        col_TempSealQuestions_Active As q,
                                        {
                                            SortOrder:      q.SortOrder,
                                            Question:       q.Question,
                                            IsBespoke:      q.IsBespoke,
                                            ExpectedAnswer: q.ExpectedAnswer,
                                            Response:       "",
                                            Complete:       false
                                        }
                                    )
                                }
                            )
                        );
                        
                        // 4b — Update col_TestRun in memory for all non-Complete runs
                        /*UpdateIf(
                            col_TestRun,
                            IsBlank(Text(TempSealingData.TempSealingStatus)) || 
                            Text(TempSealingData.TempSealingStatus) = "" ||
                            Text(TempSealingData.TempSealingStatus) <> "Complete",
                            {
                                TempSealingData: ParseJSON(varTempSealingJSON)
                            }
                        );
                        
                        // 4c — Push the full col_TestRun collection to BESA_TestRuns in one Patch call
                        Patch(
                            BESA_TestRuns,
                            ForAll(
                                col_TestRun As run,
                                {
                                    BESA_TestRun:     run.TestID,
                                    TempSealingData:  JSON(run.TempSealingData)
                                }
                            )
                        );*/
                        
                        If(
                            IsBlank(varActionRecord.TempSealingData) || varActionRecord.TempSealingData = "",
                            Patch(
                                BESA_Tests,
                                LookUp(BESA_Tests, BESA_Test = varActionRecord.BESA_Test),
                                { TempSealingData: varTempSealingJSON }
                            )
                        );
                        
                        Set(varActionRecord, LookUp(BESA_Tests, BESA_Test = varActionRecord.BESA_Test));
