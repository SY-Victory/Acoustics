                                                PressurePointFanFlow,        Value(Blank()),
                                                SetNumber,                   1,
                                                SortOrder,                   Value
                                            ),
                                            CalibDetails,             LookUp(col_Manometer, GaugeReference = SerialNumber),
                                            ReadingActiveCalculation, true
                                        ),
                                        Inputs
                                    )
                                );
                                
                                ClearCollect(col_PressureReadings_Display, col_PressureReadings);
                                
                                ClearCollect(
                                    col_PressureReadings_Header,
                                    AddColumns(
                                        ForAll(
                                            Sequence(Value(inputPressurePoints.Text)),//(varMeta_TargetPoints)),
                                            {
                                                HeaderPointTarget: Blank(),
                                                Value:             Value,
                                                SetNumber:         1,
                                                SortOrder:         Value
                                            }
                                        ),
                                        AvgBuildPa,        Value(""),
                                        TotalFlow,         Value(""),
                                        LnP,               Value(""),
                                        LnF,               Value(""),
                                        LnPxLnF,           Value(""),
                                        LnP2,              Value(""),
                                        LnF2,              Value(""),
                                        ActiveCalculation, true
                                    )
                                );
                                
                                Set(varDp0StartPos, Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PreTestData.AvgPositiveDp)));
                                Set(varDp0StartNeg, Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PreTestData.AvgNegativeDp)));
                                Set(varDp0EndPos,   Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PostTestData.AvgPositiveDp)));
                                Set(varDp0EndNeg,   Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PostTestData.AvgNegativeDp)));
                                
                                With(
                                    {
                                        wthBaroCorPRE:            IfError(Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PreTestData.CorrectedBarometricPressure)), 0),
                                        wthBaroCorPOST:           IfError(
                                                                      Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PostTestData.CorrectedBarometricPressure)),
                                                                      IfError(Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PreTestData.CorrectedBarometricPressure)), 0)
                                                                  ),
                                        wthBarometer:             varSelectedBarometerLU,
                                        wthCorrectedExternalPre:  IfError(Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PreTestData.CorrectedExternalTemperature)), 0),
                                        wthCorrectedExternalPost: IfError(
                                                                      Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PostTestData.CorrectedExternalTemperature)),
                                                                      IfError(Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PreTestData.CorrectedExternalTemperature)), 0)
                                                                  )
                                    },
                                    With(
                                        {
                                            wthBaroCorAvg:  Value(Average(wthBaroCorPOST,          wthBaroCorPRE)),
                                            wthExternalAvg: Value(Average(wthCorrectedExternalPost, wthCorrectedExternalPre))
                                        },
                                        If(
                                            Or(wthBaroCorAvg < wthBarometer.Lower, wthBaroCorAvg > wthBarometer.Upper),
                                            Set(varExternalDensity, "Warning"),
                                            Set(
                                                varExternalDensityValue,
                                                IfError(
                                                    If(
                                                        wthExternalAvg = -273.15,
                                                        0,
                                                        (
                                                            (wthBaroCorAvg * 100) -
                                                            (
                                                                0.37802 * varRelativeHumidity *
                                                                Exp(
                                                                    59.484085 -
                                                                    (6790.4985 / (wthExternalAvg + 273.15)) -
                                                                    5.02802 * Ln(wthExternalAvg + 273.15)
                                                                )
                                                            )
                                                        ) / (287.055 * (wthExternalAvg + 273.15))
                                                    ),
                                                    0
                                                )
                                            )
                                        )
                                    )
                                );
                                
                                With(
                                    {
                                        wthBaroCorPRE:               IfError(Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PreTestData.CorrectedBarometricPressure)), 0),
                                        wthBaroCorPOST:              IfError(
                                                                         Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PostTestData.CorrectedBarometricPressure)),
                                                                         IfError(Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PreTestData.CorrectedBarometricPressure)), 0)
                                                                     ),
                                        wthBarometer:                varSelectedBarometerLU,
                                        wthCorrectedAvgInternalPRE:  IfError(Value(Average(col_PermPreAtmosphericConditions,  'Corrected Temperature')), 0),
                                        wthCorrectedAvgInternalPOST: IfError(
                                                                         Value(Average(col_PermPostAtmosphericConditions, 'Corrected Temperature')),
                                                                         IfError(Value(Average(col_PermPreAtmosphericConditions, 'Corrected Temperature')), 0)
                                                                     )
                                    },
                                    With(
                                        {
                                            wthBaroCorAvg:           Value(Average(wthBaroCorPOST,              wthBaroCorPRE)),
                                            wthCorrectedAvgInternal: Value(Average(wthCorrectedAvgInternalPOST, wthCorrectedAvgInternalPRE))
                                        },
                                        If(
                                            Or(wthBaroCorAvg < wthBarometer.Lower, wthBaroCorAvg > wthBarometer.Upper),
                                            Set(varInternalDensity, "Warning"),
                                            Set(
                                                varInternalDensityValue,
                                                IfError(
                                                    If(
                                                        wthCorrectedAvgInternal = -273.15,
                                                        0,
                                                        (
                                                            (wthBaroCorAvg * 100) -
                                                            (
                                                                0.37802 * varRelativeHumidity *
                                                                Exp(
                                                                    59.484085 -
                                                                    (6790.4985 / (wthCorrectedAvgInternal + 273.15)) -
                                                                    5.02802 * Ln(wthCorrectedAvgInternal + 273.15)
                                                                )
                                                            )
                                                        ) / (287.055 * (wthCorrectedAvgInternal + 273.15))
                                                    ),
                                                    0
                                                )
                                            )
                                        )
                                    )
                                );
                                
                                Set(varEnvelopeArea, varActionRecord.'Envelope LookUp'.'Floor Area');
