                        =// ===== MARK TEST DETAILS COMPLETE =====
                        With(
                            {
                                // Get current Section Status
                                wthCurrentSectionStatus: ParseJSON(LookUp(BESA_Tests, BESA_Test = varActionRecord.BESA_Test).'Section Status')
                            },
                            
                                Patch(
                                    BESA_Tests,
                                    ShowColumns(varActionRecord, BESA_Test),
                                    {
                                        'Section Status': JSON(
                                            {
                                                TestDetails: wthCurrentSectionStatus.TestDetails,
                                                Envelope: "Complete",
                                                ReportExport: wthCurrentSectionStatus.ReportExport
                                            }
                                        )
                                    }
                                );
                        
                            // 2️⃣ Reload Section Status variable
                            Set(varSectionStatus, ParseJSON(varActionRecord.'Section Status'));
                        
                            // 3️⃣ Rebuild Perm Test Menu
                            ClearCollect(
                                col_PermTestMenu,
                                // Static top items
                                {
                                    MenuLabel: "Test Details",
                                    MenuCategory: "Test Details",
                                    Status: Text(varSectionStatus.TestDetails),
                                    Sort: 1,
                                    DisplayLabel: "Test Details " & If(varSectionStatus.TestDetails = "Complete", "✓", "⚠️")
                                },
                                {
                                    MenuLabel: "Envelope",
                                    MenuCategory: "Envelope",
                                    Status: Text(varSectionStatus.Envelope),
                                    Sort: 2,
                                    DisplayLabel: "Envelope " & If(varSectionStatus.Envelope = "Complete", "✓", "⚠️")
                                },
                                    {
                                        MenuLabel:    "Temp Sealing",
                                        MenuCategory: "Temp Sealing",
                                        Sort: 3,
                                        Status: Text(varSectionStatus.TempSealing),
                                        DisplayLabel:  "Temp Sealing " & If(Text(ParseJSON(varActionRecord.TempSealingData).TempSealingStatus) =
                          "Complete", "✓", "⚠️")
                                        //,MenuIcon: Icon.CheckBadge  
                                    }
                            );
                        
                            // Add dynamic Test Run items
                            ForAll(
                                col_TestRun As run,
                                Collect(
                                    col_PermTestMenu,
                                    {
                                        MenuLabel: "Test Data - Run " & Text(run.TestNo),
                                        MenuCategory: "Test Data",
                                        Status: Text(run.TestStatus),
                                        Sort: 3 + Value(run.TestNo),
                                        DisplayLabel: "Test Data - Run " & Text(run.TestNo) & " " & If(run.TestStatus = "Complete", "✓", "⚠️")
                                    }
                                )
                            );
                        
                            // Add final Report & Export item
                            Collect(
                                col_PermTestMenu,
                                {
                                    MenuLabel: "Report & Export",
                                    MenuCategory: "Report & Export",
                                    Status: Text(varSectionStatus.ReportExport),
                                    Sort: 999,
                                    DisplayLabel: "Report & Export " & If(varSectionStatus.ReportExport = "Complete", "✓", "⚠️")
                                }
                            );
                        
                            // 4️⃣ Notify user
                            Notify("Envelope Details marked complete", NotificationType.Success)
                        );
                        
                        Set(varEnvelopeArea, Value(inputEnvelopeFloorArea_96.Text));
                        
                        
                        
