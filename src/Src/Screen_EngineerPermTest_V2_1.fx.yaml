                                        EngineerLocation: comboOrderFilterReference_17.Selected.Value
                                    },
                                    cVar_ReadingOffset: 1
                                });
                                
                                ClearCollect(
                                    col_PressureReadings,
                                    Ungroup(
                                        AddColumns(
                                            ShowColumns(
                                                Filter(
