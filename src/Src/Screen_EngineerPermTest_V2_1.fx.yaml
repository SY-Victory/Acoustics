                                                            Value(Self.Text) * ThisItem.CalibDetails.Scaler + ThisItem.CalibDetails.Const,
                                                            "0.0"
                                                        )
                                                    ) - Average(Value(inputEnvelopeFloorArea_116.Text), Value(inputEnvelopeFloorArea_118.Text))
                                                ),
                                                Blank()
                                            )
                                        }
                                    ),
                                
                                    "Fan",
                                    Patch(
                                        col_PressureReadings,
                                        LookUp(
                                            col_PressureReadings,
                                            Value        = ThisItem.Value &&
                                            SerialNumber = ThisItem.SerialNumber &&
                                            SetNumber    = ThisItem.SetNumber
                                        ),
                                        {
                                            PressurePointValue: Value(Self.Text),
                                            PressurePointCorrectedValue: IfError(
                                                With(
                                                    {
                                                        wfx_CorrectedPa: Value(inputEnvelopeFloorArea_114.Text) * ThisItem.CalibDetails.Scaler + ThisItem.CalibDetails.Const,
                                                        wfx_HighPressureSide:
                                                            (cVar_TestMetaData.EngineerLocation = "Inside"  && cVar_TestMetaData.PressDepress = "Pressurisation") ||
                                                            (cVar_TestMetaData.EngineerLocation = "Outside" && cVar_TestMetaData.PressDepress = "Depressurisation")
                                                    },
                                                    If(
                                                        IsBlank(inputEnvelopeFloorArea_114.Text), Blank(),
                                                        wfx_CorrectedPa - If(wfx_HighPressureSide, Abs(Value(inputEnvelopeFloorArea_119.Text)), 0)
                                                    )
                                                ),
                                                Blank()
                                            ),
                                            PressurePointFanFlow: IfError(
                                                With(
                                                    {
                                                        wfx_CorrPa: Value(inputEnvelopeFloorArea_114.Text) 
                                                            * ThisItem.CalibDetails.Scaler 
                                                            + ThisItem.CalibDetails.Const
                                                            - If((cVar_TestMetaData.EngineerLocation = "Inside"  && cVar_TestMetaData.PressDepress = "Pressurisation") ||
                                                            (cVar_TestMetaData.EngineerLocation = "Outside" && cVar_TestMetaData.PressDepress = "Depressurisation"), 
                                                                Abs(Value(inputEnvelopeFloorArea_119.Text)), 0)
                                                    },
                                                    If(
                                                        IsBlank(inputEnvelopeFloorArea_114.Text) || wfx_CorrPa <= 0, 
                                                        Blank(),
                                                        dropDomCom_40.Selected.C * wfx_CorrPa ^ dropDomCom_40.Selected.n
                                                    )
                                                ),
                                                Blank()
                                            )
                                        }
                                    )
                                );
                                
                                If(
                                    !IsBlank(
                                        LookUp(
                                            col_PressureReadings,
                                            Value         = ThisItem.Value &&
                                            SetNumber     = ThisItem.SetNumber &&
                                            ManometerType = "Fan",
                                            PressurePointFanFlow
                                        )
                                    ) &&
                                    !IsBlank(
                                        LookUp(
                                            col_PressureReadings,
                                            Value         = ThisItem.Value &&
                                            SetNumber     = ThisItem.SetNumber &&
                                            ManometerType = "Build",
                                            PressurePointCorrectedValue
                                        )
                                    ),
                                
                                    With(
                                        {
                                            wfx_TotalFlow: IfError(
                                                Average(
                                                    Filter(
                                                        col_PressureReadings,
                                                        Value         = ThisItem.Value &&
                                                        SetNumber     = ThisItem.SetNumber &&
                                                        ManometerType = "Fan" &&
                                                        !IsBlank(PressurePointFanFlow)
                                                    ),
                                                    PressurePointFanFlow
                                                ),
                                                Blank()
                                            ),
                                            wfx_Density: If(
                                                cVar_TestMetaData.PressDepress = "Pressurisation",
                                                varInternalDensityValue,
                                                varExternalDensityValue
                                            )
                                        },
                                
                                        With(
                                            {
                                                wthValueEnvelope95: IfError(
                                                    If(
                                                        ThisItem.ReadingActiveCalculation = false || IsBlank(wfx_TotalFlow) || wfx_TotalFlow = 0,
                                                        Blank(),
                                                        wfx_TotalFlow * 3600 * 1.2 / wfx_Density
                                                    ),
                                                    Blank()
                                                )
                                            },
                                
                                            Patch(
                                                col_PressureReadings_Header,
                                                LookUp(col_PressureReadings_Header, SetNumber = ThisItem.SetNumber && Value = ThisItem.Value),
                                                With(
                                                    {
                                                        wfx_AvgBuild: IfError(
                                                            Value(
                                                                Average(
                                                                    Filter(
                                                                        col_PressureReadings,
                                                                        ManometerType = "Build" &&
                                                                        SetNumber     = ThisItem.SetNumber &&
                                                                        Value         = ThisItem.Value &&
                                                                        !IsBlank(PressurePointCorrectedValue)
                                                                    ),
                                                                    PressurePointCorrectedValue
                                                                )
                                                            ),
                                                            Blank()
                                                        ),
                                                        wfx_TotalFlow: Value(wthValueEnvelope95)
                                                    },
                                                    With(
                                                        {
                                                            wfx_LnP: IfError(If(wfx_AvgBuild <> 0, Ln(Abs(wfx_AvgBuild)), Blank()), Blank()),
                                                            wfx_LnF: IfError(If(wfx_TotalFlow > 0, Ln(wfx_TotalFlow),      Blank()), Blank())
                                                        },
                                                        {
                                                            AvgBuildPa: wfx_AvgBuild,
                                                            TotalFlow:  wfx_TotalFlow,
                                                            LnP:        wfx_LnP,
                                                            LnF:        wfx_LnF,
                                                            LnPxLnF:    IfError(wfx_LnP * wfx_LnF, Blank()),
                                                            LnP2:       IfError(wfx_LnP ^ 2,        Blank()),
                                                            LnF2:       IfError(wfx_LnF ^ 2,        Blank())
                                                        }
                                                    )
                                                )
                                            )
                                        )
                                    );
                                
                                    Set(
                                        ctxRegression,
                                        With(
                                            {
                                                wfx_N:     CountRows(Filter(col_PressureReadings_Header, !IsBlank(LnP) && !IsBlank(LnF) && ActiveCalculation = true)),
                                                wfx_SumX:  Sum(Filter(col_PressureReadings_Header, !IsBlank(LnP)     && ActiveCalculation = true), LnP),
                                                wfx_SumY:  Sum(Filter(col_PressureReadings_Header, !IsBlank(LnF)     && ActiveCalculation = true), LnF),
                                                wfx_SumXY: Sum(Filter(col_PressureReadings_Header, !IsBlank(LnPxLnF) && ActiveCalculation = true), LnPxLnF),
                                                wfx_SumX2: Sum(Filter(col_PressureReadings_Header, !IsBlank(LnP2)    && ActiveCalculation = true), LnP2),
                                                wfx_SumY2: Sum(Filter(col_PressureReadings_Header, !IsBlank(LnF2)    && ActiveCalculation = true), LnF2)
                                            },
                                            With(
                                                {
                                                    wfx_D: wfx_N * wfx_SumX2 - wfx_SumX ^ 2,
                                                    wfx_M: wfx_N * wfx_SumXY - wfx_SumX * wfx_SumY
                                                },
                                                With(
                                                    {
                                                        wfx_n: If(wfx_N < 2 || wfx_D = 0, 0.65, wfx_M / wfx_D)
                                                    },
                                                    {
                                                        Exponent:   wfx_n,
                                                        Cenv:       If(wfx_N < 2, Blank(), Exp((wfx_SumY - wfx_n * wfx_SumX) / wfx_N)),
                                                        R2:         If(wfx_N < 2, Blank(), IfError(wfx_M ^ 2 / (wfx_D * (wfx_N * wfx_SumY2 - wfx_SumY ^ 2)), Blank())),
                                                        PointCount: wfx_N
                                                    }
                                                )
                                            )
                                        )
                                    );
                                
                                    Set(
                                        varTestRunResults,
                                        With(
                                            {
                                                wfx_Density: If(
                                                    cVar_TestMetaData.PressDepress = "Pressurisation",
                                                    varInternalDensityValue,
                                                    varExternalDensityValue
                                                ),
                                                wfx_StdDens: 1.1988
                                            },
                                            With(
                                                {
                                                    wfx_CL: IfError(
                                                        ctxRegression.Cenv * (wfx_Density / wfx_StdDens) ^ (1 - ctxRegression.Exponent),
                                                        Blank()
                                                    )
                                                },
                                                With(
                                                    {
                                                        wfx_Q50: IfError(wfx_CL * 50 ^ ctxRegression.Exponent, Blank())
                                                    },
                                                    {
                                                        CL:   wfx_CL,
                                                        Q50:  wfx_Q50,
                                                        ELA:  IfError(wfx_Q50 / (0.788 * Sqrt(50) * 3600), Blank()),
                                                        AP50: IfError(wfx_Q50 / varEnvelopeArea, Blank()),
                                                        R2:   ctxRegression.R2,
                                                        Cenv: ctxRegression.Cenv,
                                                        Exp:  ctxRegression.Exponent
                                                    }
                                                )
                                            )
                                        )
                                    );
                                
                                    Set(varComputeReset, true);
                                    Set(varComputeReset, false);
                                
                                    Set(
                                        ctxDeviations,
                                        With(
                                            {
                                                wfx_Valid: Filter(col_PressureReadings_Header, !IsBlank(AvgBuildPa), ActiveCalculation = true)
                                            },
                                            With(
                                                {
                                                    wfx_Count:          CountRows(wfx_Valid),
                                                    wfx_MaxP:           Max(wfx_Valid, Abs(AvgBuildPa)),
                                                    wfx_MinP:           Min(wfx_Valid, Abs(AvgBuildPa)),
                                                    wfx_Sorted:         Sort(wfx_Valid, Abs(AvgBuildPa), SortOrder.Ascending),
                                                    wfx_StaticStartPos: varDp0StartPos,
                                                    wfx_StaticStartNeg: varDp0StartNeg,
                                                    wfx_StaticEndPos:   varDp0EndPos,
                                                    wfx_StaticEndNeg:   varDp0EndNeg,
                                                    wfx_MaxPLimit:      If(Text(varTestInfo.TestStandard) = "CIBSE TM23", 100, 100),
                                                    wfx_IsZone:         Text(varTestInfo.BuildingType) = "Zone"
                                                },
                                                With(
                                                    {
                                                        wfx_WorstStatic: Max(
                                                            Abs(wfx_StaticStartPos),
                                                            Abs(wfx_StaticStartNeg),
                                                            Abs(wfx_StaticEndPos),
                                                            Abs(wfx_StaticEndNeg)
                                                        ),
                                                        wfx_MaxGap: If(
                                                            wfx_Count < 2, 0,
                                                            IfError(
                                                                Max(
                                                                    ForAll(
                                                                        Sequence(wfx_Count - 1) As seq,
                                                                        Abs(Index(wfx_Sorted, seq.Value + 1).AvgBuildPa)
                                                                        - Abs(Index(wfx_Sorted, seq.Value).AvgBuildPa)
                                                                    ),
                                                                    Value
                                                                ),
                                                                0
                                                            )
                                                        )
                                                    },
                                                    With(
                                                        {
                                                            wfx_MinPThreshold: If(wfx_WorstStatic > 2, 5 * wfx_WorstStatic, 10)
                                                        },
                                                        {
                                                            ErrorR2:             !IsBlank(ctxRegression.R2) && ctxRegression.R2 < 0.98,
                                                            ErrorN:              !IsBlank(ctxRegression.Exponent) && (ctxRegression.Exponent < 0.5 || ctxRegression.Exponent > 1),
                                                            ErrorGap:            wfx_MaxGap > 10,
                                                            ErrorRange:          wfx_Count > 1 && Round(wfx_MaxP - wfx_MinP, 1) <= 30,
                                                            Error50Pa:           wfx_Count > 0 && wfx_MaxP < 50,
                                                            Error100Pa:          wfx_Count > 0 && wfx_MaxP > wfx_MaxPLimit,
                                                            ErrorMinPressure:    wfx_Count > 0 && wfx_MinP < wfx_MinPThreshold,
                                                            ErrorNumberDataPoints: wfx_Count >= 1 && wfx_Count < 7 && wfx_MaxP > 35,
                                                            ErrorStaticInitial:  (!IsBlank(wfx_StaticStartPos) && wfx_StaticStartPos > 5) || (!IsBlank(wfx_StaticStartNeg) && wfx_StaticStartNeg < -5),
                                                            ErrorStaticFinal:    (!IsBlank(wfx_StaticEndPos) && wfx_StaticEndPos > 5) || (!IsBlank(wfx_StaticEndNeg) && wfx_StaticEndNeg < -5),
                                                            ErrorPressureVariance: false,
                                                            ErrorFanOffReading:  false,
                                                            ErrorHighBuild:      false,
                                                            //ErrorTempSeal:       false,
                                                            ErrorZone:           wfx_IsZone,
                                                            PointCount:          wfx_Count,
                                                            MaxP:                wfx_MaxP,
                                                            MinP:                wfx_MinP,
                                                            MaxGap:              wfx_MaxGap,
                                                            MinPThreshold:       wfx_MinPThreshold,
                                                            MaxPThreshold:       wfx_MaxPLimit
                                                        }
                                                    )
                                                )
                                            )
                                        )
                                    )
                                );
