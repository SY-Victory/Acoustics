                            ButtonCanvas12_8 As Button:
                                AcceptsFocus: =true
                                AccessibleLabel: =""
                                Align: =""
                                Appearance: ="Primary"
                                BasePaletteColor: =
                                BorderColor: =
                                BorderStyle: =""
                                ContentLanguage: =""
                                DisplayMode: |-
                                    =If(
                                        IsBlank(TaskNameInput_80.Text) || TaskNameInput_80.Text = "" ||
                                        IsBlank(TaskNameInput_81.Text) || TaskNameInput_81.Text = "" ||
                                        CountRows(Filter(col_PermPostAtmosphericConditions, Complete = true)) <> CountRows(col_PermPostAtmosphericConditions),
                                        DisplayMode.Disabled,
                                        DisplayMode.Edit
                                    )
                                Font: =""
                                FontColor: =
                                FontItalic: =false
                                FontSize: =0
                                FontStrikethrough: =false
                                FontUnderline: =false
                                FontWeight: =""
                                Height: =33
                                Icon: ="Save"
                                IconRotation: =0
                                IconStyle: ="Outline"
                                Layout: ="Icon before"
                                OnSelect: |-
                                    =// ===== SAVE POST-TEST DATA FOR SELECTED TESTRUN =====
                                    With(
                                        {
                                            // 1️⃣ Precompute fan pressures for Post-Test
                                            wfx_data: Filter(
                                                AddColumns(
                                                    col_FanOffPressuresPost, 
                                                    CorrectedInput1,
                                                    Value(RawInput) * CalibScaler + CalibConst
                                                ),
                                                !IsBlank(RawInput)
                                            ),
                                            wfx_Positive: Filter(
                                                AddColumns(
                                                    col_FanOffPressuresPost, 
                                                    CorrectedInput1,
                                                    Value(RawInput) * CalibScaler + CalibConst
                                                ),
                                                !IsBlank(RawInput) && (Value(RawInput) * CalibScaler + CalibConst) > 0
                                            ),
                                            wfx_Negative: Filter(
                                                AddColumns(
                                                    col_FanOffPressuresPost, 
                                                    CorrectedInput1,
                                                    Value(RawInput) * CalibScaler + CalibConst
                                                ),
                                                !IsBlank(RawInput) && (Value(RawInput) * CalibScaler + CalibConst) < 0
                                            )
                                        },
                                    
                                        // 2️⃣ Patch only the selected TestRun
                                        Set(
                                            varTestRunRecord,
                                            Patch(
                                                BESA_TestRuns,
                                                LookUp(BESA_TestRuns, BESA_TestRun = varSelectedTestRunID),
                                                {
                                                    PostTestData: JSON(
                                                        {
                                                            ExternalTemperature: Value(Coalesce(TaskNameInput_80.Text, "0")),
                                                            CorrectedExternalTemperature: Value(Coalesce(inputEnvelopeFloorArea_112.Text, "0")),
                                                            BarometricPressure: Value(Coalesce(TaskNameInput_81.Text, "0")),
                                                            CorrectedBarometricPressure: Value(Coalesce(inputEnvelopeFloorArea_113.Text, "0")),
                                                            Windspeed: 0,
                                                            CorrectedWindspeed: 0,
                                                            AvgPositiveDp: Value(IfError(Average(wfx_Positive, CorrectedInput1), 0)),
                                                            AvgNegativeDp: Value(IfError(Average(wfx_Negative, CorrectedInput1), 0)),
                                                            AvgTotalDp: Value(IfError(Average(wfx_data, CorrectedInput1), 0)),
                                    
                                                            InternalTemperatures: Table(
                                                                ForAll(
                                                                    col_PermPostAtmosphericConditions As tempRec,
                                                                    {
                                                                        RowNumber: Value(tempRec.RowNumber),
                                                                        Location: Text(tempRec.Location),
                                                                        Temperature: Value(tempRec.Temperature),
                                                                        CorrectedTemperature: Value(tempRec.'Corrected Temperature'),
                                                                        Complete: tempRec.Complete
                                                                    }
                                                                )
                                                            ),
                                    
                                                            FanOffPressures: Table(
                                                                ForAll(
                                                                    col_FanOffPressuresPost As fanRec,
                                                                    {
                                                                        SerialNumber: Text(fanRec.SerialNumber),
                                                                        ReadingNo: Value(fanRec.ReadingNo),
                                                                        RawInput: Value(fanRec.RawInput),
                                                                        CorrectedInput: Value(fanRec.CorrectedInput),
                                                                        CalibScaler: Value(fanRec.CalibScaler),
                                                                        CalibConst: Value(fanRec.CalibConst)
                                                                    }
                                                                )
                                                            )
                                                        }
                                                    )
                                                }
                                            )
                                        )
                                    );
                                    
                                    // ✅ Notify user
                                    Notify("Post-Test Data saved successfully", NotificationType.Success);
                                    
                                    // 3️⃣ Get the freshly patched TestRun from Dataverse
                                    Set(
                                        varUpdatedTestRun,
                                        LookUp(
                                            BESA_TestRuns,
                                            BESA_TestRun = varSelectedTestRunID
                                        )
                                    );
                                    
                                    // 4️⃣ Update local col_TestRun for only the selected TestRun
                                    UpdateIf(
                                        col_TestRun,
                                        TestID = varSelectedTestRunID,
                                        {
                                            PreTestData: ParseJSON(varUpdatedTestRun.PreTestData), 
                                            PostTestData: ParseJSON(varUpdatedTestRun.PostTestData),
                                            TempSealingData: ParseJSON(varUpdatedTestRun.TempSealingData),
                                            // EquipmentLocations: ParseJSON(varUpdatedTestRun.EquipmentLocations),
                                            // EquipmentItems: ParseJSON(varUpdatedTestRun.EquipmentItems),
                                            SummaryResults: ParseJSON(varUpdatedTestRun.SummaryResults),
                                            TestStatus: varUpdatedTestRun.'Test Status'
                                        }
                                    );
                                    
                                    With(
                                        {
                                            wthRun: LookUp(col_TestRun, TestNo = varSelectedTestNo)
                                        },
                                    
                                        With(
                                            {
                                                wthBaroCorPRE:            IfError(Value(Text(wthRun.PreTestData.CorrectedBarometricPressure)),  0),
                                                wthBaroCorPOST:           IfError(Value(Text(wthRun.PostTestData.CorrectedBarometricPressure)), 0),
                                                wthBarometer:             varSelectedBarometerLU,
                                                wthCorrectedExternalPre:  IfError(Value(Text(wthRun.PreTestData.CorrectedExternalTemperature)),  0),
                                                wthCorrectedExternalPost: IfError(Value(Text(wthRun.PostTestData.CorrectedExternalTemperature)), 0),
                                                wthCorrectedAvgInternalPRE:  IfError(Value(Average(col_PermPreAtmosphericConditions,  'Corrected Temperature')), 0),
                                                wthCorrectedAvgInternalPOST: IfError(Value(Average(col_PermPostAtmosphericConditions, 'Corrected Temperature')), 0)
                                            },
                                    
                                            With(
                                                {
                                                    wthBaroCorAvg:           Average(wthBaroCorPRE,              wthBaroCorPOST),
                                                    wthExternalAvg:          Average(wthCorrectedExternalPre,     wthCorrectedExternalPost),
                                                    wthCorrectedAvgInternal: Average(wthCorrectedAvgInternalPRE,  wthCorrectedAvgInternalPOST)
                                                },
                                    
                                                If(
                                                    Or(wthBaroCorAvg < wthBarometer.Lower, wthBaroCorAvg > wthBarometer.Upper),
                                                    Set(varExternalDensity, "Warning");
                                                    Set(varInternalDensity, "Warning"),
                                    
                                                    Set(
                                                        varExternalDensityValue,
                                                        IfError(
                                                            (
                                                                (wthBaroCorAvg * 100) -
                                                                (
                                                                    0.37802 * varRelativeHumidity *
                                                                    Exp(
                                                                        59.484085 -
                                                                        (6790.4985 / (wthExternalAvg + 273.15)) -
                                                                        5.02802 * Ln(wthExternalAvg + 273.15)
                                                                    )
                                                                )
                                                            ) / (287.055 * (wthExternalAvg + 273.15)),
                                                            0
                                                        )
                                                    );
                                    
                                                    Set(
                                                        varInternalDensityValue,
                                                        IfError(
                                                            (
                                                                (wthBaroCorAvg * 100) -
                                                                (
                                                                    0.37802 * varRelativeHumidity *
                                                                    Exp(
                                                                        59.484085 -
                                                                        (6790.4985 / (wthCorrectedAvgInternal + 273.15)) -
                                                                        5.02802 * Ln(wthCorrectedAvgInternal + 273.15)
                                                                    )
                                                                )
                                                            ) / (287.055 * (wthCorrectedAvgInternal + 273.15)),
                                                            0
                                                        )
                                                    )
                                                )
                                            )
                                        )
                                    );
                                    
                                    Set(
                                        varDp0EndPos,
                                        Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PostTestData.AvgPositiveDp))
                                    );
                                    
                                    Set(
                                        varDp0EndNeg,
                                        Value(Text(LookUp(col_TestRun, TestNo = varSelectedTestNo).PostTestData.AvgNegativeDp))
                                    );
                                    
                                    // Recalculate TotalFlow, LnF, LnPxLnF, LnF2 for every header row
                                    // using the updated density values
                                    ForAll(
                                        col_PressureReadings_Header As hdr,
                                        With(
                                            {
                                                wfx_Density: If(
                                                    cVar_TestMetaData.PressDepress = "Pressurisation",
                                                    varInternalDensityValue,
                                                    varExternalDensityValue
                                                ),
                                                wfx_AvgFanFlow: IfError(
                                                    Average(
                                                        Filter(
                                                            col_PressureReadings,
                                                            Value         = hdr.Value &&
                                                            SetNumber     = hdr.SetNumber &&
                                                            ManometerType = "Fan" &&
                                                            !IsBlank(PressurePointFanFlow)
                                                        ),
                                                        PressurePointFanFlow
                                                    ),
                                                    Blank()
                                                )
                                            },
                                            With(
                                                {
                                                    wfx_TotalFlow: IfError(
                                                        If(
                                                            hdr.ActiveCalculation = false || IsBlank(wfx_AvgFanFlow) || wfx_AvgFanFlow = 0,
                                                            Blank(),
                                                            wfx_AvgFanFlow * 3600 * 1.2 / wfx_Density
                                                        ),
                                                        Blank()
                                                    )
                                                },
                                                With(
                                                    {
                                                        wfx_LnP: IfError(If(hdr.AvgBuildPa <> 0, Ln(Abs(hdr.AvgBuildPa)), Blank()), Blank()),
                                                        wfx_LnF: IfError(If(wfx_TotalFlow > 0, Ln(wfx_TotalFlow), Blank()), Blank())
                                                    },
                                                    Patch(
                                                        col_PressureReadings_Header,
                                                        hdr,
                                                        {
                                                            TotalFlow: wfx_TotalFlow,
                                                            LnF:       wfx_LnF,
                                                            LnPxLnF:   IfError(wfx_LnP * wfx_LnF, Blank()),
                                                            LnF2:      IfError(wfx_LnF ^ 2,        Blank())
                                                        }
                                                    )
                                                )
                                            )
                                        )
                                    );
                                    
                                    Set(
                                        varTestRunResults,
                                        With(
                                            {
                                                wfx_Density: If(
                                                    cVar_TestMetaData.PressDepress = "Pressurisation",
                                                    varInternalDensityValue,
                                                    varExternalDensityValue
                                                ),
                                                wfx_StdDens: 1.1988
                                            },
                                            With(
                                                {
                                                    wfx_CL: IfError(
                                                        ctxRegression.Cenv * (wfx_Density / wfx_StdDens) ^ (1 - ctxRegression.Exponent),
                                                        Blank()
                                                    )
                                                },
                                                With(
                                                    {
                                                        wfx_Q50: IfError(wfx_CL * 50 ^ ctxRegression.Exponent, Blank())
                                                    },
                                                    {
                                                        CL:   wfx_CL,
                                                        Q50:  wfx_Q50,
                                                        ELA:  IfError(wfx_Q50 / (0.788 * Sqrt(50) * 3600), Blank()),
                                                        AP50: IfError(wfx_Q50 / varEnvelopeArea, Blank()),
                                                        R2:   ctxRegression.R2,
                                                        Cenv: ctxRegression.Cenv,
                                                        Exp:  ctxRegression.Exponent
                                                    }
                                                )
                                            )
                                        )
                                    );
                                    
                                    /*// === PDF Snapshot: Post-Test ===
                                    UpdateContext({varIsPrinting: true});
                                    
                                    Set(varPostTestResult, BESA_PDFtoImage.Run(
                                        Text(varActionRecord.'Booking LookUp'.'Booking ID'),                            // BookingRef
                                        Text(varActionRecord.'Booking LookUp'.'Order LookUp'.OrderReference),   // OrderRef
                                        Text(varActionRecord.'Client LookUp'.'Client Name'),                            // ClientRef
                                        Text(varSelectedTestRunID),
                                        {
                                            file: {
                                                name: "PostTest_" & Text(varSelectedTestRunID) & ".pdf",
                                                contentBytes: PDF(ctn_TestData_PostTest_1, {
                                                    ExpandContainers: true,
                                                    Orientation: "Portrait",
                                                    Size: PaperSize.A4
                                                })
                                            }
                                        }  )                                                    
                                    );
                                    
                                    Collect(col_TestRunImages, {
                                        TestRunID: varSelectedTestRunID,
                                        Type:      "PostTest",
                                        FileId:    varPostTestResult.fileid,
                                        FilePath:  varPostTestResult.filepath,
                                        FileName:  varPostTestResult.filename
                                    });
                                    
                                    UpdateContext({varIsPrinting: false})*/
