                                {
                                    EquipmentLocations: col_EquipmentLocations,
                                    EquipmentItems: col_EquipmentLocationsItems
                                }
                            );
                            */
                            // Explicit projection for EquipmentLocations — avoids date fields inside the Engineer record
                            Set(
                                varEquipmentLocationsJSON,
                                JSON(
                                    ForAll(
                                        col_EquipmentLocations As loc,
                                        {
                                            Location:       Text(loc.Location),
                                            SetNumber:      Text(loc.SetNumber),
                                            TubeIdentifier: Value(loc.TubeIdentifier),
                                            Engineer: If(
                                                IsBlank(loc.Engineer),
                                                Blank(),
                                                { EmailAddress: Text(loc.Engineer.EmailAddress) }
                                            ),
                                            RowNumber:      Value(loc.RowNumber)
                                        }
                                    )
                                )
                            );
                            // Build explicit projection — only scalar/text/boolean fields.
                            // Excludes CalibExpDate and any other date/complex columns from col_AllEquipment and col_Fans.
                            Set(
                                varEquipmentItemsJSON,
                                JSON(
                                    ForAll(
                                        col_EquipmentLocationsItems As item,
                                        {
                                            SetNumber:      Text(item.SetNumber),
                                            SetLocationRef: Value(item.SetLocationRef),
                                            EquipmentType:  Text(item.EquipmentType),
                                            SerialNumber:   Text(item.SerialNumber),
                                            Selected:       Boolean(item.Selected),
                                            ManometerType:  Text(item.ManometerType),
                                            FloorNo:        Value(item.FloorNo),
                                            LinkedFan: If(
                                                IsBlank(item.LinkedFan),
                                                Blank(),
                                                {
                                                    FanType:      Text(item.LinkedFan.FanType),
                                                    FanReference: Text(item.LinkedFan.FanReference),
                                                    Details: ForAll(
                                                        Table(item.LinkedFan.Details) As d,
                                                        {
                                                            Range:          Text(d.Range),
                                                            n:              Value(d.n),
                                                            C:              Value(d.C),
                                                            MaxCalPressure: Value(d.MaxCalPressure),
                                                            MinCalPressure: Value(d.MinCalPressure)
                                                        }
                                                    )
                                                }
                                            ),
                                            LinkedFan_Range: If(
                                                IsBlank(item.LinkedFan_Range),
                                                Blank(),
                                                {
                                                    Range:          Text(item.LinkedFan_Range.Range),
                                                    n:              Value(item.LinkedFan_Range.n),
                                                    C:              Value(item.LinkedFan_Range.C),
                                                    MaxCalPressure: Value(item.LinkedFan_Range.MaxCalPressure),
                                                    MinCalPressure: Value(item.LinkedFan_Range.MinCalPressure)
                                                }
                                            )
                                        }
                                    )
                                )
                            );
                            
                            Patch(
                                BESA_TestRuns,
                                LookUp(BESA_TestRuns, BESA_TestRun = varSelectedTestRunID),
                                {
                                    EquipmentLocations: varEquipmentLocationsJSON,
                                    EquipmentItems:     varEquipmentItemsJSON
                                }
                            );
                            
                            // Keep col_TestRun in sync so switching runs reloads the correct saved data
                            UpdateIf(
                                col_TestRun,
                                TestID = varSelectedTestRunID,
                                {
                                    EquipmentLocations: ForAll(
                                        ParseJSON(varEquipmentLocationsJSON) As equipLoc,
                                        {
