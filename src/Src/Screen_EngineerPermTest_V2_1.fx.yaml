                                                                     ),
                                        wthBarometer:                varSelectedBarometerLU,
                                        wthCorrectedAvgInternalPRE:  IfError(Value(Average(col_PermPreAtmosphericConditions,  'Corrected Temperature')), 0),
                                        wthCorrectedAvgInternalPOST: IfError(
                                                                         Value(Average(col_PermPostAtmosphericConditions, 'Corrected Temperature')),
                                                                         IfError(Value(Average(col_PermPreAtmosphericConditions, 'Corrected Temperature')), 0)
                                                                     )
                                    },
                                    With(
                                        {
                                            wthBaroCorAvg:           Value(Average(wthBaroCorPOST,              wthBaroCorPRE)),
                                            wthCorrectedAvgInternal: Value(Average(wthCorrectedAvgInternalPOST, wthCorrectedAvgInternalPRE))
                                        },
                                        If(
                                            Or(wthBaroCorAvg < wthBarometer.Lower, wthBaroCorAvg > wthBarometer.Upper),
                                            Set(varInternalDensity, "Warning"),
                                            Set(
                                                varInternalDensityValue,
                                                IfError(
                                                    If(
                                                        wthCorrectedAvgInternal = -273.15,
                                                        0,
                                                        (
                                                            (wthBaroCorAvg * 100) -
                                                            (
                                                                0.37802 * varRelativeHumidity *
                                                                Exp(
                                                                    59.484085 -
                                                                    (6790.4985 / (wthCorrectedAvgInternal + 273.15)) -
                                                                    5.02802 * Ln(wthCorrectedAvgInternal + 273.15)
                                                                )
                                                            )
                                                        ) / (287.055 * (wthCorrectedAvgInternal + 273.15))
                                                    ),
                                                    0
                                                )
                                            )
                                        )
                                    )
                                );
                                
                                Set(varEnvelopeArea, varActionRecord.'Envelope LookUp'.'Floor Area');
                                
                                UpdateContext({cVar_ClearTest:true});
                                UpdateContext({cVar_ClearTest:false});
