                            Patch(
                                BESA_TestRuns,
                                LookUp(BESA_TestRuns, BESA_TestRun = varSelectedTestRunID), // patch the current run
                                {
                                    EquipmentLocations: JSON(col_EquipmentLocations, JSONFormat.IncludeBinaryData),
                                    EquipmentItems: JSON(col_EquipmentLocationsItems, JSONFormat.IncludeBinaryData)
                                }
