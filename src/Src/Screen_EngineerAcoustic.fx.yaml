                                    {Sort: 7,  Label: "Required",               Value: "≥" & Text(cVar_CurrentPartition.RequiredValue) & " dB", Category: "Target"},
                                    {Sort: 8,  Label: "Result",                 Value: _result,                     Category: "Target"},
                                    {Sort: 9,  Label: "Best Shift (DnT)",       Value: Text(_bestShift) & " dB",    Category: "Curve Fitting"},
                                    {Sort: 10, Label: "Dev Sum at Best (DnT)",   Value: Text(LookUp(col_ShiftResults, Shift = _bestShift).DevSum), Category: "Curve Fitting"},
                                    {Sort: 11, Label: "Best Shift (D)",          Value: Text(_bestShiftD) & " dB",   Category: "Curve Fitting"},
                                    {Sort: 12, Label: "Partition Type",          Value: cVar_CurrentPartition.PartitionType, Category: "Info"},
                                    {Sort: 13, Label: "Source Room",             Value: cVar_CurrentPartition.SourceRoom,    Category: "Info"},
                                    {Sort: 14, Label: "Receiver Room",           Value: cVar_CurrentPartition.ReceiverRoom,  Category: "Info"},
                                    {Sort: 15, Label: "6dB Rule Met",            Value: If(_sixDbMet, "Yes", "No ⚠"), Category: "Flags"},
                                    {Sort: 16, Label: "Background Correction",   Value: If(_bgCorrectionApplied, "Applied", "Not needed"), Category: "Flags"},
                                    {Sort: 17, Label: "Limited by Background",   Value: If(_limitedByBackground, "Yes ⚠", "No"), Category: "Flags"},
                                    {Sort: 18, Label: "Small Room Used",         Value: If(cVar_CurrentPartition.SourceRoomVolume < 25 || cVar_CurrentPartition.ReceiverRoomVolume < 25, "Yes ⚠", "No"), Category: "Flags"}
                                )
                            );
                            
                            // ═══════════════════════════════════════
                            // STEP 14: ISO curve display
                            // ═══════════════════════════════════════
                            ClearCollect(
