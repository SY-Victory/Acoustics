                                    || IsEmpty(cVar_CurrentPartition.MeasurementData.T2.sourcePositions),
                                Table(),
                                Ungroup(
                                    ForAll(
                                        cVar_CurrentPartition.MeasurementData.T2.sourcePositions As pos,
                                        ForAll(
