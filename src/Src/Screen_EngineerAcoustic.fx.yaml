                                                )
                                            ),
                                            _totalCount: CountRows(col_AcousticPartitions),
                                            _buildType: LookUp(
                                                Table(
                                                    {Key: "Purpose built dwelling houses and flats", AirborneMin: 45, ImpactMax: 62},
                                                    {Key: "Dwelling houses and flats formed by material change of use", AirborneMin: 43, ImpactMax: 64}
                                                ),
                                                Key = Text(varTestInfo.BuildType)
                                            ),
                                            _enhancement: Value(Text(varTestInfo.Enhancement))
                                        },
                                        
                                        With(
                                            {
                                                _nextLabel: Char(64 + _totalCount + 1),
                                                _nextNo: _totalCount + 1
                                            },
                                            
                                            // ── Create partition record ──
                                            Set(
                                                varNewPartition,
                                                Patch(
                                                    BESA_TestRuns,
                                                    Defaults(BESA_TestRuns),
                                                    {
                                                        'Test LookUp': LookUp(
                                                            BESA_Tests,
                                                            BESA_Test = varActionRecord.BESA_Test
                                                        ),
                                                        'Parent Run GUID': Text(_parentRun.TestRunID),
                                                        'Run Type': "Partition",
                                                        'Test No': _nextNo,
                                                        'Test Name': "Partition " & _nextLabel,
                                                        'Test Status': "Pending",
                                                        PartitionData: JSON(
                                                            {
                                                                PartitionLabel: _nextLabel,
                                                                TestReportNumber: "",
                                                                TestCategory: "Airborne",
                                                                PartitionType: "Wall",
                                                                ConstructionType: "",
                                                                SourceRoom: "",
                                                                ReceiverRoom: "",
                                                                SourceRoomVolume: 0,
                                                                ReceiverRoomVolume: 0,
                                                                SeparatingElementArea: 0,
                                                                MetricToReport: "DnT,w + Ctr",
                                                                RequiredValue: If(
                                                                    !IsBlank(_buildType),
                                                                    _buildType.AirborneMin + _enhancement,
                                                                    45
                                                                ),
                                                                StandardisedRT: 0.5
                                                            }
                                                        ),
                                                        TestMetaData: JSON(
                                                            {
                                                                SixDbRuleMet: true,
                                                                BackgroundCorrectionApplied: false,
                                                                ResultLimitedByBackground: false,
                                                                SmallRoomUsed: false
                                                            }
                                                        ),
                                                        PreTestData: JSON(
                                                            {
                                                                L1: {positions: []},
                                                                L2: {positions: []},
                                                                B2: [],
                                                                T2: {sourcePositions: []}
                                                            }
                                                        ),
                                                        SummaryResults: JSON({})
                                                    }
                                                )
                                            );
                                            
                                            // ── Add to partitions collection ──
                                            Collect(
                                                col_AcousticPartitions,
                                                {
                                                    PartitionID: varNewPartition.BESA_TestRun,
                                                    TestRunID: _parentRun.TestRunID,
                                                    RunLabel: _parentRun.RunLabel,
                                                    PartitionNo: _nextNo,
                                                    TestStatus: "Pending",
                                                    PartitionLabel: _nextLabel,
                                                    TestCategory: "Airborne",
                                                    PartitionType: "Wall",
                                                    SourceRoom: "",
                                                    ReceiverRoom: "",
                                                    RequiredValue: If(
                                                        !IsBlank(_buildType),
                                                        _buildType.AirborneMin + _enhancement,
                                                        45
                                                    ),
                                                    SixDbRuleMet: true,
                                                    ResultLimitedByBackground: false,
                                                    MeasurementData: ParseJSON("{}"),
                                                    HasMeasurementData: false,
                                                    Results: ParseJSON("{}"),
                                                    DnTwPlusCtr: Blank(),
                                                    LnTw: Blank(),
                                                    PassFail: ""
                                                }
                                            );
                                            
                                            // ── Update run partition count ──
                                            UpdateIf(
                                                col_AcousticTestRuns,
                                                TestRunID = _parentRun.TestRunID,
                                                {
                                                    PartitionCount: _existingCount + 1
                                                }
                                            );
                                            
                                            // ── Select the new partition ──
                                            UpdateContext({
                                                cVar_CurrentPartition: LookUp(
                                                    col_AcousticPartitions,
                                                    PartitionID = varNewPartition.BESA_TestRun
                                                )
                                            });
                                            
