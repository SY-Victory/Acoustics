                                                SmallRoomUsed: row.SmallRoomUsed,
                                                NumSpeakerPositions: row.NumSpeakerPositions,
                                                NumL1ReadingsPerPosition: row.NumL1ReadingsPerPosition,
                                                NumL2ReadingsPerPosition: row.NumL2ReadingsPerPosition,
                                                NumB2Measurements: row.NumB2Measurements,
                                                NumT2SourcePositions: row.NumT2SourcePositions,
                                                NumT2ReadingsPerPosition: row.NumT2ReadingsPerPosition
                                            }
                                        ),
                                        SummaryResults: If(
                                            !IsBlank(row.PassFail) && row.PassFail <> "",
                                            JSON(
                                                {
                                                    DnTw: row.DnTw,
                                                    C: row.C,
                                                    Ctr: row.Ctr,
                                                    DnTwPlusCtr: row.MeasuredValue,
                                                    RequiredValue: row.RequiredValue,
                                                    Result: row.PassFail
                                                }
                                            ),
                                            JSON({})
                                        ),
                                        'Test Status': If(
                                            !IsBlank(row.SourceRoom)
                                                && !IsBlank(row.ReceiverRoom)
                                                && row.SourceRoomVolume > 0
                                                && row.ReceiverRoomVolume > 0
                                                && !IsBlank(row.PassFail) && row.PassFail <> "",
                                            "Complete",
                                            If(
                                                !IsBlank(row.SourceRoom) || row.MeasuredValue > 0,
                                                "In Progress",
                                                "Pending"
                                            )
                                        )
                                    }
                                )
                            );
                            
                            // ── STEP 2: Save Impact Partitions (flags + nums + results) ──
                            ForAll(
                                col_ImpactResults As row,
                                Patch(
                                    BESA_TestRuns,
                                    LookUp(BESA_TestRuns, BESA_TestRun = row.PartitionID),
                                    {
                                        PartitionData: JSON(
                                            {
                                                PartitionLabel: row.PartitionLabel,
                                                TestReportNumber: row.TestReportNumber,
                                                TestCategory: "Impact",
                                                PartitionType: "Floor",
                                                SourceRoom: row.SourceRoom,
                                                SourceRoomVolume: row.SourceRoomVolume,
                                                ReceiverRoom: row.ReceiverRoom,
                                                ReceiverRoomVolume: row.ReceiverRoomVolume,
                                                RequiredValue: row.RequiredValue,
                                                MetricToReport: "L'nT,w",
                                                StandardisedRT: 0.5
                                            }
                                        ),
                                        TestMetaData: JSON(
                                            {
                                                SixDbRuleMet: true,
                                                BackgroundCorrectionApplied: false,
                                                ResultLimitedByBackground: row.ResultLimitedByBackground,
                                                SmallRoomUsed: row.SmallRoomUsed,
                                                NumTapperPositions: row.NumTapperPositions,
                                                NumL2TapperReadings: row.NumL2TapperReadings,
                                                NumB2TapperMeasurements: row.NumB2TapperMeasurements,
                                                NumT2SourcePositions: row.NumT2SourcePositions,
                                                NumT2ReadingsPerPosition: row.NumT2ReadingsPerPosition
                                            }
                                        ),
                                        SummaryResults: If(
                                            !IsBlank(row.PassFail) && row.PassFail <> "",
                                            JSON(
                                                {
                                                    LnTw: row.LnTw,
                                                    RequiredValue: row.RequiredValue,
                                                    Result: row.PassFail
                                                }
                                            ),
                                            JSON({})
                                        ),
                                        'Test Status': If(
                                            !IsBlank(row.SourceRoom)
                                                && !IsBlank(row.ReceiverRoom)
                                                && row.SourceRoomVolume > 0
                                                && row.ReceiverRoomVolume > 0
                                                && !IsBlank(row.PassFail) && row.PassFail <> "",
                                            "Complete",
                                            If(
                                                !IsBlank(row.SourceRoom) || row.MeasuredValue > 0,
                                                "In Progress",
                                                "Pending"
                                            )
                                        )
                                    }
                                )
                            );
                            
                            // ── STEP 3: Update parent run statuses ──
                            ForAll(
                                col_AcousticTestRuns As run,
                                With(
                                    {
                                        _total: CountRows(
                                            Filter(col_AcousticPartitions, TestRunID = run.TestRunID)
                                        ),
                                        _incomplete: CountRows(
                                            Filter(col_AcousticPartitions, TestRunID = run.TestRunID && TestStatus <> "Complete")
                                        )
                                    },
                                    Patch(
                                        BESA_TestRuns,
                                        LookUp(BESA_TestRuns, BESA_TestRun = run.TestRunID),
                                        {
                                            'Test Status': If(
                                                _incomplete = 0 && _total > 0,
                                                "Complete",
                                                "In Progress"
                                            )
                                        }
                                    )
                                )
                            );
                            
                            // ── STEP 4: Recollect partitions from database ──
                            ClearCollect(
                                col_AcousticPartitions,
                                ForAll(
                                    Filter(
                                        BESA_TestRuns,
                                        'Test LookUp'.BESA_Test = varActionRecord.BESA_Test
                                            && 'Run Type' = "Partition"
                                    ) As part,
                                    With(
                                        {
                                            parentRun: LookUp(
                                                BESA_TestRuns,
                                                BESA_TestRun = GUID(part.'Parent Run GUID')
                                            )
                                        },
                                        {
                                            PartitionID: part.BESA_TestRun,
                                            TestRunID: parentRun.BESA_TestRun,
                                            TestReportNumber: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                "", Text(ParseJSON(part.PartitionData).TestReportNumber)
                                            ),
                                            RunLabel: parentRun.'Test Name',
                                            RunDate: parentRun.'Run Date',
                                            PartitionNo: part.'Test No',
                                            TestStatus: part.'Test Status',
                                            PartitionLabel: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                "", Text(ParseJSON(part.PartitionData).PartitionLabel)
                                            ),
                                            TestCategory: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                "", Text(ParseJSON(part.PartitionData).TestCategory)
                                            ),
                                            PartitionType: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                "", Text(ParseJSON(part.PartitionData).PartitionType)
                                            ),
                                            SourceRoom: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                "", Text(ParseJSON(part.PartitionData).SourceRoom)
                                            ),
                                            SourceRoomVolume: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                0, Value(ParseJSON(part.PartitionData).SourceRoomVolume)
                                            ),
                                            ReceiverRoom: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                "", Text(ParseJSON(part.PartitionData).ReceiverRoom)
                                            ),
                                            ReceiverRoomVolume: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                0, Value(ParseJSON(part.PartitionData).ReceiverRoomVolume)
                                            ),
                                            SeparatingElementArea: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                0, Value(ParseJSON(part.PartitionData).SeparatingElementArea)
                                            ),
                                            RequiredValue: If(
                                                IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                                0, Value(Text(ParseJSON(part.PartitionData).RequiredValue))
                                            ),
                                            SixDbRuleMet: If(
                                                IsBlank(part.TestMetaData) || part.TestMetaData = "{}",
                                                true, Boolean(ParseJSON(part.TestMetaData).SixDbRuleMet)
                                            ),
                                            ResultLimitedByBackground: If(
                                                IsBlank(part.TestMetaData) || part.TestMetaData = "{}",
                                                false, Boolean(ParseJSON(part.TestMetaData).ResultLimitedByBackground)
                                            ),
                                            MeasurementData: If(
                                                IsBlank(part.PreTestData) || part.PreTestData = "{}",
                                                ParseJSON("{}"), ParseJSON(part.PreTestData)
                                            ),
                                            HasMeasurementData: !(IsBlank(part.PreTestData) || part.PreTestData = "{}"),
                                            Results: If(
                                                IsBlank(part.SummaryResults) || part.SummaryResults = "{}",
                                                ParseJSON("{}"), ParseJSON(part.SummaryResults)
                                            ),
                                            DnTwPlusCtr: If(
                                                IsBlank(part.SummaryResults) || part.SummaryResults = "{}",
                                                Blank(), Value(Text(ParseJSON(part.SummaryResults).DnTwPlusCtr))
                                            ),
                                            LnTw: If(
                                                IsBlank(part.SummaryResults) || part.SummaryResults = "{}",
                                                Blank(), Value(Text(ParseJSON(part.SummaryResults).LnTw))
                                            ),
                                            PassFail: If(
                                                IsBlank(part.SummaryResults) || part.SummaryResults = "{}",
                                                "", Text(ParseJSON(part.SummaryResults).Result)
                                            )
                                        }
                                    )
                                )
                            );
                            
                            // ── STEP 5: Recollect runs ──
                            ClearCollect(
                                col_AcousticTestRuns,
                                ForAll(
                                    Filter(
                                        BESA_TestRuns,
                                        'Test LookUp'.BESA_Test = varActionRecord.BESA_Test
                                            && 'Run Type' = "Run"
                                    ) As run,
                                    {
                                        TestRunID: run.BESA_TestRun,
                                        RunLabel: run.'Test Name',
                                        RunDate: run.'Run Date',
                                        Engineer: run.Engineer,
                                        TestStatus: run.'Test Status',
                                        PartitionCount: CountRows(
                                            Filter(BESA_TestRuns, 'Parent Run GUID' = Text(run.BESA_TestRun))
                                        )
                                    }
                                )
                            );
                            
                            // ── STEP 6: Rebuild results tables ──
                            Concurrent(
                                ClearCollect(
                                    col_AirborneResults,
                                    ForAll(
                                        SortByColumns(
                                            Filter(col_AcousticPartitions, TestCategory = "Airborne"),
                                            "PartitionNo", SortOrder.Ascending
                                        ) As part,
                                        With(
                                            {
                                                _parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID),
                                                _l1Positions: CountRows(Distinct(
                                                    ForAll(part.MeasurementData.L1.positions As pos, {P: Value(pos.positionNo)}), P)),
                                                _l1Readings: CountRows(Ungroup(
                                                    ForAll(part.MeasurementData.L1.positions As pos,
                                                        ForAll(pos.readings As rd, {R: 1})), Value)),
                                                _l2Positions: CountRows(Distinct(
                                                    ForAll(part.MeasurementData.L2.positions As pos, {P: Value(pos.positionNo)}), P)),
                                                _l2Readings: CountRows(Ungroup(
                                                    ForAll(part.MeasurementData.L2.positions As pos,
                                                        ForAll(pos.readings As rd, {R: 1})), Value)),
                                                _b2Count: CountRows(ForAll(part.MeasurementData.B2 As rd, {R: 1})),
                                                _t2Positions: CountRows(Distinct(
                                                    ForAll(part.MeasurementData.T2.sourcePositions As pos, {P: Value(pos.positionNo)}), P)),
                                                _t2Readings: CountRows(Ungroup(
                                                    ForAll(part.MeasurementData.T2.sourcePositions As pos,
                                                        ForAll(pos.readings As rd, {R: 1})), Value))
                                            },
                                            {
                                                Sort: part.PartitionNo,
                                                DateOfTest: If(!IsBlank(_parentRun.RunDate), Text(_parentRun.RunDate, "dd/mm/yyyy"), ""),
                                                TestReportNumber: part.TestReportNumber,
                                                SourceRoom: part.SourceRoom,
                                                SourceRoomVolume: part.SourceRoomVolume,
                                                ReceiverRoom: part.ReceiverRoom,
                                                ReceiverRoomVolume: part.ReceiverRoomVolume,
                                                PartitionType: part.PartitionType,
                                                PartitionLabel: part.PartitionLabel,
                                                PartitionID: part.PartitionID,
                                                TestRunID: part.TestRunID,
                                                Measured: If(!IsBlank(part.DnTwPlusCtr),
                                                    Text(part.DnTwPlusCtr) & If(!part.SixDbRuleMet, "[4]", "") & If(part.ResultLimitedByBackground, "≥", ""), "—"),
                                                MeasuredValue: If(!IsBlank(part.DnTwPlusCtr), part.DnTwPlusCtr, 0),
                                                Required: "≥" & Text(part.RequiredValue),
                                                RequiredValue: part.RequiredValue,
                                                PassFail: part.PassFail,
                                                RunLabel: If(!IsBlank(_parentRun), _parentRun.RunLabel, ""),
                                                Engineer: If(!IsBlank(_parentRun), _parentRun.Engineer, ""),
                                                DnTw: If(!IsBlank(part.Results) && !IsBlank(part.Results.DnTw), Value(Text(part.Results.DnTw)), Blank()),
                                                C: If(!IsBlank(part.Results) && !IsBlank(part.Results.C), Value(Text(part.Results.C)), Blank()),
                                                Ctr: If(!IsBlank(part.Results) && !IsBlank(part.Results.Ctr), Value(Text(part.Results.Ctr)), Blank()),
                                                SixDbRuleMet: part.SixDbRuleMet,
                                                ResultLimitedByBackground: part.ResultLimitedByBackground,
                                                SmallRoomUsed: part.SourceRoomVolume < 25 || part.ReceiverRoomVolume < 25,
                                                NumSpeakerPositions: _l1Positions,
                                                NumL1ReadingsPerPosition: If(_l1Positions > 0, RoundDown(_l1Readings / _l1Positions, 0), 0),
                                                NumL2ReadingsPerPosition: If(_l2Positions > 0, RoundDown(_l2Readings / _l2Positions, 0), 0),
                                                NumB2Measurements: _b2Count,
                                                NumT2SourcePositions: _t2Positions,
                                                NumT2ReadingsPerPosition: If(_t2Positions > 0, RoundDown(_t2Readings / _t2Positions, 0), 0)
                                            }
                                        )
                                    )
                                ),
                                ClearCollect(
                                    col_ImpactResults,
                                    ForAll(
                                        SortByColumns(
                                            Filter(col_AcousticPartitions, TestCategory = "Impact"),
                                            "PartitionNo", SortOrder.Ascending
                                        ) As part,
                                        With(
                                            {
                                                _parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID),
                                                _l2Positions: CountRows(Distinct(
                                                    ForAll(part.MeasurementData.L2.positions As pos, {P: Value(pos.positionNo)}), P)),
                                                _l2Readings: CountRows(Ungroup(
                                                    ForAll(part.MeasurementData.L2.positions As pos,
                                                        ForAll(pos.readings As rd, {R: 1})), Value)),
                                                _b2Count: CountRows(ForAll(part.MeasurementData.B2 As rd, {R: 1})),
                                                _t2Positions: CountRows(Distinct(
                                                    ForAll(part.MeasurementData.T2.sourcePositions As pos, {P: Value(pos.positionNo)}), P)),
                                                _t2Readings: CountRows(Ungroup(
                                                    ForAll(part.MeasurementData.T2.sourcePositions As pos,
                                                        ForAll(pos.readings As rd, {R: 1})), Value))
                                            },
                                            {
                                                Sort: part.PartitionNo,
                                                DateOfTest: If(!IsBlank(_parentRun.RunDate), Text(_parentRun.RunDate, "dd/mm/yyyy"), ""),
                                                TestReportNumber: part.TestReportNumber,
                                                SourceRoom: part.SourceRoom,
                                                SourceRoomVolume: part.SourceRoomVolume,
                                                ReceiverRoom: part.ReceiverRoom,
                                                ReceiverRoomVolume: part.ReceiverRoomVolume,
                                                PartitionLabel: part.PartitionLabel,
                                                PartitionID: part.PartitionID,
                                                TestRunID: part.TestRunID,
                                                Measured: If(!IsBlank(part.LnTw),
                                                    Text(part.LnTw) & If(part.ResultLimitedByBackground, "≤", ""), "—"),
                                                MeasuredValue: If(!IsBlank(part.LnTw), part.LnTw, 0),
                                                Required: "≤" & Text(part.RequiredValue),
                                                RequiredValue: part.RequiredValue,
                                                PassFail: part.PassFail,
                                                RunLabel: If(!IsBlank(_parentRun), _parentRun.RunLabel, ""),
                                                Engineer: If(!IsBlank(_parentRun), _parentRun.Engineer, ""),
                                                LnTw: If(!IsBlank(part.LnTw), part.LnTw, Blank()),
                                                ResultLimitedByBackground: part.ResultLimitedByBackground,
                                                SmallRoomUsed: part.SourceRoomVolume < 25 || part.ReceiverRoomVolume < 25,
                                                NumTapperPositions: _l2Positions,
                                                NumL2TapperReadings: If(_l2Positions > 0, RoundDown(_l2Readings / _l2Positions, 0), 0),
                                                NumB2TapperMeasurements: _b2Count,
                                                NumT2SourcePositions: _t2Positions,
