                    ZIndex: =27
                    
                    "galAverages_1 As gallery.'BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0'":
                        '#CopilotOverlayLabel': ="Filtered"
                        DelayItemLoading: =true
                        Height: =290
                        Items: |-
                            =SortByColumns(
                                col_DisplayAdjacency,
                                "Sort", 
                                SortOrder.Ascending)
                        Layout: =Layout.Vertical
                        LoadingSpinner: =LoadingSpinner.Data
                        TemplatePadding: =0
