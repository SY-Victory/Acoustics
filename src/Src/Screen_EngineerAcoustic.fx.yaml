                                _l2: First(col_CalcL2Avg)
                            });
                            
                            ClearCollect(
                                col_CalcT2Avg,
                                With(
                                    {_t2Rows: Filter(col_MeasurementDisplay, MeasurementType = "T2")},
                                    If(
                                        CountRows(_t2Rows) = 0,
                                        {Hz100:0.5, Hz125:0.5, Hz160:0.5, Hz200:0.5, Hz250:0.5, Hz315:0.5, Hz400:0.5, Hz500:0.5,
                                         Hz630:0.5, Hz800:0.5, Hz1000:0.5, Hz1250:0.5, Hz1600:0.5, Hz2000:0.5, Hz2500:0.5, Hz3150:0.5},
                                        {
