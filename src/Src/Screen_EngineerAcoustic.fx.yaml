                                                                PositionNo
                                                            )
                                                    ),
                                                    ReadingNo
                                                )
                                            ),
                                            _maxSort: Max(
                                                Filter(
                                                    col_MeasurementDisplay,
                                                    Sort >= _rangeStart && Sort < _rangeEnd
                                                ),
                                                Sort
                                            )
                                        },
                                        
                                        With(
                                            {
                                                _newPosition: If(
                                                    _type = "B2",
                                                    0,
