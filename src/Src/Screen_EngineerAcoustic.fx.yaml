                                                Hz160: Value(rd.values.'160'), Hz200: Value(rd.values.'200'),
                                                Hz250: Value(rd.values.'250'), Hz315: Value(rd.values.'315'),
                                                Hz400: Value(rd.values.'400'), Hz500: Value(rd.values.'500'),
                                                Hz630: Value(rd.values.'630'), Hz800: Value(rd.values.'800'),
