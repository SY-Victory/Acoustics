                                            DisplayResult, "",
                                            DisplayRequired, "",
                                            DisplayDeviations, "",
                                            PartitionNo, 0
                                        )
                                    );
                                    
                                    Collect(
                                        col_TestRunsAndPartitions,
                                        AddColumns(
                                            col_AcousticPartitions,
                                            IsPartition, true,
                                            StatusIcon, Switch(TestStatus, "Complete", "✓", "In Progress", "🔄", "⚠️"),
                                            CompletedCount, 0,
                                            TotalCount, 0,
                                            DisplayResult,
                                            If(
                                                TestCategory = "Impact",
