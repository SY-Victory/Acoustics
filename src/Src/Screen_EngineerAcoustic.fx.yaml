                                            ),
                                            DisplayRequired,
                                            If(
                                                TestCategory = "Impact",
                                                "≤" & Text(RequiredValue) & " dB",
                                                "≥" & Text(RequiredValue) & " dB"
                                            ),
                                            DisplayDeviations,
                                            If(!SixDbRuleMet, "[4]", "")
                                                & If(ResultLimitedByBackground, " ≥/≤", "")
                                        )
