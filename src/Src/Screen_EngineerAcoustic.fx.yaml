                                        {Freq: "125",  FreqSort: 2,  RefBase: 36, Measured: _dnt.Hz125},
                                        {Freq: "160",  FreqSort: 3,  RefBase: 39, Measured: _dnt.Hz160},
                                        {Freq: "200",  FreqSort: 4,  RefBase: 42, Measured: _dnt.Hz200},
                                        {Freq: "250",  FreqSort: 5,  RefBase: 45, Measured: _dnt.Hz250},
                                        {Freq: "315",  FreqSort: 6,  RefBase: 48, Measured: _dnt.Hz315},
                                        {Freq: "400",  FreqSort: 7,  RefBase: 51, Measured: _dnt.Hz400},
                                        {Freq: "500",  FreqSort: 8,  RefBase: 52, Measured: _dnt.Hz500},
                                        {Freq: "630",  FreqSort: 9,  RefBase: 53, Measured: _dnt.Hz630},
                                        {Freq: "800",  FreqSort: 10, RefBase: 54, Measured: _dnt.Hz800},
                                        {Freq: "1000", FreqSort: 11, RefBase: 55, Measured: _dnt.Hz1000},
                                        {Freq: "1250", FreqSort: 12, RefBase: 56, Measured: _dnt.Hz1250},
                                        {Freq: "1600", FreqSort: 13, RefBase: 56, Measured: _dnt.Hz1600},
                                        {Freq: "2000", FreqSort: 14, RefBase: 56, Measured: _dnt.Hz2000},
                                        {Freq: "2500", FreqSort: 15, RefBase: 56, Measured: _dnt.Hz2500},
                                        {Freq: "3150", FreqSort: 16, RefBase: 56, Measured: _dnt.Hz3150}
                                    ) As row,
                                    {
                                        Freq: row.Freq, FreqSort: row.FreqSort,
                                        Reference: row.RefBase,
                                        Shifted: row.RefBase + _bestShift,
                                        Measured: Round(row.Measured, 1),
                                        Deviation: Max(0, (row.RefBase + _bestShift) - row.Measured),
                                        PassFail: If(row.Measured >= (row.RefBase + _bestShift), "✓", "✗")
