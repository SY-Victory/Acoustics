                        ZIndex: =1
                        
                        lblRowLabel_2 As label:
                            Align: =Align.Center
                            BorderColor: =RGBA(0, 0, 0, 1)
                            Color: =Color.Black
                            Height: =Parent.TemplateHeight
                            OnSelect: =Select(Parent)
                            PaddingBottom: =0
                            PaddingLeft: =0
                            PaddingRight: =0
                            PaddingTop: =0
                            Size: =10
                            Text: =If(ThisItem.MeasurementType = "FreqHeader", "Hz",ThisItem.Label)
