                    BorderThickness: =0
                    ChevronBackground: =App.Theme.Colors.Primary
                    ChevronFill: =App.Theme.Colors.PrimaryForeground
                    ChevronHoverBackground: =App.Theme.Colors.Darker10
                    ChevronHoverFill: =App.Theme.Colors.PrimaryForeground
                    Default: =Text(varTestInfo.TestStandard)
                    Fill: =If(IsBlank(Self.Selected),RGBA(255, 255, 205, 1),RGBA(245, 245, 245, 1))
                    Height: =30
                    HoverFill: =App.Theme.Colors.Lighter70
                    Items: |-
                        =Table(
                            Filter(
                                Table(
                                    {
                                        Value: "ADE 2003 (inc. 2004, 2010, 2013 & 2015 amendments)",
                                        BuildingType: "Residential",
                                        Current: true,
                                        StandardKey: "ADE",
                                        AirborneWallMin: 45,
                                        AirborneFloorMin: 45,
                                        ImpactFloorMax: 62,
                                        AirborneMetric: "DnT,w + Ctr",
                                        ImpactMetric: "L'nT,w",
                                        MeasurementStandard_Airborne: "BS EN ISO 140-4:1998",
                                        MeasurementStandard_Impact: "BS EN ISO 140-7:1998",
                                        RatingStandard_Airborne: "BS EN ISO 717-1:1997",
                                        RatingStandard_Impact: "BS EN ISO 717-2:1997"
                                    },
                                    {
                                        Value: "Scottish Section 5 (2019)",
                                        BuildingType: "Residential",
                                        Current: true,
                                        StandardKey: "SBS_S5",
                                        AirborneWallMin: 43,
                                        AirborneFloorMin: 43,
                                        ImpactFloorMax: 64,
                                        AirborneMetric: "DnT,w + Ctr",
                                        ImpactMetric: "L'nT,w",
                                        MeasurementStandard_Airborne: "BS EN ISO 16283-1:2014",
                                        MeasurementStandard_Impact: "BS EN ISO 16283-2:2020",
                                        RatingStandard_Airborne: "BS EN ISO 717-1:2013",
                                        RatingStandard_Impact: "BS EN ISO 717-2:2013"
                                    },
                                    {
                                        Value: "BB93 (2015)",
                                        BuildingType: "School",
                                        Current: true,
                                        StandardKey: "BB93",
                                        AirborneWallMin: 0,
                                        AirborneFloorMin: 0,
                                        ImpactFloorMax: 0,
                                        AirborneMetric: "DnT,w",
                                        ImpactMetric: "L'nT,w",
                                        MeasurementStandard_Airborne: "BS EN ISO 16283-1:2014",
                                        MeasurementStandard_Impact: "BS EN ISO 16283-2:2020",
                                        RatingStandard_Airborne: "BS EN ISO 717-1:2013",
                                        RatingStandard_Impact: "BS EN ISO 717-2:2013"
                                    },
                                    {
                                        Value: "HTM 08-01 (2013)",
                                        BuildingType: "Hospital",
                                        Current: true,
                                        StandardKey: "HTM_08_01",
                                        AirborneWallMin: 0,
                                        AirborneFloorMin: 0,
                                        ImpactFloorMax: 0,
                                        AirborneMetric: "DnT,w",
                                        ImpactMetric: "L'nT,w",
                                        MeasurementStandard_Airborne: "BS EN ISO 16283-1:2014",
                                        MeasurementStandard_Impact: "BS EN ISO 16283-2:2020",
                                        RatingStandard_Airborne: "BS EN ISO 717-1:2013",
                                        RatingStandard_Impact: "BS EN ISO 717-2:2013"
                                    },
                                    {
                                        Value: "BS 8233:2014",
                                        BuildingType: "Office",
                                        Current: true,
                                        StandardKey: "BS_8233",
                                        AirborneWallMin: 0,
                                        AirborneFloorMin: 0,
                                        ImpactFloorMax: 0,
                                        AirborneMetric: "DnT,w",
                                        ImpactMetric: "L'nT,w",
                                        MeasurementStandard_Airborne: "BS EN ISO 16283-1:2014",
                                        MeasurementStandard_Impact: "BS EN ISO 16283-2:2020",
                                        RatingStandard_Airborne: "BS EN ISO 717-1:2013",
                                        RatingStandard_Impact: "BS EN ISO 717-2:2013"
                                    }
                                ),
                                BuildingType = drpBuildingType.Selected.Standard
                            )
                        )
                    OnChange: |-
                        =Set(varDomCom, If(Self.Selected.Value = "Domestic", 1, 2));
                        
                        ForAll(
                            col_AcousticPartitions As part,
                            With(
                                {
                                    _std: LookUp(
                                        col_PerformanceStandards,
                                        Standard = Text(varTestInfo.TargetStandard)
                                            && (BuildType = Text(varTestInfo.BuildType) || BuildType = "Any")
                                            && TestType = part.TestCategory
                                            && PartitionType = part.PartitionType
                                    ),
                                    _enhancement: Value(Text(varTestInfo.Enhancement))
                                },
                                UpdateIf(
                                    col_AcousticPartitions,
                                    PartitionID = part.PartitionID,
                                    {
                                        RequiredValue: If(
                                            !IsBlank(_std),
                                            If(
                                                _std.Direction = "≥",
                                                _std.Required + _enhancement,
                                                _std.Required - _enhancement
                                            ),
                                            part.RequiredValue
                                        )
                                    }
                                )
