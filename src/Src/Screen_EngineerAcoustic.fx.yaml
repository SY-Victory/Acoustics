                                    With(
                                        {
                                            _parentRun: LookUp(
                                                col_AcousticTestRuns,
                                                TestRunID = varSelectedTestRunID
                                            ),
                                            _existingCount: CountRows(
                                                Filter(
                                                    col_AcousticPartitions,
