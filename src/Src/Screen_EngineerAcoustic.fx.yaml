                                            2999, 3999,
                                            3999, 4999
                                        )
                                    },
                                    
                                    With(
                                        {
                                            _existingRows: Filter(
                                                col_MeasurementDisplay,
                                                MeasurementType = _type
                                            ),
                                            _maxPosition: Max(
                                                Filter(col_MeasurementDisplay, MeasurementType = _type),
                                                PositionNo
                                            ),
                                            _maxReading: If(
                                                _type = "B2",
