                            ZIndex: =1
                        
                        btnRemovePartitionRow_2 As Button:
                            AcceptsFocus: =true
                            AccessibleLabel: =""
                            Align: =""
                            Appearance: ="Primary"
                            BasePaletteColor: =RGBA(249, 83, 109, 1)
                            BorderColor: =
                            BorderStyle: =""
                            ContentLanguage: =""
                            DisplayMode: =DisplayMode.Edit
                            Font: =""
                            FontColor: =
                            FontItalic: =false
                            FontSize: =0
                            FontStrikethrough: =false
                            FontUnderline: =false
                            FontWeight: =""
                            Height: =35
                            Icon: ="DismissCircle"
                            IconRotation: =0
                            IconStyle: ="Outline"
                            Layout: ='ButtonCanvas.Layout'.IconOnly
                            OnSelect: |-
                                =// Don't allow removal of last row in a section
                                With(
                                    {
                                        _type: ThisItem.MeasurementType,
                                        _count: CountRows(
                                            Filter(col_MeasurementDisplay, MeasurementType = ThisItem.MeasurementType)
                                        )
                                    },
                                    
                                    If(
                                        _count <= 1,
                                        Notify(
                                            "Cannot remove last " & _type & " row",
                                            NotificationType.Warning
                                        ),
                                        
                                        // Remove this specific row
                                        RemoveIf(
                                            col_MeasurementDisplay,
                                            Sort = ThisItem.Sort
                                        )
                                    )
                                );
                            TabIndex: =0
                            Text: =
                            Tooltip: =""
                            VerticalAlign: =""
                            Visible: |-
                                =// Only show on data rows, not headers or calculated results
                                ThisItem.MeasurementType in ["L1", "L2", "B2", "T2"]
                            Width: =30
                            X: =915
                            Y: =3
                            ZIndex: =2
                        
                        btnAddPartitionRow_2 As Button:
                            AcceptsFocus: =true
                            AccessibleLabel: =""
                            Align: =""
                            Appearance: ='ButtonCanvas.Appearance'.Transparent
                            BasePaletteColor: =fxPrimary
                            BorderColor: =
                            BorderStyle: =""
                            ContentLanguage: =""
                            DisplayMode: =DisplayMode.Edit
                            Font: =""
                            FontColor: =RGBA(255, 255, 255, 1)
                            FontItalic: =false
                            FontSize: =0
                            FontStrikethrough: =false
                            FontUnderline: =false
                            FontWeight: =""
                            Height: =32
                            Icon: ="Add"
                            IconRotation: =0
                            IconStyle: ="Outline"
                            Layout: ="Icon before"
                            OnSelect: |-
                                =With(
                                    {
                                        // Determine which section based on header Sort
                                        _type: Switch(
                                            ThisItem.Sort,
                                            999,  "L1",
                                            1999, "L2",
                                            2999, "B2",
                                            3999, "T2"
                                        ),
                                        _rangeStart: Switch(
                                            ThisItem.Sort,
                                            999,  1000,
                                            1999, 2000,
                                            2999, 3000,
                                            3999, 4000
                                        ),
                                        _rangeEnd: Switch(
                                            ThisItem.Sort,
                                            999,  1999,
                                            1999, 2999,
                                            2999, 3999,
                                            3999, 4999
                                        )
                                    },
                                    
                                    With(
                                        {
                                            _existingRows: Filter(
                                                col_MeasurementDisplay,
                                                MeasurementType = _type
                                            ),
                                            _maxPosition: Max(
                                                Filter(col_MeasurementDisplay, MeasurementType = _type),
                                                PositionNo
                                            ),
                                            _maxReading: If(
                                                _type = "B2",
                                                Max(Filter(col_MeasurementDisplay, MeasurementType = "B2"), ReadingNo),
                                                Max(
                                                    Filter(
                                                        col_MeasurementDisplay,
                                                        MeasurementType = _type
                                                            && PositionNo = Max(
                                                                Filter(col_MeasurementDisplay, MeasurementType = _type),
                                                                PositionNo
                                                            )
                                                    ),
                                                    ReadingNo
                                                )
                                            ),
                                            _maxSort: Max(
                                                Filter(
                                                    col_MeasurementDisplay,
                                                    Sort >= _rangeStart && Sort < _rangeEnd
                                                ),
                                                Sort
                                            )
                                        },
                                        
                                        With(
                                            {
                                                _newPosition: If(
                                                    _type = "B2",
                                                    0,
                                                    Coalesce(_maxPosition, 0) + 1
                                                ),
                                                _newReading: If(
                                                    _type = "B2",
                                                    Coalesce(_maxReading, 0) + 1,
                                                    1
                                                ),
                                                _newSort: Coalesce(_maxSort, _rangeStart) + 1
                                            },
                                            
                                            Collect(
                                                col_MeasurementDisplay,
                                                {
                                                    Sort: _newSort,
                                                    MeasurementType: _type,
                                                    Label: Switch(
                                                        _type,
                                                        "L1", "L1 - Pos " & Text(_newPosition) & " Rd 1",
