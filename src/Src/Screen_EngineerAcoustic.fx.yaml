                    "galAverages_2 As gallery.'BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0'":
                        '#CopilotOverlayLabel': ="Filtered"
                        DelayItemLoading: =true
                        Height: =250
                        Items: |-
                            =// Gallery Items
                            SortByColumns(
                                AddColumns(
                                    col_BgCorrection,
                                    FreqSort,
                                    Switch(
                                        Freq,
                                        "100", 1, "125", 2, "160", 3, "200", 4,
                                        "250", 5, "315", 6, "400", 7, "500", 8,
                                        "630", 9, "800", 10, "1000", 11, "1250", 12,
                                        "1600", 13, "2000", 14, "2500", 15, "3150", 16
                                    ),
                                    DisplayFreq,
                                    Switch(
                                        Freq,
                                        "1000", "1k", "1250", "1.25k", "1600", "1.6k",
                                        "2000", "2k", "2500", "2.5k", "3150", "3.15k",
                                        Freq
                                    ) & "Hz"
                                ),
                                "FreqSort",
                                SortOrder.Ascending
                            )
                        Layout: =Layout.Vertical
                        LoadingSpinner: =LoadingSpinner.Data
                        TemplatePadding: =0
                        TemplateSize: =40
                        Width: =Parent.Width
                        Y: =35
                        ZIndex: =1
                        
