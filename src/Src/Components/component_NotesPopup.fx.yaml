            HoverFill: =ColorFade(Self.Fill, -20%)
            OnSelect: |
                =/*Patch(col_Notes,Defaults(col_Notes),
                {
                    NotesID: GUID(),
                    Name:Text(Now(),"dd/mm/yy")&"-"&User().FullName,
                    'Note Type':varNoteView, 
                    'Created On':Now(), 
                    'Created By': User().EntraObjectId
                }
                );
                */
                
                Patch(
                    col_Notes,
                    Defaults(col_Notes),
                    {
                        NotesID: GUID(),
                        //'Note Text': txtNoteInput.Text,
                        'Note Type': varNoteView,
                        'Order LookUp': Switch(
                            varNoteView,
                            "Order", varNoteOpenOrder,
                            "Booking", If(!IsBlank(varNoteOpenBooking), varNoteOpenOrder, Blank()),
                    
                            Blank()
                        ),
                        'Booking LookUp': Switch(
                            varNoteView,
                            "Booking", varNoteOpenBooking,
                            
                            Blank()
                        ),
                        'Site LookUp': Blank(),
                        /*Switch(
                            varNoteView,
                            "Site", varNoteOpenSite,
                            Blank()
                            */
                        'Envelope LookUp':Switch(
                            varNoteView,
                            "Envelope", varNoteOpenEnvelope,
                           
                            Blank()
                        ),
                        'Created On': Now(),
                        'Created By': User().EntraObjectId
                    }
                )
            RadiusBottomLeft: =5
            RadiusBottomRight: =5
            RadiusTopLeft: =5
            RadiusTopRight: =5
            Size: =11
            Text: ="+   Add New"
            Width: =113
            X: =347
            Y: =5
            ZIndex: =4

