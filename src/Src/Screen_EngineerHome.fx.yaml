            checkEngineerAbortService As Checkbox:
                BasePaletteColor: =
                DisplayMode: =DisplayMode.Edit
                FontColor: =
                Height: =32
                Label: ="Would you like to Abort all other Services for this Shift?"
                OnCheck: =false
                OnUncheck: =false
                Visible: |-
                    =With(
                        { 
                            wthCurrentCount: CountRows(Filter(col_ShiftTimeline, 'Shift ID' = varActionRecord.'Shift ID', 'Action Type' = "Service", 'ShiftActionID' <> varActionRecord.ActionGUID))
                        }, 
                        Switch(wthCurrentCount, 
                    
                    0, false, 
                    true))
                Width: =500
                X: =10
                Y: =50
                ZIndex: =73

            btnEngineerAbortService As Button:
                AcceptsFocus: =true
                AccessibleLabel: =""
                Align: =""
                Appearance: ="Primary"
                BasePaletteColor: =RGBA(166, 76, 90, 1)
                BorderColor: =
                BorderStyle: =""
                ContentLanguage: =""
                DisplayMode: =If(IsBlank(inputAbortServiceReason.Text), DisplayMode.Disabled, DisplayMode.Edit)
                Font: =""
                FontColor: =
                FontItalic: =false
                FontSize: =0
                FontStrikethrough: =false
                FontUnderline: =false
                FontWeight: =""
                Height: =30
                Icon: ="Save"
                IconRotation: =0
                IconStyle: ="Outline"
                Layout: ="Icon before"
                OnSelect: |-
                    =
                    Patch(
                        BESA_BookingElements,
                        LookUp(BESA_BookingElements, BESA_BookingElement = varActionRecord.'Booking Element LookUp'.BESA_BookingElement),
                        {
                            'Booking Element Status':    "Aborted",
                            'Engineer Comments': inputAbortServiceReason.Text
                        }
                    );
                    
                    
                    ForAll(
                        Filter(
                            col_EngineerActionList,
                            ActionGUID = varActionRecord.ActionGUID
                        ) As itemServiceCompletion,
                        Patch(
                            col_EngineerActionList,
                            itemServiceCompletion,
                            { 'Action Status': "Aborted" }
                        )
                    );
                    
                    ForAll(
                        Filter(
                            col_ShiftTimeline,
                            ShiftActionID in Filter(
                                col_EngineerActionList,
                                ActionGUID = varActionRecord.ActionGUID
                            ).ActionGUID
                        ),
                        Patch(
                            col_ShiftTimeline,
                            ThisRecord,
                            { 'Action Status': "Aborted" }
                        )
                    );
                    
                    
                    If(
                        checkEngineerAbortService.Checked,
                    
                    
                        ForAll(
                            Filter(
                                col_EngineerActionList,
                                'Shift ID' = varActionRecord.'Shift ID' &&
                                'Action Type' = "Service" &&
                                ActionGUID <> varActionRecord.ActionGUID
                            ) As itemServiceCompletion,
                            Patch(
                                col_EngineerActionList,
                                itemServiceCompletion,
                                { 'Action Status': "Aborted" }
                            )
                        );
                    
                    
                        ForAll(
                            Filter(
                                col_ShiftTimeline,
                                ShiftActionID in Filter(
                                    col_EngineerActionList,
                                    'Shift ID' = varActionRecord.'Shift ID' &&
                                    'Action Type' = "Service" &&
                                    ActionGUID <> varActionRecord.ActionGUID
                                ).ActionGUID
                            ),
                            Patch(
                                col_ShiftTimeline,
                                ThisRecord,
                                { 'Action Status': "Aborted" }
                            )
                        );
                    
                    
                        ForAll(
                            Filter(
                                col_EngineerActionList,
                                'Shift ID' = varActionRecord.'Shift ID' &&
                                'Action Type' = "Service" &&
                                ActionGUID <> varActionRecord.ActionGUID
                            ) As itemOtherService,
                            Patch(
                                BESA_BookingElements,
                                LookUp(BESA_BookingElements, BESA_BookingElement = itemOtherService.'Booking Element LookUp'.BESA_BookingElement),
                                {
                                    'Booking Element Status':    "Aborted",
                                    'Engineer Comments': inputAbortServiceReason.Text
                                }
                            )
                        )
                    );
                    
                    
                    If(
                        CountRows(
                            Filter(col_ShiftTimeline, 'Shift ID' = varActionRecord.'Shift ID' && RowType = "Action")
                        ) =
                        CountRows(
                            Filter(col_ShiftTimeline, 'Shift ID' = varActionRecord.'Shift ID' && RowType = "Action" && ('Action Status' = "Completed" || 'Action Status' = "Aborted"))
                        ),
                    
                    
                        Patch(
                            col_ShiftTimeline,
                            LookUp(col_ShiftTimeline, 'Shift ID' = varActionRecord.'Shift ID' && RowType = "Shift"),
                            { 'Action Status': "Completed" }
                        );
                    
                      
                        Patch(
                            BESA_Shifts,
                            LookUp(BESA_Shifts, 'Shift ID' = varActionRecord.'Shift ID'),
                            { 'Shift Status': "Complete" }
                        )
                    );
                    
                    // Step 6 — Reset state
                    Set(varAbortService, false);
                    Set(varServiceAction, false);
                    Set(varActionRecord, Blank());
                    Set(varServiceRecord, Blank());
                    Reset(checkEngineerAbortService);
                    Reset(inputAbortServiceReason);
                TabIndex: =0
                Text: =If(checkEngineerAbortService.Checked, "Abort Services", "Abort Service")
                Tooltip: =""
                VerticalAlign: =""
                Visible: =true
