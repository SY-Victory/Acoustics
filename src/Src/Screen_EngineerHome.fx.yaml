            Label3_662 As label:
                FontWeight: =FontWeight.Semibold
                Height: =35
                Size: =11
                Text: |-
                    =With(
                        { 
                            wthCurrentCount: CountRows(Filter(col_ShiftTimeline, 'Shift ID' = varActionRecord.'Shift ID', 'Action Type' = "Service", 'ShiftActionID' <> varActionRecord.ActionGUID))
                        }, 
                        Switch(wthCurrentCount, 
                    
                    0, "There are no other Services tied to this Shift", 
                    1, "There is " & wthCurrentCount & " other Service tied to this Shift", 
                    "There are " & wthCurrentCount & " other Services tied to this Shift" 
                        ))
                Width: =500
                X: =10
                Y: =4
