                                                ForAll(
                                                    Filter(col_OfflineTestRuns, LocalTestID = _testID && RunType = "Partition") As part,
                                                    With(
                                                        {
                                                            parentRun: LookUp(col_OfflineTestRuns, LocalRunID = part.ParentRunGUID),
