        iconPageHeaderRefresh_23 As icon:
            Color: =RGBA(0, 0, 0, 1)
            Height: =35
            Icon: =Icon.Sync
            OnSelect: |-
                =// Set(varStaffViewID, LookUp(BESA_EngineerLists, 'Staff Email Address' = "charlie@sylimited.com"));
                // Set(varStaffViewBESAID, Text(LookUp(BESA_EngineerLists, 'Staff Email Address' = "charlie@sylimited.com", BESA_EngineerList)));
                ClearCollect(col_StaffBuf, {email: User().Email});
                Clear(col_StaffResult);
                ForAll(col_StaffBuf As buf,
                    With({rec: First(Filter(BESA_EngineerLists, 'Staff Email Address' = buf.email))},
                        If(!IsBlank(rec), Collect(col_StaffResult, rec))
                    )
                );
                Set(varStaffViewID, First(col_StaffResult));
                Set(varStaffViewBESAID, Text(varStaffViewID.BESA_EngineerList));
                
                
                ClearCollect(col_EngineerActionList, { 'Site LookUp':First(col_Sites), 'Action Type': "", 'Action Name': "", 'Booking LookUp':First(col_Bookings), 'Induction LookUp':First(col_SiteInductions), 'Action Status':"", 'RAMS LookUp':First(col_RiskAssesments), 'Element LookUp':First(col_ElementList), 'Booking Element LookUp':First(col_BookingElement), 'Shift ID': "", ActionID: GUID() });
                
                //Generate Collection Holders
                
                
                ClearCollect(col_SiteInductions,  
                {
                    'Site Induction ID': GUID(),
                    'Staff LookUp':First(col_StaffMembers), 
                    'Site LookUp':First(col_Sites),
                    'Induction Date': DateValue(Today()), 
                    'Induction Status': "Pending", 
                    'Created On': Now(), 
                    'Expiry Date': DateAdd(Today(), 60, TimeUnit.Days), 
                    Comments: ""
                });
                
                ClearCollect(col_RiskAssesments, 
                { 
                    'Risk Assessment ID':GUID(),
                 'Staff LookUp':First(col_StaffMembers), 
                    'Site LookUp':First(col_Sites),
                    'Assesment Date': DateValue(Today()), 
                    'Assesment Status':"Pending", 
                    'Created On': Now()
                });
                
                Clear(col_EngineerActionList);
                Clear(col_ShiftTimeline);
                Clear(col_SiteInductions);
                Clear(col_RiskAssesments);
                
                Select(btnRefreshActionList_1);
            PaddingBottom: =7
            PaddingTop: =7
            Width: =35
            X: =43
            Y: =10
            ZIndex: =2

