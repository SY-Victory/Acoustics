        ButtonCanvas8_16 As Button:
            AcceptsFocus: =true
            AccessibleLabel: =""
            Align: =""
            Appearance: ="Primary"
            BasePaletteColor: =RGBA(8, 222, 8, 1)
            BorderColor: =
            BorderStyle: =""
            ContentLanguage: =""
            DisplayMode: |
                =If(
                    !checkSiteInductionConfirmation_2.Checked,
                    DisplayMode.Disabled,
                    
                    DisplayMode.Edit
                      
                    )
            Font: =""
            FontColor: =
            FontItalic: =false
            FontSize: =0
            FontStrikethrough: =false
            FontUnderline: =false
            FontWeight: =""
            Height: =30
            Icon: ="Save"
            IconRotation: =0
            IconStyle: ="Outline"
            Layout: ="Icon before"
            OnSelect: |-
                =
                Set(
                    varNewSiteInduction,
                Patch(
                    BESA_SiteInductions,
                    Defaults(BESA_SiteInductions),
                    {
                        'Engineer LookUp':  varStaffViewID,
                        'Site LookUp':      LookUp(BESA_Sites, BESA_Site = varCurrentSite.BESA_Site),
                        'Induction Date':   Today(),
                        'Induction Status': "Completed",
                        'Expiry Date':      DateAdd(inputSiteInductionExpiration_1.SelectedDate, 12, TimeUnit.Hours),
                        Comments:           inputSiteInductionComments_1.Text
                    }
                ));
                
                ForAll(
                    Filter(
                        col_EngineerActionList,
                        'Site LookUp'.'Site ID' = varActionRecord.'Site LookUp'.'Site ID' &&
                        'Action Type' = "Site Induction"
                    ) As itemSiteInduction,
                    Patch(
                        col_EngineerActionList,
                        itemSiteInduction,
                        {
                            'Action Status':    "Completed",
                            'Induction GUID':   Text(varNewSiteInduction.BESA_SiteInduction)
                        }
                    )
                );
                
                // Step 4 — Update col_ShiftTimeline in memory
                Patch(
                    col_ShiftTimeline,
                    LookUp(col_ShiftTimeline, ShiftActionID = varActionRecord.ActionGUID),
                    { 'Action Status': "Complete" }
                );
                
                // Step 5 — Check if all Actions on this Shift are Complete/Aborted
                //          If so, mark the Shift row in timeline and patch BESA_Shift
                If(
                    CountRows(
                        Filter(col_ShiftTimeline, 'Shift ID' = varActionRecord.'Shift ID' && RowType = "Action")
                    ) =
                    CountRows(
                        Filter(col_ShiftTimeline, 'Shift ID' = varActionRecord.'Shift ID' && RowType = "Action" && ('Action Status' = "Completed" || 'Action Status' = "Aborted"))
                    ),
                
                    Patch(
                        col_ShiftTimeline,
                        LookUp(col_ShiftTimeline, 'Shift ID' = varActionRecord.'Shift ID' && RowType = "Shift"),
                        { 'Action Status': "Complete" }
                    );
                
                    Patch(
                        BESA_Shifts,
                        LookUp(BESA_Shifts, 'Shift ID' = varActionRecord.'Shift ID'),
                        { 'Shift Status': "Complete" }
                    )
                );
                
                // Step 6 — Reset state
                Set(varInductionForm, false);
                Set(varActionRecord, Blank());
                Set(varSiteRecord, Blank());
                Reset(inputSiteInductionClientName_1);
                Reset(inputSiteInductionComments_1);
                Reset(inputSiteInductionCurrentDate_1);
                Reset(inputSiteInductionExpiration_1);
                Reset(inputSiteInductionSiteName_1);
                Reset(attachmentSiteInductionForm_1);
                Reset(checkSiteInductionConfirmation_2);
            TabIndex: =0
            Text: ="Confirm Site Induction"
            Tooltip: =""
            VerticalAlign: =""
            Visible: =true
            Width: =206
            X: =119
            Y: =533
            ZIndex: =20

