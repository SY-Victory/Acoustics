    btnSubmitRAMSSignOff As Button:
        AcceptsFocus: =true
        AccessibleLabel: =""
        Align: =""
        Appearance: ="Primary"
        BasePaletteColor: =RGBA(8, 222, 8, 1)
        BorderColor: =
        BorderStyle: =""
        ContentLanguage: =""
        DisplayMode: |-
            =If(
                !checkConfirm.Checked || IsBlank(penRAMSSignOff.Image),
                DisplayMode.Disabled,
                DisplayMode.Edit
            )
        Font: =""
        FontColor: =
        FontItalic: =false
        FontSize: =0
        FontStrikethrough: =false
        FontUnderline: =false
        FontWeight: =""
        Height: =44
        Icon: ="Send"
        IconRotation: =0
        IconStyle: ="Outline"
        Layout: ="Icon before"
        OnSelect: |-
            =Patch(col_EngineerActionList,
                LookUp(col_EngineerActionList, ActionGUID = varActionRecord.ShiftActionID),
                {'Action Status': "Complete"});
            Patch(col_ShiftTimeline,
                LookUp(col_ShiftTimeline, ShiftActionID = varActionRecord.ShiftActionID),
                {'Action Status': "Complete"});
            Patch(
                BESA_Shifts,
                LookUp(BESA_Shifts, BESA_Shift = GUID(varCurrentShiftID)),
                {'Generate RAMs': true}
            );
            Patch(BESA_Documents,
                Defaults(BESA_Documents),
                {
                    'Document Image': penRAMSSignOff.Image,
                    'Direct Related GUID': varCurrentShiftID,
                    'Document Type': "RAMS SignOff"
                }
            );
            Notify("RAMS Signed off!", NotificationType.Success);
            Reset(checkConfirm);
            Reset(penRAMSSignOff);
            Back()
        TabIndex: =0
        Text: ="Submit & Confirm Completion"
        Tooltip: =""
        VerticalAlign: =""
        Visible: =true
        Width: =320
        X: =862
        Y: =580
        ZIndex: =30
    
