                  - ctn_Partition:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        Height: =582
                        Visible: =varTestMenu.MenuCategory="Partition"
                        Width: =Parent.Width
                      Children:
                        - Container20:
                            Control: GroupContainer@1.5.0
                            Variant: ManualLayout
                            Properties:
                              Height: =560
                              Width: =300
                              X: =10
                              Y: =10
                            Children:
                              - Rectangle2_151:
                                  Control: Rectangle@2.3.0
