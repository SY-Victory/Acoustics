                                          MetricToReport: If(
                                              drpTestCategory.Selected.Value = "Impact",
                                              "L'nT,w",
                                              "DnT,w + Ctr"
                                          ),
                                          RequiredValue: With(
                                              {
                                                  _buildType: LookUp(
                                                      Table(
                                                          {Key: "Purpose built dwelling houses and flats", AirborneMin: 45, ImpactMax: 62},
                                                          {Key: "Dwelling houses and flats formed by material change of use", AirborneMin: 43, ImpactMax: 64}
                                                      ),
                                                      Key = Text(varTestInfo.BuildType)
                                                  ),
                                                  _enhancement: Value(Text(varTestInfo.Enhancement))
                                              },
                                              If(
                                                  drpTestCategory.Selected.Value = "Impact",
                                                  _buildType.ImpactMax - _enhancement,
                                                  _buildType.AirborneMin + _enhancement
                                              )
                                          ),
                                          StandardisedRT: 0.5
                                      }
                                  ),
                                  TestMetaData: JSON(
                                      {
                                          DateTimeTest: Text(dtpDateOfTest.SelectedDate, "yyyy-mm-dd"),
                                          Engineer: varStaffViewID.'Staff Name',
                                          MeasurementAveragingTime: Value(Text(varTestInfo.MeasurementAveragingTime)),
                                          SixDbRuleMet: _sixDbMet,
                                          BackgroundCorrectionApplied: _bgCorrectionApplied,
                                          ResultLimitedByBackground: _limitedByBackground
                                      }
                                  ),
                                  PreTestData: JSON(
                                      {
                                          L1: {
                                              positions: ForAll(
                                                  Distinct(
                                                      Filter(col_MeasurementDisplay, MeasurementType = "L1"),
                                                      PositionNo
                                                  ) As pos,
                                                  {
                                                      positionNo: pos.Value,
                                                      readings: ForAll(
                                                          Filter(col_MeasurementDisplay, MeasurementType = "L1" && PositionNo = pos.Value) As rd,
                                                          {
                                                              readingNo: rd.ReadingNo,
                                                              values: {
                                                                  '100': rd.Hz100, '125': rd.Hz125, '160': rd.Hz160, '200': rd.Hz200,
                                                                  '250': rd.Hz250, '315': rd.Hz315, '400': rd.Hz400, '500': rd.Hz500,
                                                                  '630': rd.Hz630, '800': rd.Hz800, '1000': rd.Hz1000, '1250': rd.Hz1250,
                                                                  '1600': rd.Hz1600, '2000': rd.Hz2000, '2500': rd.Hz2500, '3150': rd.Hz3150
                                                              }
                                                          }
                                                      )
                                                  }
                                              )
                                          },
                                          L2: {
                                              positions: ForAll(
                                                  Distinct(
                                                      Filter(col_MeasurementDisplay, MeasurementType = "L2"),
                                                      PositionNo
                                                  ) As pos,
                                                  {
                                                      positionNo: pos.Value,
                                                      readings: ForAll(
                                                          Filter(col_MeasurementDisplay, MeasurementType = "L2" && PositionNo = pos.Value) As rd,
                                                          {
                                                              readingNo: rd.ReadingNo,
                                                              values: {
                                                                  '100': rd.Hz100, '125': rd.Hz125, '160': rd.Hz160, '200': rd.Hz200,
                                                                  '250': rd.Hz250, '315': rd.Hz315, '400': rd.Hz400, '500': rd.Hz500,
                                                                  '630': rd.Hz630, '800': rd.Hz800, '1000': rd.Hz1000, '1250': rd.Hz1250,
                                                                  '1600': rd.Hz1600, '2000': rd.Hz2000, '2500': rd.Hz2500, '3150': rd.Hz3150
                                                              }
                                                          }
                                                      )
                                                  }
                                              )
                                          },
                                          B2: ForAll(
                                              Filter(col_MeasurementDisplay, MeasurementType = "B2") As rd,
                                              {
                                                  readingNo: rd.ReadingNo,
                                                  values: {
                                                      '100': rd.Hz100, '125': rd.Hz125, '160': rd.Hz160, '200': rd.Hz200,
                                                      '250': rd.Hz250, '315': rd.Hz315, '400': rd.Hz400, '500': rd.Hz500,
                                                      '630': rd.Hz630, '800': rd.Hz800, '1000': rd.Hz1000, '1250': rd.Hz1250,
                                                      '1600': rd.Hz1600, '2000': rd.Hz2000, '2500': rd.Hz2500, '3150': rd.Hz3150
                                                  }
                                              }
                                          ),
                                          T2: {
                                              sourcePositions: ForAll(
                                                  Distinct(
                                                      Filter(col_MeasurementDisplay, MeasurementType = "T2"),
                                                      PositionNo
                                                  ) As pos,
                                                  {
                                                      positionNo: pos.Value,
                                                      readings: ForAll(
                                                          Filter(col_MeasurementDisplay, MeasurementType = "T2" && PositionNo = pos.Value) As rd,
                                                          {
                                                              readingNo: rd.ReadingNo,
                                                              values: {
                                                                  '100': rd.Hz100, '125': rd.Hz125, '160': rd.Hz160, '200': rd.Hz200,
                                                                  '250': rd.Hz250, '315': rd.Hz315, '400': rd.Hz400, '500': rd.Hz500,
                                                                  '630': rd.Hz630, '800': rd.Hz800, '1000': rd.Hz1000, '1250': rd.Hz1250,
                                                                  '1600': rd.Hz1600, '2000': rd.Hz2000, '2500': rd.Hz2500, '3150': rd.Hz3150
                                                              }
                                                          }
                                                      )
                                                  }
                                              )
                                          }
                                      }
                                  )
                              }
                          );

                          // =============================================
                          // STEP 2 — Validate & update partition status
                          // =============================================
                          UpdateContext({
                              _isComplete:
                              !IsBlank(txtSourceRoom.Text)
                                  && !IsBlank(txtReceiverRoom.Text)
                                  && Value(txtSourceRoomVolume.Text) > 0
                                  && Value(txtReceiverRoomVolume.Text) > 0
                                  && (
                                      drpTestCategory.Selected.Value = "Impact"
                                      || CountRows(Filter(col_MeasurementDisplay, MeasurementType = "L1")) > 0
                                  )
                                  && CountRows(Filter(col_MeasurementDisplay, MeasurementType = "L2")) > 0
                                  && CountRows(Filter(col_MeasurementDisplay, MeasurementType = "B2")) > 0
                                  && CountRows(Filter(col_MeasurementDisplay, MeasurementType = "T2")) > 0
                          });

                          Patch(
                              BESA_TestRuns,
                              LookUp(BESA_TestRuns, BESA_TestRun = cVar_CurrentPartition.PartitionID),
                              {
                                  'Test Status': If(_isComplete, "Complete", "In Progress")
                              }
                          );

                          // =============================================
                          // STEP 3 — Update parent run status
                          // =============================================
                          With(
                              {
                                  _runParts: Filter(
                                      BESA_TestRuns,
                                      'Parent Run GUID' = Text(cVar_CurrentPartition.TestRunID)
                                          && 'Run Type' = "Partition"
                                  )
                              },
                              Patch(
                                  BESA_TestRuns,
                                  LookUp(BESA_TestRuns, BESA_TestRun = cVar_CurrentPartition.TestRunID),
                                  {
                                      'Test Status': If(
                                          CountRows(Filter(_runParts, 'Test Status' <> "Complete")) = 0
                                              && CountRows(_runParts) > 0,
                                          "Complete",
                                          "In Progress"
                                      )
                                  }
                              )
                          );

                          // =============================================
                          // STEP 4 — Recollect partitions from database
                          // =============================================
                          ClearCollect(
                              col_AcousticPartitions,
                              ForAll(
                                  Filter(
                                      BESA_TestRuns,
                                      'Test LookUp'.BESA_Test = varActionRecord.BESA_Test
                                          && 'Run Type' = "Partition"
                                  ) As part,
                                  With(
                                      {
                                          parentRun: LookUp(
                                              BESA_TestRuns,
                                              BESA_TestRun = GUID(part.'Parent Run GUID')
                                          )
                                      },
                                      {
                                          PartitionID: part.BESA_TestRun,
                                          TestRunID: parentRun.BESA_TestRun,
                                          RunLabel: parentRun.'Test Name',
                                          PartitionNo: part.'Test No',
                                          TestStatus: part.'Test Status',
                                          PartitionLabel: If(
                                              IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                              "", Text(ParseJSON(part.PartitionData).PartitionLabel)
                                          ),
                                          TestCategory: If(
                                              IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                              "", Text(ParseJSON(part.PartitionData).TestCategory)
                                          ),
                                          PartitionType: If(
                                              IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                              "", Text(ParseJSON(part.PartitionData).PartitionType)
                                          ),
                                          SourceRoom: If(
                                              IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                              "", Text(ParseJSON(part.PartitionData).SourceRoom)
                                          ),
                                          ReceiverRoom: If(
                                              IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                              "", Text(ParseJSON(part.PartitionData).ReceiverRoom)
                                          ),
                                          SourceRoomVolume: If(
                                              IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                              0, Value(Text(ParseJSON(part.PartitionData).SourceRoomVolume))
                                          ),
                                          ReceiverRoomVolume: If(
                                              IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                              0, Value(Text(ParseJSON(part.PartitionData).ReceiverRoomVolume))
                                          ),
                                          RequiredValue: If(
                                              IsBlank(part.PartitionData) || part.PartitionData = "{}",
                                              0, Value(Text(ParseJSON(part.PartitionData).RequiredValue))
                                          ),
                                          SixDbRuleMet: If(
                                              IsBlank(part.TestMetaData) || part.TestMetaData = "{}",
                                              true, Boolean(ParseJSON(part.TestMetaData).SixDbRuleMet)
                                          ),
                                          ResultLimitedByBackground: If(
                                              IsBlank(part.TestMetaData) || part.TestMetaData = "{}",
                                              false, Boolean(ParseJSON(part.TestMetaData).ResultLimitedByBackground)
                                          ),
                                          MeasurementData: If(
                                              IsBlank(part.PreTestData) || part.PreTestData = "{}",
                                              ParseJSON("{}"), ParseJSON(part.PreTestData)
                                          ),
                                          HasMeasurementData: !(IsBlank(part.PreTestData) || part.PreTestData = "{}"),
                                          Results: If(
                                              IsBlank(part.SummaryResults) || part.SummaryResults = "{}",
                                              ParseJSON("{}"), ParseJSON(part.SummaryResults)
                                          ),
                                          DnTwPlusCtr: If(
                                              IsBlank(part.SummaryResults) || part.SummaryResults = "{}",
                                              Blank(), Value(Text(ParseJSON(part.SummaryResults).DnTwPlusCtr))
                                          ),
                                          LnTw: If(
                                              IsBlank(part.SummaryResults) || part.SummaryResults = "{}",
                                              Blank(), Value(Text(ParseJSON(part.SummaryResults).LnTw))
                                          ),
                                          PassFail: If(
                                              IsBlank(part.SummaryResults) || part.SummaryResults = "{}",
                                              "", Text(ParseJSON(part.SummaryResults).Result)
                                          )
                                      }
                                  )
                              )
                          );

                          // =============================================
                          // STEP 5 — Recollect runs
                          // =============================================
                          ClearCollect(
                              col_AcousticTestRuns,
                              ForAll(
                                  Filter(
                                      BESA_TestRuns,
                                      'Test LookUp'.BESA_Test = varActionRecord.BESA_Test
                                          && 'Run Type' = "Run"
                                  ) As run,
                                  {
                                      TestRunID: run.BESA_TestRun,
                                      RunLabel: run.'Test Name',
                                      RunDate: run.'Run Date',
                                      Engineer: run.Engineer,
                                      TestStatus: run.'Test Status',
                                      PartitionCount: CountRows(
                                          Filter(BESA_TestRuns, 'Parent Run GUID' = Text(run.BESA_TestRun))
                                      )
                                  }
                              )
                          );

                          // =============================================
                          // STEP 6 — Rebuild results tables
                          // =============================================
                          ClearCollect(
                              col_AirborneResults,
                              ForAll(
                                  SortByColumns(
                                      Filter(col_AcousticPartitions, TestCategory = "Airborne"),
                                      "PartitionNo", SortOrder.Ascending
                                  ) As part,
                                  With(
                                      {_parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID)},
                                      {
                                          Sort: part.PartitionNo,
                                          DateOfTest: If(!IsBlank(_parentRun.RunDate), Text(_parentRun.RunDate, "dd/mm/yyyy"), ""),
                                          TestReportNumber: Text(ParseJSON(
                                              LookUp(BESA_TestRuns, BESA_TestRun = part.PartitionID).PartitionData
                                          ).TestReportNumber),
                                          SourceRoom: part.SourceRoom,
                                          SourceRoomVolume: part.SourceRoomVolume,
                                          ReceiverRoom: part.ReceiverRoom,
                                          ReceiverRoomVolume: part.ReceiverRoomVolume,
                                          PartitionType: part.PartitionType,
                                          PartitionLabel: part.PartitionLabel,
                                          Measured: If(
                                              !IsBlank(part.DnTwPlusCtr),
                                              Text(part.DnTwPlusCtr)
                                                  & If(!part.SixDbRuleMet, "[4]", "")
                                                  & If(part.ResultLimitedByBackground, "≥", ""),
                                              "—"
                                          ),
                                          MeasuredValue: If(!IsBlank(part.DnTwPlusCtr), part.DnTwPlusCtr, 0),
                                          Required: "≥" & Text(part.RequiredValue),
                                          RequiredValue: part.RequiredValue,
                                          PassFail: part.PassFail,
                                          RunLabel: If(!IsBlank(_parentRun), _parentRun.RunLabel, ""),
                                          Engineer: If(!IsBlank(_parentRun), _parentRun.Engineer, ""),
                                          DnTw: If(
                                              !IsBlank(part.Results) && !IsBlank(part.Results.DnTw),
                                              Value(Text(part.Results.DnTw)), Blank()
                                          ),
                                          C: If(
                                              !IsBlank(part.Results) && !IsBlank(part.Results.C),
                                              Value(Text(part.Results.C)), Blank()
                                          ),
                                          Ctr: If(
                                              !IsBlank(part.Results) && !IsBlank(part.Results.Ctr),
                                              Value(Text(part.Results.Ctr)), Blank()
                                          )
                                      }
                                  )
                              )
                          );

                          ClearCollect(
                              col_ImpactResults,
                              ForAll(
                                  SortByColumns(
                                      Filter(col_AcousticPartitions, TestCategory = "Impact"),
                                      "PartitionNo", SortOrder.Ascending
                                  ) As part,
                                  With(
                                      {_parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID)},
                                      {
                                          Sort: part.PartitionNo,
                                          DateOfTest: If(!IsBlank(_parentRun.RunDate), Text(_parentRun.RunDate, "dd/mm/yyyy"), ""),
                                          TestReportNumber: Text(ParseJSON(
                                              LookUp(BESA_TestRuns, BESA_TestRun = part.PartitionID).PartitionData
                                          ).TestReportNumber),
                                          SourceRoom: part.SourceRoom,
                                          SourceRoomVolume: part.SourceRoomVolume,
                                          ReceiverRoom: part.ReceiverRoom,
                                          ReceiverRoomVolume: part.ReceiverRoomVolume,
                                          PartitionLabel: part.PartitionLabel,
                                          Measured: If(
                                              !IsBlank(part.LnTw),
                                              Text(part.LnTw)
                                                  & If(part.ResultLimitedByBackground, "≤", ""),
                                              "—"
                                          ),
                                          MeasuredValue: If(!IsBlank(part.LnTw), part.LnTw, 0),
                                          Required: "≤" & Text(part.RequiredValue),
                                          RequiredValue: part.RequiredValue,
                                          PassFail: part.PassFail,
                                          RunLabel: If(!IsBlank(_parentRun), _parentRun.RunLabel, ""),
                                          Engineer: If(!IsBlank(_parentRun), _parentRun.Engineer, ""),
                                          LnTw: If(!IsBlank(part.LnTw), part.LnTw, Blank())
                                      }
                                  )
                              )
                          );

                          UpdateContext({cVar_PartitionAdditionalInfo: Blank(),_refreshResults: !_refreshResults});
                        Text: ="Test Data Run -Summary"
