                              - ButtonCanvas5_12:
                                  Control: Button@0.0.45
                                  Properties:
                                    BasePaletteColor: =fxPrimary
                                    Height: =30
                                    Icon: ="CheckmarkCircle"
                                    OnSelect: |
                                      =// =============================================
                                      // btnSavePartitionPage.OnSelect
                                      // Merges: flag calculation + results save + run status
                                      // =============================================

                                      // ── STEP 1: Save Airborne Partitions (flags + nums + results) ──
                                      ForAll(
