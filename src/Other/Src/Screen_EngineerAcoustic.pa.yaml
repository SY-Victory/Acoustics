                  - ButtonTestChecks:
                      Control: Button@0.0.45
                      Properties:
                        OnSelect: |-
                          =UpdateContext({
                              _sixDbMet:
                              !Not(
                                  IsEmpty(
                                      Filter(
                                          col_MeasurementDisplay,
                                          MeasurementType = "L1"
                                      )
                                  )
                              )
                              &&
                              CountRows(
                                  Filter(
                                      // Check all adjacent pairs across all L1 readings
                                      AddColumns(
                                          Filter(col_MeasurementDisplay, MeasurementType = "L1"),
                                          MaxDiff,
                                          Max(
                                              Table(
                                                  {Diff: Abs(Hz100 - Hz125)},
                                                  {Diff: Abs(Hz125 - Hz160)},
                                                  {Diff: Abs(Hz160 - Hz200)},
                                                  {Diff: Abs(Hz200 - Hz250)},
                                                  {Diff: Abs(Hz250 - Hz315)},
                                                  {Diff: Abs(Hz315 - Hz400)},
                                                  {Diff: Abs(Hz400 - Hz500)},
                                                  {Diff: Abs(Hz500 - Hz630)},
                                                  {Diff: Abs(Hz630 - Hz800)},
                                                  {Diff: Abs(Hz800 - Hz1000)},
                                                  {Diff: Abs(Hz1000 - Hz1250)},
                                                  {Diff: Abs(Hz1250 - Hz1600)},
                                                  {Diff: Abs(Hz1600 - Hz2000)},
                                                  {Diff: Abs(Hz2000 - Hz2500)},
                                                  {Diff: Abs(Hz2500 - Hz3150)}
                                              ),
                                              Diff
                                          )
                                      ),
                                      MaxDiff > 6
                                  )
                              ) = 0
                          });

                          // Average L2 across positions
                          UpdateContext({
                              _avgL2:
                              {
                                  Hz100: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz100),
                                  Hz125: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz125),
                                  Hz160: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz160),
                                  Hz200: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz200),
                                  Hz250: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz250),
                                  Hz315: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz315),
                                  Hz400: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz400),
                                  Hz500: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz500),
                                  Hz630: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz630),
                                  Hz800: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz800),
                                  Hz1000: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz1000),
                                  Hz1250: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz1250),
                                  Hz1600: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz1600),
                                  Hz2000: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz2000),
                                  Hz2500: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz2500),
                                  Hz3150: Average(Filter(col_MeasurementDisplay, MeasurementType = "L2"), Hz3150)
                              }
                          });

                          // Get B2 (first reading)
                          UpdateContext({
                              _b2:
                              LookUp(col_MeasurementDisplay, MeasurementType = "B2")
                          });

                          // Build difference table
                          UpdateContext({
                              _bgDiffs:
                              Table(
                                  {Freq: "100",  Diff: _avgL2.Hz100 - _b2.Hz100},
                                  {Freq: "125",  Diff: _avgL2.Hz125 - _b2.Hz125},
                                  {Freq: "160",  Diff: _avgL2.Hz160 - _b2.Hz160},
                                  {Freq: "200",  Diff: _avgL2.Hz200 - _b2.Hz200},
                                  {Freq: "250",  Diff: _avgL2.Hz250 - _b2.Hz250},
                                  {Freq: "315",  Diff: _avgL2.Hz315 - _b2.Hz315},
                                  {Freq: "400",  Diff: _avgL2.Hz400 - _b2.Hz400},
                                  {Freq: "500",  Diff: _avgL2.Hz500 - _b2.Hz500},
                                  {Freq: "630",  Diff: _avgL2.Hz630 - _b2.Hz630},
                                  {Freq: "800",  Diff: _avgL2.Hz800 - _b2.Hz800},
                                  {Freq: "1000", Diff: _avgL2.Hz1000 - _b2.Hz1000},
                                  {Freq: "1250", Diff: _avgL2.Hz1250 - _b2.Hz1250},
                                  {Freq: "1600", Diff: _avgL2.Hz1600 - _b2.Hz1600},
                                  {Freq: "2000", Diff: _avgL2.Hz2000 - _b2.Hz2000},
                                  {Freq: "2500", Diff: _avgL2.Hz2500 - _b2.Hz2500},
                                  {Freq: "3150", Diff: _avgL2.Hz3150 - _b2.Hz3150}
                              )
                          });

                          // Flags
                          UpdateContext({
                              _bgCorrectionApplied:
                              CountRows(Filter(_bgDiffs, Diff >= 6 && Diff <= 10)) > 0
                          });

                          UpdateContext({
                              _limitedByBackground:
                              CountRows(Filter(_bgDiffs, Diff < 6)) > 0
                          });
