                                                              Hz630: Value(cVar_CurrentPartition.Results.DSpectral.'630'),
                                                              Hz800: Value(cVar_CurrentPartition.Results.DSpectral.'800'),
                                                              Hz1000: Value(cVar_CurrentPartition.Results.DSpectral.'1000'),
                                                              Hz1250: Value(cVar_CurrentPartition.Results.DSpectral.'1250'),
