                                          - btnRefreshMeasurements:
                                              Control: Button@0.0.45
                                              Properties:
                                                DisplayMode: |-
                                                  =If(
                                                      IsBlank(TaskNameInput_89.Text) || TaskNameInput_89.Text = "" ||
                                                      IsBlank(TaskNameInput_90.Text) || TaskNameInput_90.Text = "" ||
                                                      CountRows(Filter(col_PermPostAtmosphericConditions, Complete = true)) <> CountRows(col_PermPostAtmosphericConditions),
                                                      DisplayMode.Disabled,
                                                      DisplayMode.Edit
                                                  )
                                                Height: =33
                                                Icon: ="Save"
                                                OnSelect: |-
                                                  =// L1
                                                  ClearCollect(
                                                      col_MeasurementDisplay,
                                                      If(
                                                          IsBlank(cVar_CurrentPartition.MeasurementData)
                                                              || IsEmpty(cVar_CurrentPartition.MeasurementData.L1.positions),
                                                          Table(),
                                                          Ungroup(
                                                              ForAll(
                                                                  cVar_CurrentPartition.MeasurementData.L1.positions As pos,
                                                                  ForAll(
                                                                      pos.readings As rd,
                                                                      {
                                                                          Sort: 1000 + Value(pos.positionNo) * 10 + Value(rd.readingNo),
                                                                          MeasurementType: "L1",
                                                                          Label: "L1 - Pos " & Text(pos.positionNo) & " Rd " & Text(rd.readingNo),
                                                                          PositionNo: Value(pos.positionNo),
                                                                          ReadingNo: Value(rd.readingNo),
                                                                          Hz100: Value(rd.values.'100'), Hz125: Value(rd.values.'125'),
                                                                          Hz160: Value(rd.values.'160'), Hz200: Value(rd.values.'200'),
                                                                          Hz250: Value(rd.values.'250'), Hz315: Value(rd.values.'315'),
                                                                          Hz400: Value(rd.values.'400'), Hz500: Value(rd.values.'500'),
                                                                          Hz630: Value(rd.values.'630'), Hz800: Value(rd.values.'800'),
                                                                          Hz1000: Value(rd.values.'1000'), Hz1250: Value(rd.values.'1250'),
                                                                          Hz1600: Value(rd.values.'1600'), Hz2000: Value(rd.values.'2000'),
                                                                          Hz2500: Value(rd.values.'2500'), Hz3150: Value(rd.values.'3150')
                                                                      }
                                                                  )
                                                              ),
                                                              Value
                                                          )
                                                      )
                                                  );

                                                  // L2
                                                  Collect(
                                                      col_MeasurementDisplay,
                                                      If(
                                                          IsBlank(cVar_CurrentPartition.MeasurementData)
                                                              || IsEmpty(cVar_CurrentPartition.MeasurementData.L2.positions),
                                                          Table(),
                                                          Ungroup(
                                                              ForAll(
                                                                  cVar_CurrentPartition.MeasurementData.L2.positions As pos,
                                                                  ForAll(
                                                                      pos.readings As rd,
                                                                      {
                                                                          Sort: 2000 + Value(pos.positionNo) * 10 + Value(rd.readingNo),
                                                                          MeasurementType: "L2",
                                                                          Label: "L2 - Pos " & Text(pos.positionNo) & " Rd " & Text(rd.readingNo),
                                                                          PositionNo: Value(pos.positionNo),
                                                                          ReadingNo: Value(rd.readingNo),
                                                                          Hz100: Value(rd.values.'100'), Hz125: Value(rd.values.'125'),
                                                                          Hz160: Value(rd.values.'160'), Hz200: Value(rd.values.'200'),
                                                                          Hz250: Value(rd.values.'250'), Hz315: Value(rd.values.'315'),
                                                                          Hz400: Value(rd.values.'400'), Hz500: Value(rd.values.'500'),
                                                                          Hz630: Value(rd.values.'630'), Hz800: Value(rd.values.'800'),
                                                                          Hz1000: Value(rd.values.'1000'), Hz1250: Value(rd.values.'1250'),
                                                                          Hz1600: Value(rd.values.'1600'), Hz2000: Value(rd.values.'2000'),
                                                                          Hz2500: Value(rd.values.'2500'), Hz3150: Value(rd.values.'3150')
                                                                      }
                                                                  )
                                                              ),
                                                              Value
                                                          )
                                                      )
                                                  );

                                                  // B2
                                                  Collect(
                                                      col_MeasurementDisplay,
                                                      If(
                                                          IsBlank(cVar_CurrentPartition.MeasurementData)
                                                              || IsEmpty(cVar_CurrentPartition.MeasurementData.B2),
                                                          Table(),
                                                          ForAll(
                                                              cVar_CurrentPartition.MeasurementData.B2 As rd,
                                                              {
                                                                  Sort: 3000 + Value(rd.readingNo),
                                                                  MeasurementType: "B2",
                                                                  Label: "B2 - Rd " & Text(rd.readingNo),
                                                                  PositionNo: 0,
                                                                  ReadingNo: Value(rd.readingNo),
                                                                  Hz100: Value(rd.values.'100'), Hz125: Value(rd.values.'125'),
                                                                  Hz160: Value(rd.values.'160'), Hz200: Value(rd.values.'200'),
                                                                  Hz250: Value(rd.values.'250'), Hz315: Value(rd.values.'315'),
                                                                  Hz400: Value(rd.values.'400'), Hz500: Value(rd.values.'500'),
                                                                  Hz630: Value(rd.values.'630'), Hz800: Value(rd.values.'800'),
                                                                  Hz1000: Value(rd.values.'1000'), Hz1250: Value(rd.values.'1250'),
                                                                  Hz1600: Value(rd.values.'1600'), Hz2000: Value(rd.values.'2000'),
                                                                  Hz2500: Value(rd.values.'2500'), Hz3150: Value(rd.values.'3150')
                                                              }
                                                          )
                                                      )
                                                  );

                                                  // T2
                                                  Collect(
                                                      col_MeasurementDisplay,
                                                      If(
                                                          IsBlank(cVar_CurrentPartition.MeasurementData)
                                                              || IsEmpty(cVar_CurrentPartition.MeasurementData.T2.sourcePositions),
                                                          Table(),
                                                          Ungroup(
                                                              ForAll(
                                                                  cVar_CurrentPartition.MeasurementData.T2.sourcePositions As pos,
                                                                  ForAll(
                                                                      pos.readings As rd,
                                                                      {
                                                                          Sort: 4000 + Value(pos.positionNo) * 10 + Value(rd.readingNo),
                                                                          MeasurementType: "T2",
                                                                          Label: "T2 - Pos " & Text(pos.positionNo) & " Rd " & Text(rd.readingNo),
                                                                          PositionNo: Value(pos.positionNo),
                                                                          ReadingNo: Value(rd.readingNo),
                                                                          Hz100: Value(rd.values.'100'), Hz125: Value(rd.values.'125'),
                                                                          Hz160: Value(rd.values.'160'), Hz200: Value(rd.values.'200'),
                                                                          Hz250: Value(rd.values.'250'), Hz315: Value(rd.values.'315'),
                                                                          Hz400: Value(rd.values.'400'), Hz500: Value(rd.values.'500'),
                                                                          Hz630: Value(rd.values.'630'), Hz800: Value(rd.values.'800'),
                                                                          Hz1000: Value(rd.values.'1000'), Hz1250: Value(rd.values.'1250'),
                                                                          Hz1600: Value(rd.values.'1600'), Hz2000: Value(rd.values.'2000'),
                                                                          Hz2500: Value(rd.values.'2500'), Hz3150: Value(rd.values.'3150')
                                                                      }
                                                                  )
                                                              ),
                                                              Value
                                                          )
                                                      )
                                                  );

                                                  // ── Section headers ──
                                                  Collect(
                                                      col_MeasurementDisplay,
                                                      // Only add L1 header if airborne
                                                      If(
                                                          cVar_CurrentPartition.TestCategory = "Airborne",
                                                          {
                                                              Sort: 999, MeasurementType: "Header", Label: "Source Room (L1)",
                                                              PositionNo: 0, ReadingNo: 0,
                                                              Hz100: Blank(), Hz125: Blank(), Hz160: Blank(), Hz200: Blank(),
                                                              Hz250: Blank(), Hz315: Blank(), Hz400: Blank(), Hz500: Blank(),
                                                              Hz630: Blank(), Hz800: Blank(), Hz1000: Blank(), Hz1250: Blank(),
                                                              Hz1600: Blank(), Hz2000: Blank(), Hz2500: Blank(), Hz3150: Blank()
                                                          }
                                                      ),
                                                      {
