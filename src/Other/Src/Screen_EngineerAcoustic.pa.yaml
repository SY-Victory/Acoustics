                                          Height: =35
                                          Icon: ="DismissCircle"
                                          Layout: ='ButtonCanvas.Layout'.IconOnly
                                          OnSelect: |-
                                            =// Don't allow removal of last row in a section
                                            With(
                                                {
                                                    _type: ThisItem.MeasurementType,
                                                    _count: CountRows(
                                                        Filter(col_MeasurementDisplay, MeasurementType = ThisItem.MeasurementType)
                                                    )
                                                },

                                                If(
                                                    _count <= 1,
                                                    Notify(
                                                        "Cannot remove last " & _type & " row",
                                                        NotificationType.Warning
                                                    ),

                                                    // Remove this specific row
                                                    RemoveIf(
                                                        col_MeasurementDisplay,
                                                        Sort = ThisItem.Sort
                                                    )
                                                )
                                            );
                                          Text: =
                                          Visible: |-
                                            =// Only show on data rows, not headers or calculated results
                                            ThisItem.MeasurementType in ["L1", "L2", "B2", "T2"]
                                          Width: =30
                                          X: =915
                                          Y: =3
                                    - btnAddPartitionRow:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          BasePaletteColor: =fxPrimary
                                          FontColor: =RGBA(255, 255, 255, 1)
                                          Icon: ="Add"
                                          OnSelect: |-
                                            =With(
                                                {
                                                    // Determine which section based on header Sort
                                                    _type: Switch(
                                                        ThisItem.Sort,
                                                        999,  "L1",
                                                        1999, "L2",
                                                        2999, "B2",
                                                        3999, "T2"
                                                    ),
                                                    _rangeStart: Switch(
                                                        ThisItem.Sort,
                                                        999,  1000,
                                                        1999, 2000,
                                                        2999, 3000,
                                                        3999, 4000
                                                    ),
                                                    _rangeEnd: Switch(
                                                        ThisItem.Sort,
                                                        999,  1999,
                                                        1999, 2999,
                                                        2999, 3999,
                                                        3999, 4999
                                                    )
                                                },

                                                With(
                                                    {
                                                        _existingRows: Filter(
                                                            col_MeasurementDisplay,
                                                            MeasurementType = _type
                                                        ),
                                                        _maxPosition: Max(
                                                            Filter(col_MeasurementDisplay, MeasurementType = _type),
                                                            PositionNo
                                                        ),
                                                        _maxReading: If(
                                                            _type = "B2",
                                                            Max(Filter(col_MeasurementDisplay, MeasurementType = "B2"), ReadingNo),
                                                            Max(
                                                                Filter(
                                                                    col_MeasurementDisplay,
                                                                    MeasurementType = _type
                                                                        && PositionNo = Max(
                                                                            Filter(col_MeasurementDisplay, MeasurementType = _type),
                                                                            PositionNo
                                                                        )
                                                                ),
                                                                ReadingNo
                                                            )
                                                        ),
                                                        _maxSort: Max(
                                                            Filter(
                                                                col_MeasurementDisplay,
                                                                Sort >= _rangeStart && Sort < _rangeEnd
                                                            ),
                                                            Sort
                                                        )
                                                    },

                                                    With(
                                                        {
                                                            _newPosition: If(
                                                                _type = "B2",
                                                                0,
                                                                Coalesce(_maxPosition, 0) + 1
                                                            ),
                                                            _newReading: If(
                                                                _type = "B2",
                                                                Coalesce(_maxReading, 0) + 1,
                                                                1
                                                            ),
                                                            _newSort: Coalesce(_maxSort, _rangeStart) + 1
                                                        },

                                                        Collect(
                                                            col_MeasurementDisplay,
                                                            {
                                                                Sort: _newSort,
                                                                MeasurementType: _type,
                                                                Label: Switch(
                                                                    _type,
                                                                    "L1", "L1 - Pos " & Text(_newPosition) & " Rd 1",
                                                                    "L2", "L2 - Pos " & Text(_newPosition) & " Rd 1",
                                                                    "B2", "B2 - Rd " & Text(_newReading),
                                                                    "T2", "T2 - Pos " & Text(_newPosition) & " Rd 1"
                                                                ),
                                                                PositionNo: _newPosition,
                                                                ReadingNo: _newReading,
                                                                Hz100: 0, Hz125: 0, Hz160: 0, Hz200: 0,
                                                                Hz250: 0, Hz315: 0, Hz400: 0, Hz500: 0,
                                                                Hz630: 0, Hz800: 0, Hz1000: 0, Hz1250: 0,
                                                                Hz1600: 0, Hz2000: 0, Hz2500: 0, Hz3150: 0
                                                            }
                                                        )
                                                    )
                                                )
                                            );
                                          Text: ="Add Row"
                                          Visible: =If(ThisItem.MeasurementType = "Header", true, false)
                                          Width: =120
                                          X: =820
                                          Y: =4
