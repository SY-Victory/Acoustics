                                                              Hz630: Value(cVar_CurrentPartition.Results.LnTSpectral.'630'),
                                                              Hz800: Value(cVar_CurrentPartition.Results.LnTSpectral.'800'),
                                                              Hz1000: Value(cVar_CurrentPartition.Results.LnTSpectral.'1000'),
                                                              Hz1250: Value(cVar_CurrentPartition.Results.LnTSpectral.'1250'),
