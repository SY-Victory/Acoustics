                                          - btnAddPartition:
                                              Control: Button@0.0.45
                                              Properties:
                                                OnSelect: |-
                                                  =// btnAddPartition.OnSelect

                                                  With(
                                                      {
                                                          _parentRun: LookUp(
                                                              col_AcousticTestRuns,
                                                              TestRunID = varSelectedTestRunID
                                                          ),
                                                          _existingCount: CountRows(
                                                              Filter(
                                                                  col_AcousticPartitions,
                                                                  TestRunID = varSelectedTestRunID
                                                              )
                                                          ),
                                                          _totalCount: CountRows(col_AcousticPartitions),
                                                          _buildType: LookUp(
                                                              Table(
                                                                  {Key: "Purpose built dwelling houses and flats", AirborneMin: 45, ImpactMax: 62},
                                                                  {Key: "Dwelling houses and flats formed by material change of use", AirborneMin: 43, ImpactMax: 64}
                                                              ),
                                                              Key = Text(varTestInfo.BuildType)
                                                          ),
                                                          _enhancement: Value(Text(varTestInfo.Enhancement))
                                                      },

                                                      With(
                                                          {
                                                              _nextLabel: Char(64 + _totalCount + 1),
                                                              _nextNo: _totalCount + 1
                                                          },

                                                          // ── Create partition record ──
                                                          Set(
                                                              varNewPartition,
                                                              Patch(
                                                                  BESA_TestRuns,
                                                                  Defaults(BESA_TestRuns),
                                                                  {
                                                                      'Test LookUp': LookUp(
                                                                          BESA_Tests,
                                                                          BESA_Test = varActionRecord.BESA_Test
                                                                      ),
                                                                      'Parent Run GUID': Text(_parentRun.TestRunID),
                                                                      'Run Type': "Partition",
                                                                      'Test No': _nextNo,
                                                                      'Test Name': "Partition " & _nextLabel,
                                                                      'Test Status': "Pending",
                                                                      PartitionData: JSON(
                                                                          {
                                                                              PartitionLabel: _nextLabel,
                                                                              TestReportNumber: "",
                                                                              TestCategory: "Airborne",
                                                                              PartitionType: "Wall",
                                                                              ConstructionType: "",
                                                                              SourceRoom: "",
                                                                              ReceiverRoom: "",
                                                                              SourceRoomVolume: 0,
                                                                              ReceiverRoomVolume: 0,
                                                                              SeparatingElementArea: 0,
                                                                              MetricToReport: "DnT,w + Ctr",
                                                                              RequiredValue: If(
                                                                                  !IsBlank(_buildType),
                                                                                  _buildType.AirborneMin + _enhancement,
                                                                                  45
                                                                              ),
                                                                              StandardisedRT: 0.5
                                                                          }
                                                                      ),
                                                                      TestMetaData: JSON(
                                                                          {
                                                                              SixDbRuleMet: true,
                                                                              BackgroundCorrectionApplied: false,
                                                                              ResultLimitedByBackground: false,
                                                                              SmallRoomUsed: false
                                                                          }
                                                                      ),
                                                                      PreTestData: JSON(
                                                                          {
                                                                              L1: {positions: []},
                                                                              L2: {positions: []},
                                                                              B2: [],
                                                                              T2: {sourcePositions: []}
                                                                          }
                                                                      ),
                                                                      SummaryResults: JSON({})
                                                                  }
                                                              )
                                                          );

                                                          // ── Add to partitions collection ──
                                                          Collect(
                                                              col_AcousticPartitions,
                                                              {
                                                                  PartitionID: varNewPartition.BESA_TestRun,
                                                                  TestRunID: _parentRun.TestRunID,
                                                                  RunLabel: _parentRun.RunLabel,
                                                                  PartitionNo: _nextNo,
                                                                  TestStatus: "Pending",
                                                                  PartitionLabel: _nextLabel,
                                                                  TestCategory: "Airborne",
                                                                  PartitionType: "Wall",
                                                                  SourceRoom: "",
                                                                  ReceiverRoom: "",
                                                                  RequiredValue: If(
                                                                      !IsBlank(_buildType),
                                                                      _buildType.AirborneMin + _enhancement,
                                                                      45
                                                                  ),
                                                                  SixDbRuleMet: true,
                                                                  ResultLimitedByBackground: false,
                                                                  MeasurementData: ParseJSON("{}"),
                                                                  HasMeasurementData: false,
                                                                  Results: ParseJSON("{}"),
                                                                  DnTwPlusCtr: Blank(),
                                                                  LnTw: Blank(),
                                                                  PassFail: ""
                                                              }
                                                          );

                                                          // ── Update run partition count ──
                                                          UpdateIf(
                                                              col_AcousticTestRuns,
                                                              TestRunID = _parentRun.TestRunID,
                                                              {
                                                                  PartitionCount: _existingCount + 1
                                                              }
                                                          );

                                                          // ── Select the new partition ──
                                                          UpdateContext({
                                                              cVar_CurrentPartition: LookUp(
                                                                  col_AcousticPartitions,
                                                                  PartitionID = varNewPartition.BESA_TestRun
                                                              )
                                                          });

                                                          Select(btnRefreshMeasurements);
                                                      )
                                                  );

                                                  // Re-Collect

                                                  ClearCollect(
                                                      col_TestRunsAndPartitions,
                                                      AddColumns(
                                                          col_AcousticTestRuns,
                                                          IsPartition, false,
                                                          StatusIcon, Switch(TestStatus, "Complete", "✓", "In Progress", "🔄", "⚠️"),
                                                          CompletedCount, CountRows(Filter(col_AcousticPartitions, TestRunID = TestRunID && TestStatus = "Complete")),
                                                          TotalCount, CountRows(Filter(col_AcousticPartitions, TestRunID = TestRunID)),
                                                          DisplayResult, "",
                                                          DisplayRequired, "",
                                                          DisplayDeviations, "",
                                                          PartitionNo, 0
                                                      )
                                                  );

                                                  Collect(
                                                      col_TestRunsAndPartitions,
                                                      AddColumns(
                                                          col_AcousticPartitions,
                                                          IsPartition, true,
                                                          StatusIcon, Switch(TestStatus, "Complete", "✓", "In Progress", "🔄", "⚠️"),
                                                          CompletedCount, 0,
                                                          TotalCount, 0,
                                                          DisplayResult,
                                                          If(
                                                              TestCategory = "Impact",
                                                              If(!IsBlank(LnTw), Text(LnTw) & " dB", "—"),
                                                              If(!IsBlank(DnTwPlusCtr), Text(DnTwPlusCtr) & " dB", "—")
                                                          ),
                                                          DisplayRequired,
                                                          If(
                                                              TestCategory = "Impact",
                                                              "≤" & Text(RequiredValue) & " dB",
                                                              "≥" & Text(RequiredValue) & " dB"
                                                          ),
                                                          DisplayDeviations,
                                                          If(!SixDbRuleMet, "[4]", "")
                                                              & If(ResultLimitedByBackground, " ≥/≤", "")
                                                      )
                                                  )
                                                Visible: =false
                                                X: =60
                                                Y: =8
                                          - btnCalculateAll:
                                              Control: Button@0.0.45
                                              Properties:
                                                Appearance: ='ButtonCanvas.Appearance'.Transparent
                                                BasePaletteColor: =fxPrimary
                                                Height: =30
                                                Icon: ="Open"
                                                Layout: ='ButtonCanvas.Layout'.IconOnly
                                                OnSelect: |-
                                                  =Concurrent(
                                                      ClearCollect(
                                                          col_AirborneResults,
                                                          ForAll(
                                                              SortByColumns(
                                                                  Filter(col_AcousticPartitions, TestCategory = "Airborne"),
                                                                  "PartitionNo",
                                                                  SortOrder.Ascending
                                                              ) As part,
                                                              With(
                                                                  {
                                                                      _parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID),
                                                                      _l1Positions: CountRows(Distinct(
                                                                          ForAll(part.MeasurementData.L1.positions As pos, {P: Value(pos.positionNo)}), P
                                                                      )),
                                                                      _l1Readings: CountRows(
                                                                          Ungroup(
                                                                              ForAll(part.MeasurementData.L1.positions As pos,
                                                                                  ForAll(pos.readings As rd, {R: 1})
                                                                              ), Value
                                                                          )
                                                                      ),
                                                                      _l2Positions: CountRows(Distinct(
                                                                          ForAll(part.MeasurementData.L2.positions As pos, {P: Value(pos.positionNo)}), P
                                                                      )),
                                                                      _l2Readings: CountRows(
                                                                          Ungroup(
                                                                              ForAll(part.MeasurementData.L2.positions As pos,
                                                                                  ForAll(pos.readings As rd, {R: 1})
                                                                              ), Value
                                                                          )
                                                                      ),
                                                                      _b2Count: CountRows(
                                                                          ForAll(part.MeasurementData.B2 As rd, {R: 1})
                                                                      ),
                                                                      _t2Positions: CountRows(Distinct(
                                                                          ForAll(part.MeasurementData.T2.sourcePositions As pos, {P: Value(pos.positionNo)}), P
                                                                      )),
                                                                      _t2Readings: CountRows(
                                                                          Ungroup(
                                                                              ForAll(part.MeasurementData.T2.sourcePositions As pos,
                                                                                  ForAll(pos.readings As rd, {R: 1})
                                                                              ), Value
                                                                          )
                                                                      )
                                                                  },
                                                                  {
                                                                      Sort: part.PartitionNo,
                                                                      DateOfTest: If(
                                                                          !IsBlank(_parentRun.RunDate),
                                                                          Text(_parentRun.RunDate, "dd/mm/yyyy"),
                                                                          ""
                                                                      ),
                                                                      TestReportNumber: If(
                                                                          !IsBlank(part.Results) && !IsBlank(part.Results.TestReportNumber),
                                                                          Text(part.Results.TestReportNumber),
                                                                          Text(ParseJSON(
                                                                              LookUp(BESA_TestRuns, BESA_TestRun = part.PartitionID).PartitionData
                                                                          ).TestReportNumber)
                                                                      ),
                                                                      SourceRoom: part.SourceRoom,
                                                                      SourceRoomVolume: part.SourceRoomVolume,
                                                                      ReceiverRoom: part.ReceiverRoom,
                                                                      ReceiverRoomVolume: part.ReceiverRoomVolume,
                                                                      PartitionType: part.PartitionType,
                                                                      PartitionLabel: part.PartitionLabel,
                                                                      Measured: If(
                                                                          !IsBlank(part.DnTwPlusCtr),
                                                                          Text(part.DnTwPlusCtr)
                                                                              & If(!part.SixDbRuleMet, "[4]", "")
                                                                              & If(part.ResultLimitedByBackground, "≥", ""),
                                                                          "—"
                                                                      ),
                                                                      MeasuredValue: If(!IsBlank(part.DnTwPlusCtr), part.DnTwPlusCtr, 0),
                                                                      Required: "≥" & Text(part.RequiredValue),
                                                                      RequiredValue: part.RequiredValue,
                                                                      PassFail: part.PassFail,
                                                                      RunLabel: If(!IsBlank(_parentRun), _parentRun.RunLabel, ""),
                                                                      Engineer: If(!IsBlank(_parentRun), _parentRun.Engineer, ""),
                                                                      PartitionID: part.PartitionID,
                                                                      TestRunID: part.TestRunID,
                                                                      DnTw: If(
                                                                          !IsBlank(part.Results) && !IsBlank(part.Results.DnTw),
                                                                          Value(Text(part.Results.DnTw)),
                                                                          Blank()
                                                                      ),
                                                                      C: If(
                                                                          !IsBlank(part.Results) && !IsBlank(part.Results.C),
                                                                          Value(Text(part.Results.C)),
                                                                          Blank()
                                                                      ),
                                                                      Ctr: If(
                                                                          !IsBlank(part.Results) && !IsBlank(part.Results.Ctr),
                                                                          Value(Text(part.Results.Ctr)),
                                                                          Blank()
                                                                      ),

                                                                      // ── Measurement counts ──
                                                                      NumSpeakerPositions: _l1Positions,
                                                                      NumL1ReadingsPerPosition: If(_l1Positions > 0, RoundDown(_l1Readings / _l1Positions, 0), 0),
                                                                      NumL2ReadingsPerPosition: If(_l2Positions > 0, RoundDown(_l2Readings / _l2Positions, 0), 0),
                                                                      NumB2Measurements: _b2Count,
                                                                      NumT2SourcePositions: _t2Positions,
                                                                      NumT2ReadingsPerPosition: If(_t2Positions > 0, RoundDown(_t2Readings / _t2Positions, 0), 0),
                                                                      SmallRoomUsed: part.SourceRoomVolume < 25 || part.ReceiverRoomVolume < 25,
                                                                      SixDbRuleMet: part.SixDbRuleMet,
                                                                      ResultLimitedByBackground: part.ResultLimitedByBackground
                                                                  }
                                                              )
                                                          )
                                                      ),

                                                      // ── Impact Results Table ──
                                                      ClearCollect(
                                                          col_ImpactResults,
                                                          ForAll(
                                                              SortByColumns(
                                                                  Filter(col_AcousticPartitions, TestCategory = "Impact"),
                                                                  "PartitionNo",
                                                                  SortOrder.Ascending
                                                              ) As part,
                                                              With(
                                                                  {
                                                                      _parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID),
                                                                      _l2Positions: CountRows(Distinct(
                                                                          ForAll(part.MeasurementData.L2.positions As pos, {P: Value(pos.positionNo)}), P
                                                                      )),
                                                                      _l2Readings: CountRows(
                                                                          Ungroup(
                                                                              ForAll(part.MeasurementData.L2.positions As pos,
                                                                                  ForAll(pos.readings As rd, {R: 1})
                                                                              ), Value
                                                                          )
                                                                      ),
                                                                      _b2Count: CountRows(
                                                                          ForAll(part.MeasurementData.B2 As rd, {R: 1})
                                                                      ),
                                                                      _t2Positions: CountRows(Distinct(
                                                                          ForAll(part.MeasurementData.T2.sourcePositions As pos, {P: Value(pos.positionNo)}), P
                                                                      )),
                                                                      _t2Readings: CountRows(
                                                                          Ungroup(
                                                                              ForAll(part.MeasurementData.T2.sourcePositions As pos,
                                                                                  ForAll(pos.readings As rd, {R: 1})
                                                                              ), Value
                                                                          )
                                                                      )
                                                                  },
                                                                  {
                                                                      Sort: part.PartitionNo,
                                                                      DateOfTest: If(
                                                                          !IsBlank(_parentRun.RunDate),
                                                                          Text(_parentRun.RunDate, "dd/mm/yyyy"),
                                                                          ""
                                                                      ),
                                                                      TestReportNumber: If(
                                                                          !IsBlank(part.Results) && !IsBlank(part.Results.TestReportNumber),
                                                                          Text(part.Results.TestReportNumber),
                                                                          Text(ParseJSON(
                                                                              LookUp(BESA_TestRuns, BESA_TestRun = part.PartitionID).PartitionData
                                                                          ).TestReportNumber)
                                                                      ),
                                                                      SourceRoom: part.SourceRoom,
                                                                      SourceRoomVolume: part.SourceRoomVolume,
                                                                      ReceiverRoom: part.ReceiverRoom,
                                                                      ReceiverRoomVolume: part.ReceiverRoomVolume,
                                                                      PartitionLabel: part.PartitionLabel,
                                                                      PartitionID: part.PartitionID,
                                                                      TestRunID: part.TestRunID,
                                                                      Measured: If(
                                                                          !IsBlank(part.LnTw),
                                                                          Text(part.LnTw)
                                                                              & If(part.ResultLimitedByBackground, "≤", ""),
                                                                          "—"
                                                                      ),
                                                                      MeasuredValue: If(!IsBlank(part.LnTw), part.LnTw, 0),
                                                                      Required: "≤" & Text(part.RequiredValue),
                                                                      RequiredValue: part.RequiredValue,
                                                                      PassFail: part.PassFail,
                                                                      RunLabel: If(!IsBlank(_parentRun), _parentRun.RunLabel, ""),
                                                                      Engineer: If(!IsBlank(_parentRun), _parentRun.Engineer, ""),
                                                                      LnTw: If(!IsBlank(part.LnTw), part.LnTw, Blank()),

                                                                      // ── Measurement counts ──
                                                                      NumTapperPositions: _l2Positions,
                                                                      NumL2TapperReadings: If(_l2Positions > 0, RoundDown(_l2Readings / _l2Positions, 0), 0),
                                                                      NumB2TapperMeasurements: _b2Count,
                                                                      NumT2SourcePositions: _t2Positions,
                                                                      NumT2ReadingsPerPosition: If(_t2Positions > 0, RoundDown(_t2Readings / _t2Positions, 0), 0),
                                                                      SmallRoomUsed: part.SourceRoomVolume < 25 || part.ReceiverRoomVolume < 25,
                                                                      ResultLimitedByBackground: part.ResultLimitedByBackground
                                                                  }
                                                              )
                                                          )
                                                      )
                                                  );
                                                Visible: =false
                                                Width: =30
                                                X: =270
                                                Y: =10
                              - ButtonCanvas6_11:
