                                                              Hz800: Value(cVar_CurrentPartition.Results.DnTSpectral.'800'),
                                                              Hz1000: Value(cVar_CurrentPartition.Results.DnTSpectral.'1000'),
                                                              Hz1250: Value(cVar_CurrentPartition.Results.DnTSpectral.'1250'),
                                                              Hz1600: Value(cVar_CurrentPartition.Results.DnTSpectral.'1600'),
                                                              Hz2000: Value(cVar_CurrentPartition.Results.DnTSpectral.'2000'),
                                                              Hz2500: Value(cVar_CurrentPartition.Results.DnTSpectral.'2500'),
                                                              Hz3150: Value(cVar_CurrentPartition.Results.DnTSpectral.'3150')
                                                          }
                                                      )
                                                  );

                                                  If(
                                                      cVar_CurrentPartition.TestCategory = "Impact"
                                                          && !IsBlank(cVar_CurrentPartition.Results)
                                                          && !IsBlank(cVar_CurrentPartition.Results.LnTSpectral),
                                                      Collect(
