                                      // ── Update parent run statuses ──
                                      ForAll(
                                          col_AcousticTestRuns As run,
                                          With(
                                              {
                                                  _allDone: CountRows(
                                                      Filter(
                                                          col_AcousticPartitions,
                                                          TestRunID = run.TestRunID && TestStatus <> "Complete"
                                                      )
                                                  ) = 0
                                                  && CountRows(
                                                      Filter(col_AcousticPartitions, TestRunID = run.TestRunID)
                                                  ) > 0
                                              },
                                              Patch(
                                                  BESA_TestRuns,
                                                  LookUp(BESA_TestRuns, BESA_TestRun = run.TestRunID),
                                                  {
                                                      'Test Status': If(_allDone, "Complete", "In Progress")
                                                  }
                                              )
                                          )
                                      );
                                    Text: ="Save"
                                    Visible: =varTestMenu.MenuCategory="Partition" && IsBlank(cVar_CurrentPartition)
                                    Width: =150
                                    X: =800
                                    Y: =5
                  - ButtonCanvas5_11:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =fxPrimary
                        Height: =30
                        Icon: ="CheckmarkCircle"
                        OnSelect: |-
                          =// =============================================
                          // STEP 1 — Auto-calculate flags for ALL partitions
                          // =============================================
                          ForAll(
                              col_AcousticPartitions As part,

                              // Rebuild measurement display for this partition
                              With(
                                  {
                                      _l1: If(
                                          !part.HasMeasurementData,
                                          Table({Hz100:0, Hz125:0, Hz160:0, Hz200:0, Hz250:0, Hz315:0,
                                         Hz400:0, Hz500:0, Hz630:0, Hz800:0, Hz1000:0, Hz1250:0,
                                         Hz1600:0, Hz2000:0, Hz2500:0, Hz3150:0}),
                                          Ungroup(
                                              ForAll(
                                                  part.MeasurementData.L1.positions As pos,
                                                  ForAll(pos.readings As rd,
                                                      {
                                                          Hz100: Value(rd.values.'100'), Hz125: Value(rd.values.'125'),
                                                          Hz160: Value(rd.values.'160'), Hz200: Value(rd.values.'200'),
                                                          Hz250: Value(rd.values.'250'), Hz315: Value(rd.values.'315'),
                                                          Hz400: Value(rd.values.'400'), Hz500: Value(rd.values.'500'),
                                                          Hz630: Value(rd.values.'630'), Hz800: Value(rd.values.'800'),
                                                          Hz1000: Value(rd.values.'1000'), Hz1250: Value(rd.values.'1250'),
                                                          Hz1600: Value(rd.values.'1600'), Hz2000: Value(rd.values.'2000'),
                                                          Hz2500: Value(rd.values.'2500'), Hz3150: Value(rd.values.'3150')
                                                      }
                                                  )
                                              ),
                                              Value
                                          )
                                      ),
                                      _l2Rows: If(
                                          !part.HasMeasurementData,
                                          Table({Hz100:0, Hz125:0, Hz160:0, Hz200:0, Hz250:0, Hz315:0,
                                         Hz400:0, Hz500:0, Hz630:0, Hz800:0, Hz1000:0, Hz1250:0,
                                         Hz1600:0, Hz2000:0, Hz2500:0, Hz3150:0}),
                                          Ungroup(
                                              ForAll(
                                                  part.MeasurementData.L2.positions As pos,
                                                  ForAll(pos.readings As rd,
                                                      {
                                                          Hz100: Value(rd.values.'100'), Hz125: Value(rd.values.'125'),
                                                          Hz160: Value(rd.values.'160'), Hz200: Value(rd.values.'200'),
                                                          Hz250: Value(rd.values.'250'), Hz315: Value(rd.values.'315'),
                                                          Hz400: Value(rd.values.'400'), Hz500: Value(rd.values.'500'),
                                                          Hz630: Value(rd.values.'630'), Hz800: Value(rd.values.'800'),
                                                          Hz1000: Value(rd.values.'1000'), Hz1250: Value(rd.values.'1250'),
                                                          Hz1600: Value(rd.values.'1600'), Hz2000: Value(rd.values.'2000'),
                                                          Hz2500: Value(rd.values.'2500'), Hz3150: Value(rd.values.'3150')
                                                      }
                                                  )
                                              ),
                                              Value
                                          )
                                      ),
                                      _b2Row: If(
                                          !part.HasMeasurementData,
                                          Blank(),
                                          First(
                                              ForAll(
                                                  part.MeasurementData.B2 As rd,
                                                  {
                                                      Hz100: Value(rd.values.'100'), Hz125: Value(rd.values.'125'),
                                                      Hz160: Value(rd.values.'160'), Hz200: Value(rd.values.'200'),
                                                      Hz250: Value(rd.values.'250'), Hz315: Value(rd.values.'315'),
                                                      Hz400: Value(rd.values.'400'), Hz500: Value(rd.values.'500'),
                                                      Hz630: Value(rd.values.'630'), Hz800: Value(rd.values.'800'),
                                                      Hz1000: Value(rd.values.'1000'), Hz1250: Value(rd.values.'1250'),
                                                      Hz1600: Value(rd.values.'1600'), Hz2000: Value(rd.values.'2000'),
                                                      Hz2500: Value(rd.values.'2500'), Hz3150: Value(rd.values.'3150')
                                                  }
                                              )
                                          )
                                      )
                                  },

                                  With(
                                      {
                                          _sixDb: CountRows(
                                              Filter(
                                                  AddColumns(
                                                      _l1,
                                                      MaxDiff,
                                                      Max(
                                                          Table(
                                                              {Diff: Abs(Hz100 - Hz125)}, {Diff: Abs(Hz125 - Hz160)},
                                                              {Diff: Abs(Hz160 - Hz200)}, {Diff: Abs(Hz200 - Hz250)},
                                                              {Diff: Abs(Hz250 - Hz315)}, {Diff: Abs(Hz315 - Hz400)},
                                                              {Diff: Abs(Hz400 - Hz500)}, {Diff: Abs(Hz500 - Hz630)},
                                                              {Diff: Abs(Hz630 - Hz800)}, {Diff: Abs(Hz800 - Hz1000)},
                                                              {Diff: Abs(Hz1000 - Hz1250)}, {Diff: Abs(Hz1250 - Hz1600)},
                                                              {Diff: Abs(Hz1600 - Hz2000)}, {Diff: Abs(Hz2000 - Hz2500)},
                                                              {Diff: Abs(Hz2500 - Hz3150)}
                                                          ),
                                                          Diff
                                                      )
                                                  ),
                                                  MaxDiff > 6
                                              )
                                          ) = 0,
                                          _bgCorr: !IsBlank(_b2Row) && !IsEmpty(_l2Rows),
                                          _avgL2Hz100: Average(_l2Rows, Hz100),
                                          _avgL2Hz125: Average(_l2Rows, Hz125),
                                          _avgL2Hz160: Average(_l2Rows, Hz160),
                                          _avgL2Hz200: Average(_l2Rows, Hz200),
                                          _avgL2Hz250: Average(_l2Rows, Hz250),
                                          _avgL2Hz315: Average(_l2Rows, Hz315),
                                          _avgL2Hz400: Average(_l2Rows, Hz400),
                                          _avgL2Hz500: Average(_l2Rows, Hz500),
                                          _avgL2Hz630: Average(_l2Rows, Hz630),
                                          _avgL2Hz800: Average(_l2Rows, Hz800),
                                          _avgL2Hz1000: Average(_l2Rows, Hz1000),
                                          _avgL2Hz1250: Average(_l2Rows, Hz1250),
                                          _avgL2Hz1600: Average(_l2Rows, Hz1600),
                                          _avgL2Hz2000: Average(_l2Rows, Hz2000),
                                          _avgL2Hz2500: Average(_l2Rows, Hz2500),
                                          _avgL2Hz3150: Average(_l2Rows, Hz3150),
                                          _small: part.SourceRoomVolume < 25 || part.ReceiverRoomVolume < 25
                                      },

                                      With(
                                          {
                                              _limited: _bgCorr && CountRows(
                                                  Filter(
                                                      Table(
                                                          {Diff: _avgL2Hz100 - _b2Row.Hz100},
                                                          {Diff: _avgL2Hz125 - _b2Row.Hz125},
                                                          {Diff: _avgL2Hz160 - _b2Row.Hz160},
                                                          {Diff: _avgL2Hz200 - _b2Row.Hz200},
                                                          {Diff: _avgL2Hz250 - _b2Row.Hz250},
                                                          {Diff: _avgL2Hz315 - _b2Row.Hz315},
                                                          {Diff: _avgL2Hz400 - _b2Row.Hz400},
                                                          {Diff: _avgL2Hz500 - _b2Row.Hz500},
                                                          {Diff: _avgL2Hz630 - _b2Row.Hz630},
                                                          {Diff: _avgL2Hz800 - _b2Row.Hz800},
                                                          {Diff: _avgL2Hz1000 - _b2Row.Hz1000},
                                                          {Diff: _avgL2Hz1250 - _b2Row.Hz1250},
                                                          {Diff: _avgL2Hz1600 - _b2Row.Hz1600},
                                                          {Diff: _avgL2Hz2000 - _b2Row.Hz2000},
                                                          {Diff: _avgL2Hz2500 - _b2Row.Hz2500},
                                                          {Diff: _avgL2Hz3150 - _b2Row.Hz3150}
                                                      ),
                                                      Diff < 6
                                                  )
                                              ) > 0,
                                              _bgApplied: _bgCorr && CountRows(
                                                  Filter(
                                                      Table(
                                                          {Diff: _avgL2Hz100 - _b2Row.Hz100},
                                                          {Diff: _avgL2Hz125 - _b2Row.Hz125},
                                                          {Diff: _avgL2Hz160 - _b2Row.Hz160},
                                                          {Diff: _avgL2Hz200 - _b2Row.Hz200},
                                                          {Diff: _avgL2Hz250 - _b2Row.Hz250},
                                                          {Diff: _avgL2Hz315 - _b2Row.Hz315},
                                                          {Diff: _avgL2Hz400 - _b2Row.Hz400},
                                                          {Diff: _avgL2Hz500 - _b2Row.Hz500},
                                                          {Diff: _avgL2Hz630 - _b2Row.Hz630},
                                                          {Diff: _avgL2Hz800 - _b2Row.Hz800},
                                                          {Diff: _avgL2Hz1000 - _b2Row.Hz1000},
                                                          {Diff: _avgL2Hz1250 - _b2Row.Hz1250},
                                                          {Diff: _avgL2Hz1600 - _b2Row.Hz1600},
                                                          {Diff: _avgL2Hz2000 - _b2Row.Hz2000},
                                                          {Diff: _avgL2Hz2500 - _b2Row.Hz2500},
                                                          {Diff: _avgL2Hz3150 - _b2Row.Hz3150}
                                                      ),
                                                      Diff >= 6 && Diff <= 10
                                                  )
                                              ) > 0,
                                              _isComplete:
                                                  !IsBlank(part.SourceRoom)
                                                  && !IsBlank(part.ReceiverRoom)
                                                  && part.SourceRoomVolume > 0
                                                  && part.ReceiverRoomVolume > 0
                                                  && part.HasMeasurementData
                                          },

                                          // ── Patch this partition ──
                                          Patch(
                                              BESA_TestRuns,
                                              LookUp(BESA_TestRuns, BESA_TestRun = part.PartitionID),
                                              {
                                                  PartitionData: JSON(
                                                      {
                                                          PartitionLabel: part.PartitionLabel,
                                                          TestReportNumber: part.TestReportNumber,
                                                          TestCategory: part.TestCategory,
                                                          PartitionType: part.PartitionType,
                                                          ConstructionType: "",// part.ConstructionType,
                                                          SourceRoom: part.SourceRoom,
                                                          ReceiverRoom: part.ReceiverRoom,
                                                          SourceRoomVolume: part.SourceRoomVolume,
                                                          ReceiverRoomVolume: part.ReceiverRoomVolume,
                                                          SeparatingElementArea: part.SeparatingElementArea,
                                                          MetricToReport: If(part.TestCategory = "Impact", "L'nT,w", "DnT,w + Ctr"),
                                                          RequiredValue: part.RequiredValue,
                                                          StandardisedRT: 0.5
                                                      }
                                                  ),
                                                  TestMetaData: JSON(
                                                      {
                                                          SixDbRuleMet: _sixDb,
                                                          BackgroundCorrectionApplied: _bgApplied,
                                                          ResultLimitedByBackground: _limited,
                                                          SmallRoomUsed: _small
                                                      }
                                                  ),
                                                  'Test Status': If(_isComplete, "Complete", "In Progress")
                                              }
                                          );

                                          // ── Update collection ──
                                          UpdateIf(
                                              col_AcousticPartitions,
                                              PartitionID = part.PartitionID,
                                              {
                                                  TestStatus: If(_isComplete, "Complete", "In Progress"),
                                                  SixDbRuleMet: _sixDb,
                                                  ResultLimitedByBackground: _limited,
                                                  HasMeasurementData: part.HasMeasurementData
                                              }
                                          )
                                      )
                                  )
                              )
                          );

                          // =============================================
                          // STEP 2 — Update all parent run statuses
                          // =============================================
                          ForAll(
                              col_AcousticTestRuns As run,
                              With(
                                  {
                                      _runParts: Filter(col_AcousticPartitions, TestRunID = run.TestRunID),
                                      _allDone: CountRows(Filter(col_AcousticPartitions, TestRunID = run.TestRunID && TestStatus <> "Complete")) = 0
                                          && CountRows(Filter(col_AcousticPartitions, TestRunID = run.TestRunID)) > 0
                                  },
                                  Patch(
                                      BESA_TestRuns,
                                      LookUp(BESA_TestRuns, BESA_TestRun = run.TestRunID),
                                      {
                                          'Test Status': If(_allDone, "Complete", "In Progress")
                                      }
                                  );
                                  UpdateIf(
                                      col_AcousticTestRuns,
                                      TestRunID = run.TestRunID,
                                      {
                                          TestStatus: If(_allDone, "Complete", "In Progress")
                                      }
                                  )
                              )
                          );

                          // =============================================
                          // STEP 3 — Update menu
                          // =============================================
                          UpdateIf(
                              col_AcousticTestMenu,
                              MenuCategory = "Partition",
                              {
                                  Status: If(
                                      CountRows(Filter(col_AcousticPartitions, TestStatus <> "Complete")) = 0
                                          && CountRows(col_AcousticPartitions) > 0,
                                      "Complete",
                                      "In Progress"
                                  ),
