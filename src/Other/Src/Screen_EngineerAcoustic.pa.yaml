                        - btnCalculateAirborne_2:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =fxPrimary
                              Height: =30
                              Icon: ="Open"
                              Layout: ='ButtonCanvas.Layout'.IconOnly
                              OnSelect: |-
                                =// =============================================
                                // btnCalculateAirborne.OnSelect
                                // =============================================

                                // ── GUARD: Check data exists ──
                                If(
                                    CountRows(Filter(col_MeasurementDisplay, MeasurementType = "L1")) = 0
                                    || CountRows(Filter(col_MeasurementDisplay, MeasurementType = "L2")) = 0
                                    || CountRows(Filter(col_MeasurementDisplay, MeasurementType = "B2")) = 0
                                    || CountRows(Filter(col_MeasurementDisplay, MeasurementType = "T2")) = 0,
                                    Notify("Missing measurement data — cannot calculate", NotificationType.Error),

                                    // ═══════════════════════════════════════
                                    // STEP 1: Energy-average L1 across positions
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_CalcL1Avg,
                                        With(
                                            {_l1Rows: Filter(col_MeasurementDisplay, MeasurementType = "L1")},
                                            If(
                                                CountRows(_l1Rows) = 0,
                                                {Hz100:0, Hz125:0, Hz160:0, Hz200:0, Hz250:0, Hz315:0, Hz400:0, Hz500:0,
                                                 Hz630:0, Hz800:0, Hz1000:0, Hz1250:0, Hz1600:0, Hz2000:0, Hz2500:0, Hz3150:0},
                                                {
                                                    Hz100: 10*Log(Average(_l1Rows, Power(10, Hz100/10)),10),
                                                    Hz125: 10*Log(Average(_l1Rows, Power(10, Hz125/10)),10),
                                                    Hz160: 10*Log(Average(_l1Rows, Power(10, Hz160/10)),10),
                                                    Hz200: 10*Log(Average(_l1Rows, Power(10, Hz200/10)),10),
                                                    Hz250: 10*Log(Average(_l1Rows, Power(10, Hz250/10)),10),
                                                    Hz315: 10*Log(Average(_l1Rows, Power(10, Hz315/10)),10),
                                                    Hz400: 10*Log(Average(_l1Rows, Power(10, Hz400/10)),10),
                                                    Hz500: 10*Log(Average(_l1Rows, Power(10, Hz500/10)),10),
                                                    Hz630: 10*Log(Average(_l1Rows, Power(10, Hz630/10)),10),
                                                    Hz800: 10*Log(Average(_l1Rows, Power(10, Hz800/10)),10),
                                                    Hz1000: 10*Log(Average(_l1Rows, Power(10, Hz1000/10)),10),
                                                    Hz1250: 10*Log(Average(_l1Rows, Power(10, Hz1250/10)),10),
                                                    Hz1600: 10*Log(Average(_l1Rows, Power(10, Hz1600/10)),10),
                                                    Hz2000: 10*Log(Average(_l1Rows, Power(10, Hz2000/10)),10),
                                                    Hz2500: 10*Log(Average(_l1Rows, Power(10, Hz2500/10)),10),
                                                    Hz3150: 10*Log(Average(_l1Rows, Power(10, Hz3150/10)),10)
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 2: Energy-average L2 across positions
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_CalcL2Avg,
                                        With(
                                            {_l2Rows: Filter(col_MeasurementDisplay, MeasurementType = "L2")},
                                            If(
                                                CountRows(_l2Rows) = 0,
                                                {Hz100:0, Hz125:0, Hz160:0, Hz200:0, Hz250:0, Hz315:0, Hz400:0, Hz500:0,
                                                 Hz630:0, Hz800:0, Hz1000:0, Hz1250:0, Hz1600:0, Hz2000:0, Hz2500:0, Hz3150:0},
                                                {
                                                    Hz100: 10*Log(Average(_l2Rows, Power(10, Hz100/10)),10),
                                                    Hz125: 10*Log(Average(_l2Rows, Power(10, Hz125/10)),10),
                                                    Hz160: 10*Log(Average(_l2Rows, Power(10, Hz160/10)),10),
                                                    Hz200: 10*Log(Average(_l2Rows, Power(10, Hz200/10)),10),
                                                    Hz250: 10*Log(Average(_l2Rows, Power(10, Hz250/10)),10),
                                                    Hz315: 10*Log(Average(_l2Rows, Power(10, Hz315/10)),10),
                                                    Hz400: 10*Log(Average(_l2Rows, Power(10, Hz400/10)),10),
                                                    Hz500: 10*Log(Average(_l2Rows, Power(10, Hz500/10)),10),
                                                    Hz630: 10*Log(Average(_l2Rows, Power(10, Hz630/10)),10),
                                                    Hz800: 10*Log(Average(_l2Rows, Power(10, Hz800/10)),10),
                                                    Hz1000: 10*Log(Average(_l2Rows, Power(10, Hz1000/10)),10),
                                                    Hz1250: 10*Log(Average(_l2Rows, Power(10, Hz1250/10)),10),
                                                    Hz1600: 10*Log(Average(_l2Rows, Power(10, Hz1600/10)),10),
                                                    Hz2000: 10*Log(Average(_l2Rows, Power(10, Hz2000/10)),10),
                                                    Hz2500: 10*Log(Average(_l2Rows, Power(10, Hz2500/10)),10),
                                                    Hz3150: 10*Log(Average(_l2Rows, Power(10, Hz3150/10)),10)
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 3: Get B2 and average T2
                                    // ═══════════════════════════════════════
                                    UpdateContext({
                                        _b2: First(Filter(col_MeasurementDisplay, MeasurementType = "B2")),
                                        _l1: First(col_CalcL1Avg),
                                        _l2: First(col_CalcL2Avg)
                                    });

                                    ClearCollect(
                                        col_CalcT2Avg,
                                        With(
                                            {_t2Rows: Filter(col_MeasurementDisplay, MeasurementType = "T2")},
                                            If(
                                                CountRows(_t2Rows) = 0,
                                                {Hz100:0.5, Hz125:0.5, Hz160:0.5, Hz200:0.5, Hz250:0.5, Hz315:0.5, Hz400:0.5, Hz500:0.5,
                                                 Hz630:0.5, Hz800:0.5, Hz1000:0.5, Hz1250:0.5, Hz1600:0.5, Hz2000:0.5, Hz2500:0.5, Hz3150:0.5},
                                                {
                                                    Hz100: Average(_t2Rows, Hz100), Hz125: Average(_t2Rows, Hz125),
                                                    Hz160: Average(_t2Rows, Hz160), Hz200: Average(_t2Rows, Hz200),
                                                    Hz250: Average(_t2Rows, Hz250), Hz315: Average(_t2Rows, Hz315),
                                                    Hz400: Average(_t2Rows, Hz400), Hz500: Average(_t2Rows, Hz500),
                                                    Hz630: Average(_t2Rows, Hz630), Hz800: Average(_t2Rows, Hz800),
                                                    Hz1000: Average(_t2Rows, Hz1000), Hz1250: Average(_t2Rows, Hz1250),
                                                    Hz1600: Average(_t2Rows, Hz1600), Hz2000: Average(_t2Rows, Hz2000),
                                                    Hz2500: Average(_t2Rows, Hz2500), Hz3150: Average(_t2Rows, Hz3150)
                                                }
                                            )
                                        )
                                    );

                                    UpdateContext({_t2: First(col_CalcT2Avg)});

                                    // ═══════════════════════════════════════
                                    // STEP 4: Reverberation display
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_Reverberation,
                                        ForAll(
                                            Table(
                                                {Freq: "100",  FreqSort: 1,  AvgVal: _t2.Hz100},
                                                {Freq: "125",  FreqSort: 2,  AvgVal: _t2.Hz125},
                                                {Freq: "160",  FreqSort: 3,  AvgVal: _t2.Hz160},
                                                {Freq: "200",  FreqSort: 4,  AvgVal: _t2.Hz200},
                                                {Freq: "250",  FreqSort: 5,  AvgVal: _t2.Hz250},
                                                {Freq: "315",  FreqSort: 6,  AvgVal: _t2.Hz315},
                                                {Freq: "400",  FreqSort: 7,  AvgVal: _t2.Hz400},
                                                {Freq: "500",  FreqSort: 8,  AvgVal: _t2.Hz500},
                                                {Freq: "630",  FreqSort: 9,  AvgVal: _t2.Hz630},
                                                {Freq: "800",  FreqSort: 10, AvgVal: _t2.Hz800},
                                                {Freq: "1000", FreqSort: 11, AvgVal: _t2.Hz1000},
                                                {Freq: "1250", FreqSort: 12, AvgVal: _t2.Hz1250},
                                                {Freq: "1600", FreqSort: 13, AvgVal: _t2.Hz1600},
                                                {Freq: "2000", FreqSort: 14, AvgVal: _t2.Hz2000},
                                                {Freq: "2500", FreqSort: 15, AvgVal: _t2.Hz2500},
                                                {Freq: "3150", FreqSort: 16, AvgVal: _t2.Hz3150}
                                            ) As row,
                                            With(
                                                {_t2Rows: Filter(col_MeasurementDisplay, MeasurementType = "T2")},
                                                {
                                                    Freq: row.Freq,
                                                    FreqSort: row.FreqSort,
                                                    DisplayFreq: Switch(row.Freq,
                                                        "1000","1k","1250","1.25k","1600","1.6k",
                                                        "2000","2k","2500","2.5k","3150","3.15k",
                                                        row.Freq) & "Hz",
                                                    T2Avg: Round(row.AvgVal, 2),
                                                    RTCorrection: Round(10 * Log(row.AvgVal / 0.5, 10), 2),
                                                    ReadingCount: CountRows(_t2Rows),
                                                    MinVal: If(CountRows(_t2Rows) = 0, 0, Round(Min(_t2Rows,
                                                        Switch(row.Freq, "100",Hz100,"125",Hz125,"160",Hz160,"200",Hz200,
                                                        "250",Hz250,"315",Hz315,"400",Hz400,"500",Hz500,"630",Hz630,
                                                        "800",Hz800,"1000",Hz1000,"1250",Hz1250,"1600",Hz1600,
                                                        "2000",Hz2000,"2500",Hz2500,"3150",Hz3150)), 2)),
                                                    MaxVal: If(CountRows(_t2Rows) = 0, 0, Round(Max(_t2Rows,
                                                        Switch(row.Freq, "100",Hz100,"125",Hz125,"160",Hz160,"200",Hz200,
                                                        "250",Hz250,"315",Hz315,"400",Hz400,"500",Hz500,"630",Hz630,
                                                        "800",Hz800,"1000",Hz1000,"1250",Hz1250,"1600",Hz1600,
                                                        "2000",Hz2000,"2500",Hz2500,"3150",Hz3150)), 2)),
                                                    Spread: If(CountRows(_t2Rows) = 0, 0, Round(
                                                        Max(_t2Rows, Switch(row.Freq, "100",Hz100,"125",Hz125,"160",Hz160,"200",Hz200,
                                                        "250",Hz250,"315",Hz315,"400",Hz400,"500",Hz500,"630",Hz630,
                                                        "800",Hz800,"1000",Hz1000,"1250",Hz1250,"1600",Hz1600,
                                                        "2000",Hz2000,"2500",Hz2500,"3150",Hz3150))
                                                        - Min(_t2Rows, Switch(row.Freq, "100",Hz100,"125",Hz125,"160",Hz160,"200",Hz200,
                                                        "250",Hz250,"315",Hz315,"400",Hz400,"500",Hz500,"630",Hz630,
                                                        "800",Hz800,"1000",Hz1000,"1250",Hz1250,"1600",Hz1600,
                                                        "2000",Hz2000,"2500",Hz2500,"3150",Hz3150)), 2)),
                                                    StandardisedTo: 0.5
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 5: Background correction
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_BgCorrection,
                                        ForAll(
                                            Table(
                                                {Freq: "100",  L2Val: _l2.Hz100,  B2Val: _b2.Hz100},
                                                {Freq: "125",  L2Val: _l2.Hz125,  B2Val: _b2.Hz125},
                                                {Freq: "160",  L2Val: _l2.Hz160,  B2Val: _b2.Hz160},
                                                {Freq: "200",  L2Val: _l2.Hz200,  B2Val: _b2.Hz200},
                                                {Freq: "250",  L2Val: _l2.Hz250,  B2Val: _b2.Hz250},
                                                {Freq: "315",  L2Val: _l2.Hz315,  B2Val: _b2.Hz315},
                                                {Freq: "400",  L2Val: _l2.Hz400,  B2Val: _b2.Hz400},
                                                {Freq: "500",  L2Val: _l2.Hz500,  B2Val: _b2.Hz500},
                                                {Freq: "630",  L2Val: _l2.Hz630,  B2Val: _b2.Hz630},
                                                {Freq: "800",  L2Val: _l2.Hz800,  B2Val: _b2.Hz800},
                                                {Freq: "1000", L2Val: _l2.Hz1000, B2Val: _b2.Hz1000},
                                                {Freq: "1250", L2Val: _l2.Hz1250, B2Val: _b2.Hz1250},
                                                {Freq: "1600", L2Val: _l2.Hz1600, B2Val: _b2.Hz1600},
                                                {Freq: "2000", L2Val: _l2.Hz2000, B2Val: _b2.Hz2000},
                                                {Freq: "2500", L2Val: _l2.Hz2500, B2Val: _b2.Hz2500},
                                                {Freq: "3150", L2Val: _l2.Hz3150, B2Val: _b2.Hz3150}
                                            ) As row,
                                            With(
                                                {_diff: row.L2Val - row.B2Val},
                                                {
                                                    Freq: row.Freq,
                                                    L2Raw: row.L2Val,
                                                    B2Raw: row.B2Val,
                                                    Diff: _diff,
                                                    L2Corrected: If(
                                                        _diff >= 10, row.L2Val,
                                                        _diff >= 6, 10*Log(Max(Power(10,row.L2Val/10)-Power(10,row.B2Val/10),Power(10,-10)),10),
                                                        row.L2Val - 1.3),
                                                    CorrectionType: If(_diff >= 10, "None", _diff >= 6, "Energy", "Limited")
                                                }
                                            )
                                        )
                                    );

                                    ClearCollect(
                                        col_CalcL2Corrected,
                                        {
                                            Hz100: LookUp(col_BgCorrection, Freq="100").L2Corrected,
                                            Hz125: LookUp(col_BgCorrection, Freq="125").L2Corrected,
                                            Hz160: LookUp(col_BgCorrection, Freq="160").L2Corrected,
                                            Hz200: LookUp(col_BgCorrection, Freq="200").L2Corrected,
                                            Hz250: LookUp(col_BgCorrection, Freq="250").L2Corrected,
                                            Hz315: LookUp(col_BgCorrection, Freq="315").L2Corrected,
                                            Hz400: LookUp(col_BgCorrection, Freq="400").L2Corrected,
                                            Hz500: LookUp(col_BgCorrection, Freq="500").L2Corrected,
                                            Hz630: LookUp(col_BgCorrection, Freq="630").L2Corrected,
                                            Hz800: LookUp(col_BgCorrection, Freq="800").L2Corrected,
                                            Hz1000: LookUp(col_BgCorrection, Freq="1000").L2Corrected,
                                            Hz1250: LookUp(col_BgCorrection, Freq="1250").L2Corrected,
                                            Hz1600: LookUp(col_BgCorrection, Freq="1600").L2Corrected,
                                            Hz2000: LookUp(col_BgCorrection, Freq="2000").L2Corrected,
                                            Hz2500: LookUp(col_BgCorrection, Freq="2500").L2Corrected,
                                            Hz3150: LookUp(col_BgCorrection, Freq="3150").L2Corrected
                                        }
                                    );

                                    UpdateContext({
                                        _bgCorrectionApplied: CountRows(Filter(col_BgCorrection, CorrectionType = "Energy")) > 0,
                                        _limitedByBackground: CountRows(Filter(col_BgCorrection, CorrectionType = "Limited")) > 0
                                    });

                                    UpdateContext({_l2c: First(col_CalcL2Corrected)});

                                    // ═══════════════════════════════════════
                                    // STEP 6: 6dB adjacency rule
                                    // ═══════════════════════════════════════
                                    UpdateContext({
                                        _sixDbMet: CountRows(
                                            Filter(
                                                AddColumns(
                                                    Filter(col_MeasurementDisplay, MeasurementType = "L1"),
                                                    MaxDiff,
                                                    Max(
                                                        Table(
                                                            {Diff: Abs(Hz100-Hz125)}, {Diff: Abs(Hz125-Hz160)},
                                                            {Diff: Abs(Hz160-Hz200)}, {Diff: Abs(Hz200-Hz250)},
                                                            {Diff: Abs(Hz250-Hz315)}, {Diff: Abs(Hz315-Hz400)},
                                                            {Diff: Abs(Hz400-Hz500)}, {Diff: Abs(Hz500-Hz630)},
                                                            {Diff: Abs(Hz630-Hz800)}, {Diff: Abs(Hz800-Hz1000)},
                                                            {Diff: Abs(Hz1000-Hz1250)}, {Diff: Abs(Hz1250-Hz1600)},
                                                            {Diff: Abs(Hz1600-Hz2000)}, {Diff: Abs(Hz2000-Hz2500)},
                                                            {Diff: Abs(Hz2500-Hz3150)}
                                                        ), Diff
                                                    )
                                                ),
                                                MaxDiff > 6
                                            )
                                        ) = 0
                                    });

                                    // ═══════════════════════════════════════
                                    // STEP 7: D and DnT
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_CalcD,
                                        {
                                            Hz100: _l1.Hz100-_l2c.Hz100, Hz125: _l1.Hz125-_l2c.Hz125,
                                            Hz160: _l1.Hz160-_l2c.Hz160, Hz200: _l1.Hz200-_l2c.Hz200,
                                            Hz250: _l1.Hz250-_l2c.Hz250, Hz315: _l1.Hz315-_l2c.Hz315,
                                            Hz400: _l1.Hz400-_l2c.Hz400, Hz500: _l1.Hz500-_l2c.Hz500,
                                            Hz630: _l1.Hz630-_l2c.Hz630, Hz800: _l1.Hz800-_l2c.Hz800,
                                            Hz1000: _l1.Hz1000-_l2c.Hz1000, Hz1250: _l1.Hz1250-_l2c.Hz1250,
                                            Hz1600: _l1.Hz1600-_l2c.Hz1600, Hz2000: _l1.Hz2000-_l2c.Hz2000,
                                            Hz2500: _l1.Hz2500-_l2c.Hz2500, Hz3150: _l1.Hz3150-_l2c.Hz3150
                                        }
                                    );

                                    UpdateContext({_d: First(col_CalcD)});

                                    ClearCollect(
                                        col_CalcDnT,
                                        {
                                            Hz100: _d.Hz100+10*Log(_t2.Hz100/0.5,10), Hz125: _d.Hz125+10*Log(_t2.Hz125/0.5,10),
                                            Hz160: _d.Hz160+10*Log(_t2.Hz160/0.5,10), Hz200: _d.Hz200+10*Log(_t2.Hz200/0.5,10),
                                            Hz250: _d.Hz250+10*Log(_t2.Hz250/0.5,10), Hz315: _d.Hz315+10*Log(_t2.Hz315/0.5,10),
                                            Hz400: _d.Hz400+10*Log(_t2.Hz400/0.5,10), Hz500: _d.Hz500+10*Log(_t2.Hz500/0.5,10),
                                            Hz630: _d.Hz630+10*Log(_t2.Hz630/0.5,10), Hz800: _d.Hz800+10*Log(_t2.Hz800/0.5,10),
                                            Hz1000: _d.Hz1000+10*Log(_t2.Hz1000/0.5,10), Hz1250: _d.Hz1250+10*Log(_t2.Hz1250/0.5,10),
                                            Hz1600: _d.Hz1600+10*Log(_t2.Hz1600/0.5,10), Hz2000: _d.Hz2000+10*Log(_t2.Hz2000/0.5,10),
                                            Hz2500: _d.Hz2500+10*Log(_t2.Hz2500/0.5,10), Hz3150: _d.Hz3150+10*Log(_t2.Hz3150/0.5,10)
                                        }
                                    );

                                    UpdateContext({_dnt: First(col_CalcDnT)});

                                    // ═══════════════════════════════════════
                                    // STEP 8: Level difference display
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_LevelDifference,
                                        ForAll(
                                            Table(
                                                {Freq: "100",  FreqSort: 1,  L1Val: _l1.Hz100,  L2Val: _l2.Hz100,  L2CorrVal: _l2c.Hz100,  B2Val: _b2.Hz100,  T2Val: _t2.Hz100,  DVal: _d.Hz100,  DnTVal: _dnt.Hz100},
                                                {Freq: "125",  FreqSort: 2,  L1Val: _l1.Hz125,  L2Val: _l2.Hz125,  L2CorrVal: _l2c.Hz125,  B2Val: _b2.Hz125,  T2Val: _t2.Hz125,  DVal: _d.Hz125,  DnTVal: _dnt.Hz125},
                                                {Freq: "160",  FreqSort: 3,  L1Val: _l1.Hz160,  L2Val: _l2.Hz160,  L2CorrVal: _l2c.Hz160,  B2Val: _b2.Hz160,  T2Val: _t2.Hz160,  DVal: _d.Hz160,  DnTVal: _dnt.Hz160},
                                                {Freq: "200",  FreqSort: 4,  L1Val: _l1.Hz200,  L2Val: _l2.Hz200,  L2CorrVal: _l2c.Hz200,  B2Val: _b2.Hz200,  T2Val: _t2.Hz200,  DVal: _d.Hz200,  DnTVal: _dnt.Hz200},
                                                {Freq: "250",  FreqSort: 5,  L1Val: _l1.Hz250,  L2Val: _l2.Hz250,  L2CorrVal: _l2c.Hz250,  B2Val: _b2.Hz250,  T2Val: _t2.Hz250,  DVal: _d.Hz250,  DnTVal: _dnt.Hz250},
                                                {Freq: "315",  FreqSort: 6,  L1Val: _l1.Hz315,  L2Val: _l2.Hz315,  L2CorrVal: _l2c.Hz315,  B2Val: _b2.Hz315,  T2Val: _t2.Hz315,  DVal: _d.Hz315,  DnTVal: _dnt.Hz315},
                                                {Freq: "400",  FreqSort: 7,  L1Val: _l1.Hz400,  L2Val: _l2.Hz400,  L2CorrVal: _l2c.Hz400,  B2Val: _b2.Hz400,  T2Val: _t2.Hz400,  DVal: _d.Hz400,  DnTVal: _dnt.Hz400},
                                                {Freq: "500",  FreqSort: 8,  L1Val: _l1.Hz500,  L2Val: _l2.Hz500,  L2CorrVal: _l2c.Hz500,  B2Val: _b2.Hz500,  T2Val: _t2.Hz500,  DVal: _d.Hz500,  DnTVal: _dnt.Hz500},
                                                {Freq: "630",  FreqSort: 9,  L1Val: _l1.Hz630,  L2Val: _l2.Hz630,  L2CorrVal: _l2c.Hz630,  B2Val: _b2.Hz630,  T2Val: _t2.Hz630,  DVal: _d.Hz630,  DnTVal: _dnt.Hz630},
                                                {Freq: "800",  FreqSort: 10, L1Val: _l1.Hz800,  L2Val: _l2.Hz800,  L2CorrVal: _l2c.Hz800,  B2Val: _b2.Hz800,  T2Val: _t2.Hz800,  DVal: _d.Hz800,  DnTVal: _dnt.Hz800},
                                                {Freq: "1000", FreqSort: 11, L1Val: _l1.Hz1000, L2Val: _l2.Hz1000, L2CorrVal: _l2c.Hz1000, B2Val: _b2.Hz1000, T2Val: _t2.Hz1000, DVal: _d.Hz1000, DnTVal: _dnt.Hz1000},
                                                {Freq: "1250", FreqSort: 12, L1Val: _l1.Hz1250, L2Val: _l2.Hz1250, L2CorrVal: _l2c.Hz1250, B2Val: _b2.Hz1250, T2Val: _t2.Hz1250, DVal: _d.Hz1250, DnTVal: _dnt.Hz1250},
                                                {Freq: "1600", FreqSort: 13, L1Val: _l1.Hz1600, L2Val: _l2.Hz1600, L2CorrVal: _l2c.Hz1600, B2Val: _b2.Hz1600, T2Val: _t2.Hz1600, DVal: _d.Hz1600, DnTVal: _dnt.Hz1600},
                                                {Freq: "2000", FreqSort: 14, L1Val: _l1.Hz2000, L2Val: _l2.Hz2000, L2CorrVal: _l2c.Hz2000, B2Val: _b2.Hz2000, T2Val: _t2.Hz2000, DVal: _d.Hz2000, DnTVal: _dnt.Hz2000},
                                                {Freq: "2500", FreqSort: 15, L1Val: _l1.Hz2500, L2Val: _l2.Hz2500, L2CorrVal: _l2c.Hz2500, B2Val: _b2.Hz2500, T2Val: _t2.Hz2500, DVal: _d.Hz2500, DnTVal: _dnt.Hz2500},
                                                {Freq: "3150", FreqSort: 16, L1Val: _l1.Hz3150, L2Val: _l2.Hz3150, L2CorrVal: _l2c.Hz3150, B2Val: _b2.Hz3150, T2Val: _t2.Hz3150, DVal: _d.Hz3150, DnTVal: _dnt.Hz3150}
                                            ) As row,
                                            With(
                                                {
                                                    _bgRow: LookUp(col_BgCorrection, Freq = row.Freq),
                                                    _rtCorr: 10 * Log(row.T2Val / 0.5, 10)
                                                },
                                                {
                                                    Freq: row.Freq, FreqSort: row.FreqSort,
                                                    DisplayFreq: Switch(row.Freq,
                                                        "1000","1k","1250","1.25k","1600","1.6k",
                                                        "2000","2k","2500","2.5k","3150","3.15k",
                                                        row.Freq) & "Hz",
                                                    L1Avg: Round(row.L1Val, 1),
                                                    L2Avg: Round(row.L2Val, 1),
                                                    L2Corrected: Round(row.L2CorrVal, 1),
                                                    B2: Round(row.B2Val, 1),
                                                    T2Avg: Round(row.T2Val, 2),
                                                    RTCorrection: Round(_rtCorr, 1),
                                                    CorrectionType: _bgRow.CorrectionType,
                                                    D: Round(row.DVal, 1),
                                                    DnT: Round(row.DnTVal, 1),
                                                    LnT: Blank()
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 9: ISO 717-1 curve fitting (DnT)
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_ISORef,
                                        {Hz100:33, Hz125:36, Hz160:39, Hz200:42, Hz250:45, Hz315:48,
                                         Hz400:51, Hz500:52, Hz630:53, Hz800:54, Hz1000:55, Hz1250:56,
                                         Hz1600:56, Hz2000:56, Hz2500:56, Hz3150:56}
                                    );

                                    UpdateContext({_ref: First(col_ISORef)});

                                    ClearCollect(
                                        col_ShiftResults,
                                        ForAll(
                                            Sequence(51, -20) As shift,
                                            With(
                                                {
                                                    _devSum:
                                                        Max(0,(_ref.Hz100+shift.Value)-_dnt.Hz100) + Max(0,(_ref.Hz125+shift.Value)-_dnt.Hz125) +
                                                        Max(0,(_ref.Hz160+shift.Value)-_dnt.Hz160) + Max(0,(_ref.Hz200+shift.Value)-_dnt.Hz200) +
                                                        Max(0,(_ref.Hz250+shift.Value)-_dnt.Hz250) + Max(0,(_ref.Hz315+shift.Value)-_dnt.Hz315) +
                                                        Max(0,(_ref.Hz400+shift.Value)-_dnt.Hz400) + Max(0,(_ref.Hz500+shift.Value)-_dnt.Hz500) +
                                                        Max(0,(_ref.Hz630+shift.Value)-_dnt.Hz630) + Max(0,(_ref.Hz800+shift.Value)-_dnt.Hz800) +
                                                        Max(0,(_ref.Hz1000+shift.Value)-_dnt.Hz1000) + Max(0,(_ref.Hz1250+shift.Value)-_dnt.Hz1250) +
                                                        Max(0,(_ref.Hz1600+shift.Value)-_dnt.Hz1600) + Max(0,(_ref.Hz2000+shift.Value)-_dnt.Hz2000) +
                                                        Max(0,(_ref.Hz2500+shift.Value)-_dnt.Hz2500) + Max(0,(_ref.Hz3150+shift.Value)-_dnt.Hz3150)
                                                },
                                                {Shift: shift.Value, DevSum: _devSum, Passes: _devSum <= 32}
                                            )
                                        )
                                    );

                                    UpdateContext({_bestShift: Max(Filter(col_ShiftResults, Passes), Shift)});
                                    UpdateContext({_DnTw: _ref.Hz500 + _bestShift});

                                    // ═══════════════════════════════════════
                                    // STEP 10: ISO 717-1 curve fitting (D) for Dw
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_ShiftResultsD,
                                        ForAll(
                                            Sequence(51, -20) As shift,
                                            With(
                                                {
                                                    _devSum:
                                                        Max(0,(_ref.Hz100+shift.Value)-_d.Hz100) + Max(0,(_ref.Hz125+shift.Value)-_d.Hz125) +
                                                        Max(0,(_ref.Hz160+shift.Value)-_d.Hz160) + Max(0,(_ref.Hz200+shift.Value)-_d.Hz200) +
                                                        Max(0,(_ref.Hz250+shift.Value)-_d.Hz250) + Max(0,(_ref.Hz315+shift.Value)-_d.Hz315) +
                                                        Max(0,(_ref.Hz400+shift.Value)-_d.Hz400) + Max(0,(_ref.Hz500+shift.Value)-_d.Hz500) +
                                                        Max(0,(_ref.Hz630+shift.Value)-_d.Hz630) + Max(0,(_ref.Hz800+shift.Value)-_d.Hz800) +
                                                        Max(0,(_ref.Hz1000+shift.Value)-_d.Hz1000) + Max(0,(_ref.Hz1250+shift.Value)-_d.Hz1250) +
                                                        Max(0,(_ref.Hz1600+shift.Value)-_d.Hz1600) + Max(0,(_ref.Hz2000+shift.Value)-_d.Hz2000) +
                                                        Max(0,(_ref.Hz2500+shift.Value)-_d.Hz2500) + Max(0,(_ref.Hz3150+shift.Value)-_d.Hz3150)
                                                },
                                                {Shift: shift.Value, DevSum: _devSum, Passes: _devSum <= 32}
                                            )
                                        )
                                    );

                                    UpdateContext({
                                        _bestShiftD: Max(Filter(col_ShiftResultsD, Passes), Shift),
                                        _Dw: _ref.Hz500 + Max(Filter(col_ShiftResultsD, Passes), Shift)
                                    });

                                    // ═══════════════════════════════════════
                                    // STEP 11: C and Ctr
                                    // ═══════════════════════════════════════
                                    UpdateContext({
                                        _C: Round(
                                            -10*Log(
                                                Power(10,(-29-_dnt.Hz100)/10) + Power(10,(-26-_dnt.Hz125)/10) +
                                                Power(10,(-23-_dnt.Hz160)/10) + Power(10,(-21-_dnt.Hz200)/10) +
                                                Power(10,(-19-_dnt.Hz250)/10) + Power(10,(-17-_dnt.Hz315)/10) +
                                                Power(10,(-15-_dnt.Hz400)/10) + Power(10,(-13-_dnt.Hz500)/10) +
                                                Power(10,(-12-_dnt.Hz630)/10) + Power(10,(-11-_dnt.Hz800)/10) +
                                                Power(10,(-10-_dnt.Hz1000)/10) + Power(10,(-9-_dnt.Hz1250)/10) +
                                                Power(10,(-9-_dnt.Hz1600)/10) + Power(10,(-9-_dnt.Hz2000)/10) +
                                                Power(10,(-9-_dnt.Hz2500)/10) + Power(10,(-9-_dnt.Hz3150)/10),
                                            10) - _DnTw, 0),
                                        _Ctr: Round(
                                            -10*Log(
                                                Power(10,(-20-_dnt.Hz100)/10) + Power(10,(-20-_dnt.Hz125)/10) +
                                                Power(10,(-18-_dnt.Hz160)/10) + Power(10,(-16-_dnt.Hz200)/10) +
                                                Power(10,(-15-_dnt.Hz250)/10) + Power(10,(-14-_dnt.Hz315)/10) +
                                                Power(10,(-13-_dnt.Hz400)/10) + Power(10,(-12-_dnt.Hz500)/10) +
                                                Power(10,(-11-_dnt.Hz630)/10) + Power(10,(-9-_dnt.Hz800)/10) +
                                                Power(10,(-8-_dnt.Hz1000)/10) + Power(10,(-9-_dnt.Hz1250)/10) +
                                                Power(10,(-10-_dnt.Hz1600)/10) + Power(10,(-11-_dnt.Hz2000)/10) +
                                                Power(10,(-13-_dnt.Hz2500)/10) + Power(10,(-15-_dnt.Hz3150)/10),
                                            10) - _DnTw, 0)
                                    });

                                    UpdateContext({_DnTwPlusCtr: _DnTw + _Ctr});

                                    // ═══════════════════════════════════════
                                    // STEP 12: Pass/Fail
                                    // ═══════════════════════════════════════
                                    UpdateContext({
                                        _result: If(_DnTwPlusCtr >= cVar_CurrentPartition.RequiredValue, "Pass", "Fail")
                                    });

                                    // ═══════════════════════════════════════
                                    // STEP 13: Results summary (AFTER curve fitting)
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_ResultsSummary,
                                        Table(
                                            {Sort: 1,  Label: "D,w",                   Value: Text(_Dw) & " dB",           Category: "Single Figure"},
                                            {Sort: 2,  Label: "DnT,w",                 Value: Text(_DnTw) & " dB",         Category: "Single Figure"},
                                            {Sort: 3,  Label: "C",                      Value: Text(_C) & " dB",            Category: "Spectrum Adaptation"},
                                            {Sort: 4,  Label: "Ctr",                    Value: Text(_Ctr) & " dB",          Category: "Spectrum Adaptation"},
                                            {Sort: 5,  Label: "DnT,w + C",              Value: Text(_DnTw + _C) & " dB",   Category: "Combined"},
                                            {Sort: 6,  Label: "DnT,w + Ctr",            Value: Text(_DnTwPlusCtr) & " dB", Category: "Combined"},
                                            {Sort: 7,  Label: "Required",               Value: "≥" & Text(cVar_CurrentPartition.RequiredValue) & " dB", Category: "Target"},
                                            {Sort: 8,  Label: "Result",                 Value: _result,                     Category: "Target"},
                                            {Sort: 9,  Label: "Best Shift (DnT)",       Value: Text(_bestShift) & " dB",    Category: "Curve Fitting"},
                                            {Sort: 10, Label: "Dev Sum at Best (DnT)",   Value: Text(LookUp(col_ShiftResults, Shift = _bestShift).DevSum), Category: "Curve Fitting"},
                                            {Sort: 11, Label: "Best Shift (D)",          Value: Text(_bestShiftD) & " dB",   Category: "Curve Fitting"},
                                            {Sort: 12, Label: "Partition Type",          Value: cVar_CurrentPartition.PartitionType, Category: "Info"},
                                            {Sort: 13, Label: "Source Room",             Value: cVar_CurrentPartition.SourceRoom,    Category: "Info"},
                                            {Sort: 14, Label: "Receiver Room",           Value: cVar_CurrentPartition.ReceiverRoom,  Category: "Info"},
                                            {Sort: 15, Label: "6dB Rule Met",            Value: If(_sixDbMet, "Yes", "No ⚠"), Category: "Flags"},
                                            {Sort: 16, Label: "Background Correction",   Value: If(_bgCorrectionApplied, "Applied", "Not needed"), Category: "Flags"},
                                            {Sort: 17, Label: "Limited by Background",   Value: If(_limitedByBackground, "Yes ⚠", "No"), Category: "Flags"},
                                            {Sort: 18, Label: "Small Room Used",         Value: If(cVar_CurrentPartition.SourceRoomVolume < 25 || cVar_CurrentPartition.ReceiverRoomVolume < 25, "Yes ⚠", "No"), Category: "Flags"}
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 14: ISO curve display
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_DisplayISO,
                                        ForAll(
                                            Table(
                                                {Freq: "100",  FreqSort: 1,  RefBase: 33, Measured: _dnt.Hz100},
                                                {Freq: "125",  FreqSort: 2,  RefBase: 36, Measured: _dnt.Hz125},
                                                {Freq: "160",  FreqSort: 3,  RefBase: 39, Measured: _dnt.Hz160},
                                                {Freq: "200",  FreqSort: 4,  RefBase: 42, Measured: _dnt.Hz200},
                                                {Freq: "250",  FreqSort: 5,  RefBase: 45, Measured: _dnt.Hz250},
                                                {Freq: "315",  FreqSort: 6,  RefBase: 48, Measured: _dnt.Hz315},
                                                {Freq: "400",  FreqSort: 7,  RefBase: 51, Measured: _dnt.Hz400},
                                                {Freq: "500",  FreqSort: 8,  RefBase: 52, Measured: _dnt.Hz500},
                                                {Freq: "630",  FreqSort: 9,  RefBase: 53, Measured: _dnt.Hz630},
                                                {Freq: "800",  FreqSort: 10, RefBase: 54, Measured: _dnt.Hz800},
                                                {Freq: "1000", FreqSort: 11, RefBase: 55, Measured: _dnt.Hz1000},
                                                {Freq: "1250", FreqSort: 12, RefBase: 56, Measured: _dnt.Hz1250},
                                                {Freq: "1600", FreqSort: 13, RefBase: 56, Measured: _dnt.Hz1600},
                                                {Freq: "2000", FreqSort: 14, RefBase: 56, Measured: _dnt.Hz2000},
                                                {Freq: "2500", FreqSort: 15, RefBase: 56, Measured: _dnt.Hz2500},
                                                {Freq: "3150", FreqSort: 16, RefBase: 56, Measured: _dnt.Hz3150}
                                            ) As row,
                                            {
                                                Freq: row.Freq, FreqSort: row.FreqSort,
                                                Reference: row.RefBase,
                                                Shifted: row.RefBase + _bestShift,
                                                Measured: Round(row.Measured, 1),
                                                Deviation: Max(0, (row.RefBase + _bestShift) - row.Measured),
                                                PassFail: If(row.Measured >= (row.RefBase + _bestShift), "✓", "✗")
                                            }
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 15: Save results to Dataverse
                                    // ═══════════════════════════════════════
                                    Patch(
                                        BESA_TestRuns,
                                        LookUp(BESA_TestRuns, BESA_TestRun = cVar_CurrentPartition.PartitionID),
                                        {
                                            SummaryResults: JSON(
                                                {
                                                    Dw: _Dw,
                                                    DnTw: _DnTw,
                                                    C: _C,
                                                    Ctr: _Ctr,
                                                    DnTwPlusCtr: _DnTwPlusCtr,
                                                    RequiredValue: cVar_CurrentPartition.RequiredValue,
                                                    Result: _result,
                                                    BestShift: _bestShift,
                                                    BestShiftD: _bestShiftD,
                                                    DSpectral: {
                                                        '100': Round(_d.Hz100,1), '125': Round(_d.Hz125,1),
                                                        '160': Round(_d.Hz160,1), '200': Round(_d.Hz200,1),
                                                        '250': Round(_d.Hz250,1), '315': Round(_d.Hz315,1),
                                                        '400': Round(_d.Hz400,1), '500': Round(_d.Hz500,1),
                                                        '630': Round(_d.Hz630,1), '800': Round(_d.Hz800,1),
                                                        '1000': Round(_d.Hz1000,1), '1250': Round(_d.Hz1250,1),
                                                        '1600': Round(_d.Hz1600,1), '2000': Round(_d.Hz2000,1),
                                                        '2500': Round(_d.Hz2500,1), '3150': Round(_d.Hz3150,1)
                                                    },
                                                    DnTSpectral: {
                                                        '100': Round(_dnt.Hz100,1), '125': Round(_dnt.Hz125,1),
                                                        '160': Round(_dnt.Hz160,1), '200': Round(_dnt.Hz200,1),
                                                        '250': Round(_dnt.Hz250,1), '315': Round(_dnt.Hz315,1),
                                                        '400': Round(_dnt.Hz400,1), '500': Round(_dnt.Hz500,1),
                                                        '630': Round(_dnt.Hz630,1), '800': Round(_dnt.Hz800,1),
                                                        '1000': Round(_dnt.Hz1000,1), '1250': Round(_dnt.Hz1250,1),
                                                        '1600': Round(_dnt.Hz1600,1), '2000': Round(_dnt.Hz2000,1),
                                                        '2500': Round(_dnt.Hz2500,1), '3150': Round(_dnt.Hz3150,1)
                                                    }
                                                }
                                            ),
                                            TestMetaData: JSON(
                                                {
                                                    SixDbRuleMet: _sixDbMet,
                                                    BackgroundCorrectionApplied: _bgCorrectionApplied,
                                                    ResultLimitedByBackground: _limitedByBackground,
                                                    SmallRoomUsed: cVar_CurrentPartition.SourceRoomVolume < 25
                                                        || cVar_CurrentPartition.ReceiverRoomVolume < 25
                                                }
                                            )
                                        }
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 16: Update partitions collection
                                    // ═══════════════════════════════════════
                                    UpdateIf(
                                        col_AcousticPartitions,
                                        PartitionID = cVar_CurrentPartition.PartitionID,
                                        {
                                            DnTwPlusCtr: _DnTwPlusCtr,
                                            PassFail: _result,
                                            SixDbRuleMet: _sixDbMet,
                                            ResultLimitedByBackground: _limitedByBackground
                                        }
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 17: Rebuild airborne results table
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_AirborneResults,
                                        ForAll(
                                            SortByColumns(
                                                Filter(col_AcousticPartitions, TestCategory = "Airborne"),
                                                "PartitionNo", SortOrder.Ascending
                                            ) As part,
                                            With(
                                                {
                                                    _parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID),
                                                    _l1Positions: CountRows(Distinct(
                                                        ForAll(part.MeasurementData.L1.positions As pos, {P: Value(pos.positionNo)}), P)),
                                                    _l1Readings: CountRows(Ungroup(
                                                        ForAll(part.MeasurementData.L1.positions As pos,
                                                            ForAll(pos.readings As rd, {R: 1})), Value)),
                                                    _l2Positions: CountRows(Distinct(
                                                        ForAll(part.MeasurementData.L2.positions As pos, {P: Value(pos.positionNo)}), P)),
                                                    _l2Readings: CountRows(Ungroup(
                                                        ForAll(part.MeasurementData.L2.positions As pos,
                                                            ForAll(pos.readings As rd, {R: 1})), Value)),
                                                    _b2Count: CountRows(ForAll(part.MeasurementData.B2 As rd, {R: 1})),
                                                    _t2Positions: CountRows(Distinct(
                                                        ForAll(part.MeasurementData.T2.sourcePositions As pos, {P: Value(pos.positionNo)}), P)),
                                                    _t2Readings: CountRows(Ungroup(
                                                        ForAll(part.MeasurementData.T2.sourcePositions As pos,
                                                            ForAll(pos.readings As rd, {R: 1})), Value))
                                                },
                                                {
                                                    Sort: part.PartitionNo,
                                                    DateOfTest: If(!IsBlank(_parentRun.RunDate), Text(_parentRun.RunDate, "dd/mm/yyyy"), ""),
                                                    TestReportNumber: part.TestReportNumber,
                                                    SourceRoom: part.SourceRoom,
                                                    SourceRoomVolume: part.SourceRoomVolume,
                                                    ReceiverRoom: part.ReceiverRoom,
                                                    ReceiverRoomVolume: part.ReceiverRoomVolume,
                                                    PartitionType: part.PartitionType,
                                                    PartitionLabel: part.PartitionLabel,
                                                    PartitionID: part.PartitionID,
                                                    TestRunID: part.TestRunID,
                                                    Measured: If(!IsBlank(part.DnTwPlusCtr),
                                                        Text(part.DnTwPlusCtr) & If(!part.SixDbRuleMet, "[4]", "") & If(part.ResultLimitedByBackground, "≥", ""), "—"),
                                                    MeasuredValue: If(!IsBlank(part.DnTwPlusCtr), part.DnTwPlusCtr, 0),
                                                    Required: "≥" & Text(part.RequiredValue),
                                                    RequiredValue: part.RequiredValue,
                                                    PassFail: part.PassFail,
                                                    RunLabel: If(!IsBlank(_parentRun), _parentRun.RunLabel, ""),
                                                    Engineer: If(!IsBlank(_parentRun), _parentRun.Engineer, ""),
                                                    DnTw: If(!IsBlank(part.Results) && !IsBlank(part.Results.DnTw), Value(Text(part.Results.DnTw)), Blank()),
                                                    C: If(!IsBlank(part.Results) && !IsBlank(part.Results.C), Value(Text(part.Results.C)), Blank()),
                                                    Ctr: If(!IsBlank(part.Results) && !IsBlank(part.Results.Ctr), Value(Text(part.Results.Ctr)), Blank()),
                                                    SixDbRuleMet: part.SixDbRuleMet,
                                                    ResultLimitedByBackground: part.ResultLimitedByBackground,
                                                    SmallRoomUsed: part.SourceRoomVolume < 25 || part.ReceiverRoomVolume < 25,
                                                    NumSpeakerPositions: _l1Positions,
                                                    NumL1ReadingsPerPosition: If(_l1Positions > 0, RoundDown(_l1Readings / _l1Positions, 0), 0),
                                                    NumL2ReadingsPerPosition: If(_l2Positions > 0, RoundDown(_l2Readings / _l2Positions, 0), 0),
                                                    NumB2Measurements: _b2Count,
                                                    NumT2SourcePositions: _t2Positions,
                                                    NumT2ReadingsPerPosition: If(_t2Positions > 0, RoundDown(_t2Readings / _t2Positions, 0), 0)
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 18: Refresh display + notify
                                    // ═══════════════════════════════════════
                                    Select(btnRefreshMeasurements_1);

                                );
                              Visible: =false
                              Width: =30
                              X: =1036
                              Y: =210
                        - btnCalculateImpact_2:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =fxPrimary
                              Height: =30
                              Icon: ="Open"
                              Layout: ='ButtonCanvas.Layout'.IconOnly
                              OnSelect: |-
                                =// =============================================
                                // btnCalculateImpact.OnSelect
                                // =============================================

                                // ── GUARD: Check data exists ──
                                If(
                                    CountRows(Filter(col_MeasurementDisplay, MeasurementType = "L2")) = 0
                                    || CountRows(Filter(col_MeasurementDisplay, MeasurementType = "B2")) = 0
                                    || CountRows(Filter(col_MeasurementDisplay, MeasurementType = "T2")) = 0,
                                    Notify("Missing measurement data — cannot calculate", NotificationType.Error),

                                    // ═══════════════════════════════════════
                                    // STEP 1: Energy-average L2 across tapper positions
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_CalcL2Avg,
                                        With(
                                            {_l2Rows: Filter(col_MeasurementDisplay, MeasurementType = "L2")},
                                            If(
                                                CountRows(_l2Rows) = 0,
                                                {Hz100:0, Hz125:0, Hz160:0, Hz200:0, Hz250:0, Hz315:0, Hz400:0, Hz500:0,
                                                 Hz630:0, Hz800:0, Hz1000:0, Hz1250:0, Hz1600:0, Hz2000:0, Hz2500:0, Hz3150:0},
                                                {
                                                    Hz100: 10*Log(Average(_l2Rows, Power(10, Hz100/10)),10),
                                                    Hz125: 10*Log(Average(_l2Rows, Power(10, Hz125/10)),10),
                                                    Hz160: 10*Log(Average(_l2Rows, Power(10, Hz160/10)),10),
                                                    Hz200: 10*Log(Average(_l2Rows, Power(10, Hz200/10)),10),
                                                    Hz250: 10*Log(Average(_l2Rows, Power(10, Hz250/10)),10),
                                                    Hz315: 10*Log(Average(_l2Rows, Power(10, Hz315/10)),10),
                                                    Hz400: 10*Log(Average(_l2Rows, Power(10, Hz400/10)),10),
                                                    Hz500: 10*Log(Average(_l2Rows, Power(10, Hz500/10)),10),
                                                    Hz630: 10*Log(Average(_l2Rows, Power(10, Hz630/10)),10),
                                                    Hz800: 10*Log(Average(_l2Rows, Power(10, Hz800/10)),10),
                                                    Hz1000: 10*Log(Average(_l2Rows, Power(10, Hz1000/10)),10),
                                                    Hz1250: 10*Log(Average(_l2Rows, Power(10, Hz1250/10)),10),
                                                    Hz1600: 10*Log(Average(_l2Rows, Power(10, Hz1600/10)),10),
                                                    Hz2000: 10*Log(Average(_l2Rows, Power(10, Hz2000/10)),10),
                                                    Hz2500: 10*Log(Average(_l2Rows, Power(10, Hz2500/10)),10),
                                                    Hz3150: 10*Log(Average(_l2Rows, Power(10, Hz3150/10)),10)
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 2: Get B2 and average T2
                                    // ═══════════════════════════════════════
                                    UpdateContext({
                                        _b2: First(Filter(col_MeasurementDisplay, MeasurementType = "B2")),
                                        _l2: First(col_CalcL2Avg)
                                    });

                                    ClearCollect(
                                        col_CalcT2Avg,
                                        With(
                                            {_t2Rows: Filter(col_MeasurementDisplay, MeasurementType = "T2")},
                                            If(
                                                CountRows(_t2Rows) = 0,
                                                {Hz100:0.5, Hz125:0.5, Hz160:0.5, Hz200:0.5, Hz250:0.5, Hz315:0.5, Hz400:0.5, Hz500:0.5,
                                                 Hz630:0.5, Hz800:0.5, Hz1000:0.5, Hz1250:0.5, Hz1600:0.5, Hz2000:0.5, Hz2500:0.5, Hz3150:0.5},
                                                {
                                                    Hz100: Average(_t2Rows, Hz100), Hz125: Average(_t2Rows, Hz125),
                                                    Hz160: Average(_t2Rows, Hz160), Hz200: Average(_t2Rows, Hz200),
                                                    Hz250: Average(_t2Rows, Hz250), Hz315: Average(_t2Rows, Hz315),
                                                    Hz400: Average(_t2Rows, Hz400), Hz500: Average(_t2Rows, Hz500),
                                                    Hz630: Average(_t2Rows, Hz630), Hz800: Average(_t2Rows, Hz800),
                                                    Hz1000: Average(_t2Rows, Hz1000), Hz1250: Average(_t2Rows, Hz1250),
                                                    Hz1600: Average(_t2Rows, Hz1600), Hz2000: Average(_t2Rows, Hz2000),
                                                    Hz2500: Average(_t2Rows, Hz2500), Hz3150: Average(_t2Rows, Hz3150)
                                                }
                                            )
                                        )
                                    );

                                    UpdateContext({_t2: First(col_CalcT2Avg)});

                                    // ═══════════════════════════════════════
                                    // STEP 3: Reverberation display
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_Reverberation,
                                        ForAll(
                                            Table(
                                                {Freq: "100",  FreqSort: 1,  AvgVal: _t2.Hz100},
                                                {Freq: "125",  FreqSort: 2,  AvgVal: _t2.Hz125},
                                                {Freq: "160",  FreqSort: 3,  AvgVal: _t2.Hz160},
                                                {Freq: "200",  FreqSort: 4,  AvgVal: _t2.Hz200},
                                                {Freq: "250",  FreqSort: 5,  AvgVal: _t2.Hz250},
                                                {Freq: "315",  FreqSort: 6,  AvgVal: _t2.Hz315},
                                                {Freq: "400",  FreqSort: 7,  AvgVal: _t2.Hz400},
                                                {Freq: "500",  FreqSort: 8,  AvgVal: _t2.Hz500},
                                                {Freq: "630",  FreqSort: 9,  AvgVal: _t2.Hz630},
                                                {Freq: "800",  FreqSort: 10, AvgVal: _t2.Hz800},
                                                {Freq: "1000", FreqSort: 11, AvgVal: _t2.Hz1000},
                                                {Freq: "1250", FreqSort: 12, AvgVal: _t2.Hz1250},
                                                {Freq: "1600", FreqSort: 13, AvgVal: _t2.Hz1600},
                                                {Freq: "2000", FreqSort: 14, AvgVal: _t2.Hz2000},
                                                {Freq: "2500", FreqSort: 15, AvgVal: _t2.Hz2500},
                                                {Freq: "3150", FreqSort: 16, AvgVal: _t2.Hz3150}
                                            ) As row,
                                            With(
                                                {_t2Rows: Filter(col_MeasurementDisplay, MeasurementType = "T2")},
                                                {
                                                    Freq: row.Freq,
                                                    FreqSort: row.FreqSort,
                                                    DisplayFreq: Switch(row.Freq,
                                                        "1000", "1k", "1250", "1.25k", "1600", "1.6k",
                                                        "2000", "2k", "2500", "2.5k", "3150", "3.15k",
                                                        row.Freq) & "Hz",
                                                    T2Avg: Round(row.AvgVal, 2),
                                                    RTCorrection: Round(10 * Log(row.AvgVal / 0.5, 10), 2),
                                                    ReadingCount: CountRows(_t2Rows),
                                                    MinVal: If(CountRows(_t2Rows) = 0, 0, Round(Min(_t2Rows,
                                                        Switch(row.Freq, "100",Hz100,"125",Hz125,"160",Hz160,"200",Hz200,
                                                        "250",Hz250,"315",Hz315,"400",Hz400,"500",Hz500,"630",Hz630,
                                                        "800",Hz800,"1000",Hz1000,"1250",Hz1250,"1600",Hz1600,
                                                        "2000",Hz2000,"2500",Hz2500,"3150",Hz3150)), 2)),
                                                    MaxVal: If(CountRows(_t2Rows) = 0, 0, Round(Max(_t2Rows,
                                                        Switch(row.Freq, "100",Hz100,"125",Hz125,"160",Hz160,"200",Hz200,
                                                        "250",Hz250,"315",Hz315,"400",Hz400,"500",Hz500,"630",Hz630,
                                                        "800",Hz800,"1000",Hz1000,"1250",Hz1250,"1600",Hz1600,
                                                        "2000",Hz2000,"2500",Hz2500,"3150",Hz3150)), 2)),
                                                    Spread: If(CountRows(_t2Rows) = 0, 0, Round(
                                                        Max(_t2Rows, Switch(row.Freq, "100",Hz100,"125",Hz125,"160",Hz160,"200",Hz200,
                                                        "250",Hz250,"315",Hz315,"400",Hz400,"500",Hz500,"630",Hz630,
                                                        "800",Hz800,"1000",Hz1000,"1250",Hz1250,"1600",Hz1600,
                                                        "2000",Hz2000,"2500",Hz2500,"3150",Hz3150))
                                                        - Min(_t2Rows, Switch(row.Freq, "100",Hz100,"125",Hz125,"160",Hz160,"200",Hz200,
                                                        "250",Hz250,"315",Hz315,"400",Hz400,"500",Hz500,"630",Hz630,
                                                        "800",Hz800,"1000",Hz1000,"1250",Hz1250,"1600",Hz1600,
                                                        "2000",Hz2000,"2500",Hz2500,"3150",Hz3150)), 2)),
                                                    StandardisedTo: 0.5
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 4: Background correction
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_BgCorrection,
                                        ForAll(
                                            Table(
                                                {Freq: "100",  L2Val: _l2.Hz100,  B2Val: _b2.Hz100},
                                                {Freq: "125",  L2Val: _l2.Hz125,  B2Val: _b2.Hz125},
                                                {Freq: "160",  L2Val: _l2.Hz160,  B2Val: _b2.Hz160},
                                                {Freq: "200",  L2Val: _l2.Hz200,  B2Val: _b2.Hz200},
                                                {Freq: "250",  L2Val: _l2.Hz250,  B2Val: _b2.Hz250},
                                                {Freq: "315",  L2Val: _l2.Hz315,  B2Val: _b2.Hz315},
                                                {Freq: "400",  L2Val: _l2.Hz400,  B2Val: _b2.Hz400},
                                                {Freq: "500",  L2Val: _l2.Hz500,  B2Val: _b2.Hz500},
                                                {Freq: "630",  L2Val: _l2.Hz630,  B2Val: _b2.Hz630},
                                                {Freq: "800",  L2Val: _l2.Hz800,  B2Val: _b2.Hz800},
                                                {Freq: "1000", L2Val: _l2.Hz1000, B2Val: _b2.Hz1000},
                                                {Freq: "1250", L2Val: _l2.Hz1250, B2Val: _b2.Hz1250},
                                                {Freq: "1600", L2Val: _l2.Hz1600, B2Val: _b2.Hz1600},
                                                {Freq: "2000", L2Val: _l2.Hz2000, B2Val: _b2.Hz2000},
                                                {Freq: "2500", L2Val: _l2.Hz2500, B2Val: _b2.Hz2500},
                                                {Freq: "3150", L2Val: _l2.Hz3150, B2Val: _b2.Hz3150}
                                            ) As row,
                                            With(
                                                {_diff: row.L2Val - row.B2Val},
                                                {
                                                    Freq: row.Freq,
                                                    L2Raw: row.L2Val,
                                                    B2Raw: row.B2Val,
                                                    Diff: _diff,
                                                    L2Corrected: If(
                                                        _diff >= 10, row.L2Val,
                                                        _diff >= 6, 10*Log(Max(Power(10,row.L2Val/10)-Power(10,row.B2Val/10),Power(10,-10)),10),
                                                        row.L2Val - 1.3),
                                                    CorrectionType: If(_diff >= 10, "None", _diff >= 6, "Energy", "Limited")
                                                }
                                            )
                                        )
                                    );

                                    ClearCollect(
                                        col_CalcL2Corrected,
                                        {
                                            Hz100: LookUp(col_BgCorrection, Freq="100").L2Corrected,
                                            Hz125: LookUp(col_BgCorrection, Freq="125").L2Corrected,
                                            Hz160: LookUp(col_BgCorrection, Freq="160").L2Corrected,
                                            Hz200: LookUp(col_BgCorrection, Freq="200").L2Corrected,
                                            Hz250: LookUp(col_BgCorrection, Freq="250").L2Corrected,
                                            Hz315: LookUp(col_BgCorrection, Freq="315").L2Corrected,
                                            Hz400: LookUp(col_BgCorrection, Freq="400").L2Corrected,
                                            Hz500: LookUp(col_BgCorrection, Freq="500").L2Corrected,
                                            Hz630: LookUp(col_BgCorrection, Freq="630").L2Corrected,
                                            Hz800: LookUp(col_BgCorrection, Freq="800").L2Corrected,
                                            Hz1000: LookUp(col_BgCorrection, Freq="1000").L2Corrected,
                                            Hz1250: LookUp(col_BgCorrection, Freq="1250").L2Corrected,
                                            Hz1600: LookUp(col_BgCorrection, Freq="1600").L2Corrected,
                                            Hz2000: LookUp(col_BgCorrection, Freq="2000").L2Corrected,
                                            Hz2500: LookUp(col_BgCorrection, Freq="2500").L2Corrected,
                                            Hz3150: LookUp(col_BgCorrection, Freq="3150").L2Corrected
                                        }
                                    );

                                    UpdateContext({
                                        _bgCorrectionApplied: CountRows(Filter(col_BgCorrection, CorrectionType = "Energy")) > 0,
                                        _limitedByBackground: CountRows(Filter(col_BgCorrection, CorrectionType = "Limited")) > 0
                                    });

                                    UpdateContext({_l2c: First(col_CalcL2Corrected)});

                                    // ═══════════════════════════════════════
                                    // STEP 5: Calculate L'nT per frequency
                                    // L'nT = L2corrected - 10*log10(T/0.5)
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_CalcLnT,
                                        {
                                            Hz100: _l2c.Hz100 - 10*Log(_t2.Hz100/0.5, 10),
                                            Hz125: _l2c.Hz125 - 10*Log(_t2.Hz125/0.5, 10),
                                            Hz160: _l2c.Hz160 - 10*Log(_t2.Hz160/0.5, 10),
                                            Hz200: _l2c.Hz200 - 10*Log(_t2.Hz200/0.5, 10),
                                            Hz250: _l2c.Hz250 - 10*Log(_t2.Hz250/0.5, 10),
                                            Hz315: _l2c.Hz315 - 10*Log(_t2.Hz315/0.5, 10),
                                            Hz400: _l2c.Hz400 - 10*Log(_t2.Hz400/0.5, 10),
                                            Hz500: _l2c.Hz500 - 10*Log(_t2.Hz500/0.5, 10),
                                            Hz630: _l2c.Hz630 - 10*Log(_t2.Hz630/0.5, 10),
                                            Hz800: _l2c.Hz800 - 10*Log(_t2.Hz800/0.5, 10),
                                            Hz1000: _l2c.Hz1000 - 10*Log(_t2.Hz1000/0.5, 10),
                                            Hz1250: _l2c.Hz1250 - 10*Log(_t2.Hz1250/0.5, 10),
                                            Hz1600: _l2c.Hz1600 - 10*Log(_t2.Hz1600/0.5, 10),
                                            Hz2000: _l2c.Hz2000 - 10*Log(_t2.Hz2000/0.5, 10),
                                            Hz2500: _l2c.Hz2500 - 10*Log(_t2.Hz2500/0.5, 10),
                                            Hz3150: _l2c.Hz3150 - 10*Log(_t2.Hz3150/0.5, 10)
                                        }
                                    );

                                    UpdateContext({_lnt: First(col_CalcLnT)});

                                    // ═══════════════════════════════════════
                                    // STEP 6: Level difference display (impact version)
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_LevelDifference,
                                        ForAll(
                                            Table(
                                                {Freq: "100",  FreqSort: 1,  L2CorrVal: _l2c.Hz100,  T2Val: _t2.Hz100,  LnTVal: _lnt.Hz100},
                                                {Freq: "125",  FreqSort: 2,  L2CorrVal: _l2c.Hz125,  T2Val: _t2.Hz125,  LnTVal: _lnt.Hz125},
                                                {Freq: "160",  FreqSort: 3,  L2CorrVal: _l2c.Hz160,  T2Val: _t2.Hz160,  LnTVal: _lnt.Hz160},
                                                {Freq: "200",  FreqSort: 4,  L2CorrVal: _l2c.Hz200,  T2Val: _t2.Hz200,  LnTVal: _lnt.Hz200},
                                                {Freq: "250",  FreqSort: 5,  L2CorrVal: _l2c.Hz250,  T2Val: _t2.Hz250,  LnTVal: _lnt.Hz250},
                                                {Freq: "315",  FreqSort: 6,  L2CorrVal: _l2c.Hz315,  T2Val: _t2.Hz315,  LnTVal: _lnt.Hz315},
                                                {Freq: "400",  FreqSort: 7,  L2CorrVal: _l2c.Hz400,  T2Val: _t2.Hz400,  LnTVal: _lnt.Hz400},
                                                {Freq: "500",  FreqSort: 8,  L2CorrVal: _l2c.Hz500,  T2Val: _t2.Hz500,  LnTVal: _lnt.Hz500},
                                                {Freq: "630",  FreqSort: 9,  L2CorrVal: _l2c.Hz630,  T2Val: _t2.Hz630,  LnTVal: _lnt.Hz630},
                                                {Freq: "800",  FreqSort: 10, L2CorrVal: _l2c.Hz800,  T2Val: _t2.Hz800,  LnTVal: _lnt.Hz800},
                                                {Freq: "1000", FreqSort: 11, L2CorrVal: _l2c.Hz1000, T2Val: _t2.Hz1000, LnTVal: _lnt.Hz1000},
                                                {Freq: "1250", FreqSort: 12, L2CorrVal: _l2c.Hz1250, T2Val: _t2.Hz1250, LnTVal: _lnt.Hz1250},
                                                {Freq: "1600", FreqSort: 13, L2CorrVal: _l2c.Hz1600, T2Val: _t2.Hz1600, LnTVal: _lnt.Hz1600},
                                                {Freq: "2000", FreqSort: 14, L2CorrVal: _l2c.Hz2000, T2Val: _t2.Hz2000, LnTVal: _lnt.Hz2000},
                                                {Freq: "2500", FreqSort: 15, L2CorrVal: _l2c.Hz2500, T2Val: _t2.Hz2500, LnTVal: _lnt.Hz2500},
                                                {Freq: "3150", FreqSort: 16, L2CorrVal: _l2c.Hz3150, T2Val: _t2.Hz3150, LnTVal: _lnt.Hz3150}
                                            ) As row,
                                            With(
                                                {
                                                    _bgRow: LookUp(col_BgCorrection, Freq = row.Freq),
                                                    _rtCorr: 10 * Log(row.T2Val / 0.5, 10)
                                                },
                                                {
                                                    Freq: row.Freq,
                                                    FreqSort: row.FreqSort,
                                                    DisplayFreq: Switch(row.Freq,
                                                        "1000","1k","1250","1.25k","1600","1.6k",
                                                        "2000","2k","2500","2.5k","3150","3.15k",
                                                        row.Freq) & "Hz",
                                                    L1Avg: Blank(),
                                                    L2Avg: Round(_bgRow.L2Raw, 1),
                                                    L2Corrected: Round(row.L2CorrVal, 1),
                                                    B2: Round(_bgRow.B2Raw, 1),
                                                    T2Avg: Round(row.T2Val, 2),
                                                    RTCorrection: Round(_rtCorr, 1),
                                                    CorrectionType: _bgRow.CorrectionType,
                                                    D: Blank(),
                                                    DnT: Blank(),
                                                    LnT: Round(row.LnTVal, 1)
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 7: ISO 717-2 curve fitting
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_ISORefImpact,
                                        {Hz100:62, Hz125:62, Hz160:62, Hz200:62, Hz250:62, Hz315:62,
                                         Hz400:61, Hz500:60, Hz630:59, Hz800:58, Hz1000:57, Hz1250:54,
                                         Hz1600:51, Hz2000:48, Hz2500:45, Hz3150:42}
                                    );

                                    UpdateContext({_ref: First(col_ISORefImpact)});

                                    ClearCollect(
                                        col_ShiftResults,
                                        ForAll(
                                            Sequence(51, -30) As shift,
                                            With(
                                                {
                                                    _devSum:
                                                        Max(0, _lnt.Hz100-(_ref.Hz100+shift.Value)) + Max(0, _lnt.Hz125-(_ref.Hz125+shift.Value)) +
                                                        Max(0, _lnt.Hz160-(_ref.Hz160+shift.Value)) + Max(0, _lnt.Hz200-(_ref.Hz200+shift.Value)) +
                                                        Max(0, _lnt.Hz250-(_ref.Hz250+shift.Value)) + Max(0, _lnt.Hz315-(_ref.Hz315+shift.Value)) +
                                                        Max(0, _lnt.Hz400-(_ref.Hz400+shift.Value)) + Max(0, _lnt.Hz500-(_ref.Hz500+shift.Value)) +
                                                        Max(0, _lnt.Hz630-(_ref.Hz630+shift.Value)) + Max(0, _lnt.Hz800-(_ref.Hz800+shift.Value)) +
                                                        Max(0, _lnt.Hz1000-(_ref.Hz1000+shift.Value)) + Max(0, _lnt.Hz1250-(_ref.Hz1250+shift.Value)) +
                                                        Max(0, _lnt.Hz1600-(_ref.Hz1600+shift.Value)) + Max(0, _lnt.Hz2000-(_ref.Hz2000+shift.Value)) +
                                                        Max(0, _lnt.Hz2500-(_ref.Hz2500+shift.Value)) + Max(0, _lnt.Hz3150-(_ref.Hz3150+shift.Value))
                                                },
                                                {Shift: shift.Value, DevSum: _devSum, Passes: _devSum <= 32}
                                            )
                                        )
                                    );

                                    UpdateContext({
                                        _bestShift: Min(Filter(col_ShiftResults, Passes), Shift)
                                    });

                                    UpdateContext({
                                        _LnTw: _ref.Hz500 + _bestShift
                                    });

                                    // ═══════════════════════════════════════
                                    // STEP 8: Pass/Fail
                                    // ═══════════════════════════════════════
                                    UpdateContext({
                                        _result: If(_LnTw <= cVar_CurrentPartition.RequiredValue, "Pass", "Fail")
                                    });

                                    // ═══════════════════════════════════════
                                    // STEP 9: Results summary (AFTER curve fitting)
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_ResultsSummary,
                                        Table(
                                            {Sort: 1,  Label: "L'nT,w",               Value: Text(_LnTw) & " dB",        Category: "Single Figure"},
                                            {Sort: 2,  Label: "Required",              Value: "≤" & Text(cVar_CurrentPartition.RequiredValue) & " dB", Category: "Target"},
                                            {Sort: 3,  Label: "Result",                Value: _result,                     Category: "Target"},
                                            {Sort: 4,  Label: "Best Shift",            Value: Text(_bestShift) & " dB",    Category: "Curve Fitting"},
                                            {Sort: 5,  Label: "Dev Sum at Best",       Value: Text(LookUp(col_ShiftResults, Shift = _bestShift).DevSum), Category: "Curve Fitting"},
                                            {Sort: 6,  Label: "Partition Type",        Value: cVar_CurrentPartition.PartitionType, Category: "Info"},
                                            {Sort: 7,  Label: "Source Room",           Value: cVar_CurrentPartition.SourceRoom,    Category: "Info"},
                                            {Sort: 8,  Label: "Receiver Room",         Value: cVar_CurrentPartition.ReceiverRoom,  Category: "Info"},
                                            {Sort: 9,  Label: "6dB Rule Met",          Value: "N/A",                       Category: "Flags"},
                                            {Sort: 10, Label: "Background Correction",  Value: If(_bgCorrectionApplied, "Applied", "Not needed"), Category: "Flags"},
                                            {Sort: 11, Label: "Limited by Background",  Value: If(_limitedByBackground, "Yes ⚠", "No"), Category: "Flags"},
                                            {Sort: 12, Label: "Small Room Used",        Value: If(cVar_CurrentPartition.SourceRoomVolume < 25 || cVar_CurrentPartition.ReceiverRoomVolume < 25, "Yes ⚠", "No"), Category: "Flags"}
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 10: ISO curve display
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_DisplayISO,
                                        ForAll(
                                            Table(
                                                {Freq: "100",  FreqSort: 1,  RefBase: 62, Measured: _lnt.Hz100},
                                                {Freq: "125",  FreqSort: 2,  RefBase: 62, Measured: _lnt.Hz125},
                                                {Freq: "160",  FreqSort: 3,  RefBase: 62, Measured: _lnt.Hz160},
                                                {Freq: "200",  FreqSort: 4,  RefBase: 62, Measured: _lnt.Hz200},
                                                {Freq: "250",  FreqSort: 5,  RefBase: 62, Measured: _lnt.Hz250},
                                                {Freq: "315",  FreqSort: 6,  RefBase: 62, Measured: _lnt.Hz315},
                                                {Freq: "400",  FreqSort: 7,  RefBase: 61, Measured: _lnt.Hz400},
                                                {Freq: "500",  FreqSort: 8,  RefBase: 60, Measured: _lnt.Hz500},
                                                {Freq: "630",  FreqSort: 9,  RefBase: 59, Measured: _lnt.Hz630},
                                                {Freq: "800",  FreqSort: 10, RefBase: 58, Measured: _lnt.Hz800},
                                                {Freq: "1000", FreqSort: 11, RefBase: 57, Measured: _lnt.Hz1000},
                                                {Freq: "1250", FreqSort: 12, RefBase: 54, Measured: _lnt.Hz1250},
                                                {Freq: "1600", FreqSort: 13, RefBase: 51, Measured: _lnt.Hz1600},
                                                {Freq: "2000", FreqSort: 14, RefBase: 48, Measured: _lnt.Hz2000},
                                                {Freq: "2500", FreqSort: 15, RefBase: 45, Measured: _lnt.Hz2500},
                                                {Freq: "3150", FreqSort: 16, RefBase: 42, Measured: _lnt.Hz3150}
                                            ) As row,
                                            {
                                                Freq: row.Freq,
                                                FreqSort: row.FreqSort,
                                                Reference: row.RefBase,
                                                Shifted: row.RefBase + _bestShift,
                                                Measured: Round(row.Measured, 1),
                                                Deviation: Max(0, row.Measured - (row.RefBase + _bestShift)),
                                                PassFail: If(row.Measured <= (row.RefBase + _bestShift), "✓", "✗")
                                            }
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 11: Save results to Dataverse
                                    // ═══════════════════════════════════════
                                    Patch(
                                        BESA_TestRuns,
                                        LookUp(BESA_TestRuns, BESA_TestRun = cVar_CurrentPartition.PartitionID),
                                        {
                                            SummaryResults: JSON(
                                                {
                                                    LnTw: _LnTw,
                                                    RequiredValue: cVar_CurrentPartition.RequiredValue,
                                                    Result: _result,
                                                    BestShift: _bestShift,
                                                    LnTSpectral: {
                                                        '100': Round(_lnt.Hz100,1), '125': Round(_lnt.Hz125,1),
                                                        '160': Round(_lnt.Hz160,1), '200': Round(_lnt.Hz200,1),
                                                        '250': Round(_lnt.Hz250,1), '315': Round(_lnt.Hz315,1),
                                                        '400': Round(_lnt.Hz400,1), '500': Round(_lnt.Hz500,1),
                                                        '630': Round(_lnt.Hz630,1), '800': Round(_lnt.Hz800,1),
                                                        '1000': Round(_lnt.Hz1000,1), '1250': Round(_lnt.Hz1250,1),
                                                        '1600': Round(_lnt.Hz1600,1), '2000': Round(_lnt.Hz2000,1),
                                                        '2500': Round(_lnt.Hz2500,1), '3150': Round(_lnt.Hz3150,1)
                                                    }
                                                }
                                            ),
                                            TestMetaData: JSON(
                                                {
                                                    SixDbRuleMet: true,
                                                    BackgroundCorrectionApplied: _bgCorrectionApplied,
                                                    ResultLimitedByBackground: _limitedByBackground,
                                                    SmallRoomUsed: cVar_CurrentPartition.SourceRoomVolume < 25
                                                        || cVar_CurrentPartition.ReceiverRoomVolume < 25
                                                }
                                            )
                                        }
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 12: Update partitions collection
                                    // ═══════════════════════════════════════
                                    UpdateIf(
                                        col_AcousticPartitions,
                                        PartitionID = cVar_CurrentPartition.PartitionID,
                                        {
                                            LnTw: _LnTw,
                                            PassFail: _result,
                                            ResultLimitedByBackground: _limitedByBackground
                                        }
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 13: Rebuild impact results table
                                    // ═══════════════════════════════════════
                                    ClearCollect(
                                        col_ImpactResults,
                                        ForAll(
                                            SortByColumns(
                                                Filter(col_AcousticPartitions, TestCategory = "Impact"),
                                                "PartitionNo", SortOrder.Ascending
                                            ) As part,
                                            With(
                                                {
                                                    _parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID),
                                                    _l2Positions: CountRows(Distinct(
                                                        ForAll(part.MeasurementData.L2.positions As pos, {P: Value(pos.positionNo)}), P)),
                                                    _l2Readings: CountRows(Ungroup(
                                                        ForAll(part.MeasurementData.L2.positions As pos,
                                                            ForAll(pos.readings As rd, {R: 1})), Value)),
                                                    _b2Count: CountRows(ForAll(part.MeasurementData.B2 As rd, {R: 1})),
                                                    _t2Positions: CountRows(Distinct(
                                                        ForAll(part.MeasurementData.T2.sourcePositions As pos, {P: Value(pos.positionNo)}), P)),
                                                    _t2Readings: CountRows(Ungroup(
                                                        ForAll(part.MeasurementData.T2.sourcePositions As pos,
                                                            ForAll(pos.readings As rd, {R: 1})), Value))
                                                },
                                                {
                                                    Sort: part.PartitionNo,
                                                    DateOfTest: If(!IsBlank(_parentRun.RunDate), Text(_parentRun.RunDate, "dd/mm/yyyy"), ""),
                                                    TestReportNumber: part.TestReportNumber,
                                                    SourceRoom: part.SourceRoom,
                                                    SourceRoomVolume: part.SourceRoomVolume,
                                                    ReceiverRoom: part.ReceiverRoom,
                                                    ReceiverRoomVolume: part.ReceiverRoomVolume,
                                                    PartitionLabel: part.PartitionLabel,
                                                    PartitionID: part.PartitionID,
                                                    TestRunID: part.TestRunID,
                                                    Measured: If(!IsBlank(part.LnTw),
                                                        Text(part.LnTw) & If(part.ResultLimitedByBackground, "≤", ""), "—"),
                                                    MeasuredValue: If(!IsBlank(part.LnTw), part.LnTw, 0),
                                                    Required: "≤" & Text(part.RequiredValue),
                                                    RequiredValue: part.RequiredValue,
                                                    PassFail: part.PassFail,
                                                    RunLabel: If(!IsBlank(_parentRun), _parentRun.RunLabel, ""),
                                                    Engineer: If(!IsBlank(_parentRun), _parentRun.Engineer, ""),
                                                    LnTw: If(!IsBlank(part.LnTw), part.LnTw, Blank()),
                                                    ResultLimitedByBackground: part.ResultLimitedByBackground,
                                                    SmallRoomUsed: part.SourceRoomVolume < 25 || part.ReceiverRoomVolume < 25,
                                                    NumTapperPositions: _l2Positions,
                                                    NumL2TapperReadings: If(_l2Positions > 0, RoundDown(_l2Readings / _l2Positions, 0), 0),
                                                    NumB2TapperMeasurements: _b2Count,
                                                    NumT2SourcePositions: _t2Positions,
                                                    NumT2ReadingsPerPosition: If(_t2Positions > 0, RoundDown(_t2Readings / _t2Positions, 0), 0)
                                                }
                                            )
                                        )
                                    );

                                    // ═══════════════════════════════════════
                                    // STEP 14: Refresh display + notify
                                    // ═══════════════════════════════════════
                                    Select(btnRefreshMeasurements_1);


                                );
                              Visible: =false
                              Width: =30
                              X: =1036
                              Y: =210
