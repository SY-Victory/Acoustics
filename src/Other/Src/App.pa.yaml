App:
  Properties:
    Formulas: |-
      =fxLastRefreshed = Now();

      fxPrimary =RGBA(7, 110, 108, 1);


      fxSuccess = RGBA(187, 221, 140, 1);
      fxEmptyLabel = RGBA(255, 255, 205, 1);

      fxStatusActive      = Color.Green;
      fxStatusCompleted   = ColorFade(Color.Green, -30%);  
      fxStatusOnHold      = RGBA(255, 165, 0, 1);            
      fxStatusUnconfirmed = RGBA(128, 128, 128, 1);          

      YHeightCalc(ParentHeight:Number,SelfHeight:Number): Number = ParentHeight - SelfHeight - 15;

      RightSpace(x: Number, width: Number): Number = x + width + 5;
    OnStart: "=// ══════════════════════════════════════════════\n// OFFLINE — Restore cached collections first\n// ══════════════════════════════════════════════\nIfError(LoadData(colPartition, \"colPartition_offline\", true),Blank());\nIfError(LoadData(col_EngineerActionList, \"col_EngineerActionList_offline\", true),Blank());\n\n\n// ══════════════════════════════════════════════\n// OFFLINE — Use cached data from LoadData above\n// ══════════════════════════════════════════════\n\nClearCollect(col_StaffIDCache, {id: \"\",name: \"\"});\nIfError(LoadData(col_StaffIDCache, \"varStaffViewBESAID_offline\", true), Blank());\n\nIfError(LoadData(col_AcousticEquipmentMasterList, \"col_AcousticEquipmentMasterList_offline\", true), Blank());\n\nSet(varOfflineMode, true);\n\nIfError(LoadData(col_ShiftListGather, \"col_ShiftListGather_offline\", true), Blank());\nIfError(LoadData(col_BookingElementCheck, \"col_BookingElementCheck_offline\", true), Blank());\nIfError(LoadData(col_ShiftListNonBookingCheck, \"col_ShiftListNonBookingCheck_offline\", true), Blank());\nIfError(LoadData(col_ShiftListActivities, \"col_ShiftListActivities_offline\", true), Blank());\nIfError(LoadData(col_ClientInfoCache, \"col_ClientInfoCache_offline\", true), Blank());\n// Add to the LoadData block at the top of OnStart\nClearCollect(col_OfflineTests, {LocalID:\"\", BookingElementID:\"\", ShiftID:\"\", TestStatus:\"\", SectionStatus:\"\", TestInfo:\"\", Synced:true});\nClearCollect(col_OfflineTestRuns, {LocalRunID:\"\", LocalTestID:\"\", ParentRunGUID:\"\", RunType:\"\", TestNo:0, TestName:\"\", RunDate:Today(), Engineer:\"\", TestStatus:\"\", RunMetaData:\"{}\", PartitionData:\"{}\", TestMetaData:\"{}\", PreTestData:\"{}\", Synced:true});\nIfError(\n    LoadData(col_OfflineTests, \"col_OfflineTests_offline\", true),\n    Blank()\n);\nIfError(LoadData(col_OfflineTestRuns, \"col_OfflineTestRuns_offline\", true),Blank());\nIfError(LoadData(col_AcousticTestRuns, \"col_AcousticTestRuns_offline\", true), Blank());\nIfError(LoadData(col_AcousticPartitions, \"col_AcousticPartitions_offline\", true), Blank());\nIfError(LoadData(col_ShiftTimeline_Flat, \"col_ShiftTimeline_Flat_offline\", true), Blank());\nIfError(LoadData(col_PerformanceStandards, \"col_AcousticStandards\",true),Blank());\nClearCollect(\n    col_ActionRecordCache,\n    {\n        TestGUID: \"\",\n        BookingElementGUID: \"\",\n        ShiftGUID: \"\",\n        ClientGUID: \"\",\n        BookingGUID: \"\",\n        SiteGUID: \"\",\n        TestStatus: \"\",\n        TestNumber: 0,\n        SectionStatus: \"{}\",\n        TestInfo: \"{}\"\n    }\n);\nIfError(LoadData(col_ActionRecordCache, \"col_ActionRecordCache_offline\", true), Blank());\n\nClearCollect(col_EngineerActionList, { \n    'Site LookUp':First(col_Sites), \n    'Action Type': \"\", \n    'Action Name': \"\", \n    'Booking LookUp':First(col_Bookings), \n    'Induction LookUp':First(col_SiteInductions), \n    'Action Status':\"\", 'RAMS LookUp':First(col_RiskAssesments), \n    'Element LookUp':First(col_ElementList), \n    'Booking Element LookUp':First(col_BookingElement), \n    'Shift ID': \"\", ActionID: GUID(),\n    // ── ADD THESE ──\n    cachedTestType: \"\",\n    cachedClientName: \"\",\n    cachedSiteName: \"\",\n    cachedSiteContact: \"\",\n    cachedPhase: \"\",\n    cachedBlock: \"\",\n    cachedElementName: \"\"\n    });\n\nClear(col_EngineerActionList);\n\n// Rebuild col_ShiftTimeline from flat cache\nIf(\n    !IsEmpty(col_ShiftTimeline_Flat),\n    ClearCollect(\n        col_ShiftTimeline,\n        ForAll(\n            col_ShiftTimeline_Flat As row,\n            {\n                RowType: row.RowType,\n                ShiftActionID: If(!IsBlank(row.ShiftActionID), GUID(row.ShiftActionID), GUID()),\n                'Shift ID': row.ShiftID,\n                'Shift Type': row.ShiftType,\n                'Shift Date': row.ShiftDate,\n                SortOrder: row.SortOrder,\n                'Shift Booking ID': row.ShiftBookingID,\n                'Action Type': row.ActionType,\n                'Action Name': row.ActionName,\n                'Action Status': row.ActionStatus,\n                'Induction GUID': row.InductionGUID,\n                'Additional Comments': row.AdditionalComments,\n                _ClientName: row.ClientName,\n                _ClientGUID: row.ClientGUID,\n                _BookingGUID: row.BookingGUID,\n                _SiteGUID: row.SiteGUID,\n                _SiteName: row.SiteName,\n                _SiteContact: row.SiteContact,\n                _ElementName: row.ElementName,\n                _ElementGUID: row.ElementGUID,\n                _BookingElementGUID: row.BookingElementGUID,\n                _Phase: row.BookingElementPhase,\n                _Block: row.BookingElementBlock,\n                _ServiceTestType: row.ServiceTestType,\n                _ServiceDivision: row.ServiceDivision,\n                _ServiceName: row.ServiceName\n            }\n        )\n    )\n);\n\n\n// ══════════════════════════════════════════════\n// STATIC — These don't need connectivity\n// ══════════════════════════════════════════════\nSet(varUserAccess, \"Admin\");\nSet(varActiveScreen, Screen_EngineerHome);\nSet(varLoadData, false);\nSet(varMiscAction, false);\nSet(varInductionForm, false);\nSet(varRAMS, false);\nSet(varEngineerViewSite, false);\nSet(var_ScheduleDate, Today());\nSet(varOpenNotes, false);\nSet(varTestViewMode, false);\nSet(varCurrentActionID, GUID());\n\nClearCollect(\n    col_SkillStatusColours,\n    {SkillID: 1, Status: \"Completed\", Colour: Color.Green },\n    {SkillID: 2, Status: \"In Progress\", Colour: Color.Orange },\n    {SkillID: 3, Status: \"WNS\", Colour: ColorFade(Color.Green, 40%) },\n    {SkillID: 4, Status: \"Wants to Achieve\", Colour: Color.Blue },\n    {SkillID: 5, Status: \"Does not want\", Colour: Color.Red }, \n    {SkillID: 5, Status: \"\", Colour: Color.White }\n);\n\nClearCollect(col_NotesMenu, \n    { MenuIcon: Icon.ShoppingCart, MenuLabel: \"Order\",    Access: \"All\" }, \n    { MenuIcon: Icon.Bookmark,     MenuLabel: \"Booking\",  Access: \"All\" }, \n    { MenuIcon: Icon.OfficeBuilding, MenuLabel: \"Site\",   Access: \"All\" }, \n    { MenuIcon: Icon.Mail,         MenuLabel: \"Envelope\", Access: \"All\" },\n    { MenuIcon: Icon.People,       MenuLabel: \"Engineer\", Access: \"All\" }\n);\n\nClearCollect(\n    col_Menu,\n    { MenuIcon: Icon.Tools, MenuLabel: \"Engineer App\", Screen: Screen_EngineerHome, Access: [\"Admin\"] }\n);\n\nClearCollect(\n    colTestStandards,\n    Table(\n        {Value:\"ATTMA TSL1: V3 2016\", BuildingType:\"Domestic\", Current:false, RelativeHumidity:0.5, TestType:1, StandardKey:\"ATTMA TSL V1\"},\n        {Value:\"ATTMA TSL1: V4 2021\", BuildingType:\"Domestic\", Current:true, RelativeHumidity:0.5, TestType:1, StandardKey:\"ATTMA TSL V1\"},\n        {Value:\"ATTMA TSL3: V1 2021\", BuildingType:\"Domestic\", Current:true, RelativeHumidity:0.5, TestType:3, StandardKey:\"ATTMA TSL V3\"},\n        {Value:\"ATTMA TSL2: V1 2010\", BuildingType:\"Commercial\", Current:false, RelativeHumidity:0.5, TestType:1, StandardKey:\"ATTMA TSL V2\"},\n        {Value:\"ATTMA TSL2: V2 2021\", BuildingType:\"Commercial\", Current:true, RelativeHumidity:0.5, TestType:1, StandardKey:\"ATTMA TSL V2\"},\n        {Value:\"ATTMA TSL4: V1 2018\", BuildingType:\"Commercial\", Current:false, RelativeHumidity:0.5, TestType:4, StandardKey:\"ATTMA TSL V4\"},\n        {Value:\"ATTMA TSL4: V2 2021\", BuildingType:\"Commercial\", Current:true, RelativeHumidity:0.5, TestType:4, StandardKey:\"ATTMA TSL V4\"},\n        {Value:\"CIBSE TM23 2000\", BuildingType:\"Domestic\", Current:false, RelativeHumidity:0, TestType:5, StandardKey:\"CIBSE TM23\"},\n        {Value:\"CIBSE TM23 2000\", BuildingType:\"Commercial\", Current:false, RelativeHumidity:0, TestType:5, StandardKey:\"CIBSE TM23\"},\n        {Value:\"CIBSE TM23 2022\", BuildingType:\"Domestic\", Current:true, RelativeHumidity:0, TestType:5, StandardKey:\"CIBSE TM23\"},\n        {Value:\"CIBSE TM23 2022\", BuildingType:\"Commercial\", Current:true, RelativeHumidity:0, TestType:5, StandardKey:\"CIBSE TM23\"}\n    )\n);\n\n// ══════════════════════════════════════════════\n// ONLINE — Refresh, rebuild, then cache\n// ══════════════════════════════════════════════\nIf(\n    Connection.Connected,\n\n    // ── Refresh Dataverse tables ──\n    // Refresh removed (anti-pattern #8: async race condition)\n    // Background sync keeps SQLite current.\n    // ── Static lookup tables (no Dataverse needed) ──\n    ClearCollect(\n        col_PerformanceStandards,\n        ForAll(\n            Filter(\n                BESA_SettingsGlobals,\n                !IsBlank('Settings Json') && \"standard\" in 'Settings Json'\n            ),\n            {\n                StandardName: 'Settings Name',\n                Profile: ParseJSON('Settings Json')\n            }\n        )\n    );\n\n    // ── Staff identity ──\n    ClearCollect(col_StaffBuf, {email: User().Email});\n    Clear(col_StaffResult);\n    ForAll(col_StaffBuf As buf,\n        With({rec: First(Filter(BESA_EngineerLists, 'Staff Email Address' = buf.email))},\n            If(!IsBlank(rec), Collect(col_StaffResult, rec))\n        )\n    );\n    Set(varStaffViewID, First(col_StaffResult));\n    // Set(varStaffViewID.BESA_EngineerList, Text(varStaffViewID.BESA_EngineerList));\n    // Cache staff ID for offline\n    SaveData([{id: varStaffViewID.BESA_EngineerList}], \"varStaffViewBESAID_offline\");\n\n    // ── Equipment master list ──\n    ClearCollect(\n        col_AcousticEquipmentMasterList,\n        ForAll(\n            Filter(BESA_Equipments, Type = \"Acoustic\") As item,\n            {\n                Value: Text(item.'Full Name'),\n                Manufacturer: Text(item.Manufacturer),\n                Type: Text(item.'Equipment Type'),\n                Set: Text(item.Set)\n            }\n        )\n    );\n    SaveData(col_AcousticEquipmentMasterList, \"col_AcousticEquipmentMasterList_offline\");\n\n    // ── Engineer action list (clear + rebuild) ──\n    ClearCollect(col_EngineerActionList, { \n        'Site LookUp':First(col_Sites), \n        'Action Type': \"\", \n        'Action Name': \"\", \n        'Booking LookUp':First(col_Bookings), \n        'Induction LookUp':First(col_SiteInductions), \n        'Action Status':\"\", \n        'RAMS LookUp':First(col_RiskAssesments), \n        'Element LookUp':First(col_ElementList), \n        'Booking Element LookUp':First(col_BookingElement), \n        'Shift ID': \"\", \n        ActionID: GUID(),\n        cachedTestType: \"\",\n        cachedClientName: \"\",\n        cachedSiteName: \"\",\n        cachedSiteContact: \"\",\n        cachedPhase: \"\",\n        cachedBlock: \"\",\n        cachedElementName: \"\",\n        cachedBookingElementGUID: \"\"\n    });\n    Clear(col_EngineerActionList);\n    Clear(col_ShiftTimeline);\n\n    // =============================================\n    // BOOKING SHIFTS — Site Induction & RAMs\n    // =============================================\n    // Step 1: raw Dataverse filter (OData-safe, no AddColumns)\n    ClearCollect(\n        col_ShiftListGather_Raw,\n        ShowColumns(\n            Filter(\n                BESA_Shifts,\n                'User GUID' = Text(varStaffViewID.BESA_EngineerList),\n                'Shift Date' >= Today(), 'Shift Date' < DateAdd(Today(), 1, TimeUnit.Days),\n                'Shift Type' = \"Booking\"\n            ),\n            'Shift Type', 'Booking LookUp', 'Shift Date', 'User GUID', 'Shift ID', 'Site LookUp', 'Generate RAMs', BESA_Shift\n        )\n    );\n    // Step 2: AddColumns on local collection (anti-pattern #7 fix)\n    ClearCollect(\n        col_ShiftListGather,\n        RenameColumns(\n            AddColumns(\n                col_ShiftListGather_Raw,\n                BookingID, sy_BookingLookUp.'Booking ID'\n            ),\n            BookingID, BookingTempID, sy_shiftid, 'Shift ID', sy_SiteLookUp, 'Site LookUp', sy_BookingLookUp, 'Booking LookUp', sy_generaterams, 'Generate RAMs',sy_besa_shiftid, 'BESA_Shift'\n        )\n    );\n\n    ForAll(\n        col_ShiftListGather As shiftListGathering,\n        With(\n            {\n                bookingRecord:      shiftListGathering.'Booking LookUp',\n                clientRecord:       shiftListGathering.'Booking LookUp'.'Client LookUp',\n                siteRecord:         shiftListGathering.'Site LookUp',\n                wthExistingInductionGUID: Concat(\n                    Filter(BESA_SiteInductions,\n                        'Engineer LookUp'.BESA_EngineerList = varStaffViewID.BESA_EngineerList &&\n                        Text('Site LookUp'.'Site ID') = Text(shiftListGathering.'Site LookUp'.'Site ID') &&\n                        'Induction Status' = \"Completed\" &&\n                        'Expiry Date' >= Today()\n                    ),\n                    Text(BESA_SiteInduction)\n                )\n            },\n            Collect(\n                col_EngineerActionList,\n                {\n                    ActionGUID:       GUID(),\n                    'Client LookUp':  clientRecord,\n                    'Booking LookUp': bookingRecord,\n                    'Site LookUp':    siteRecord,\n                    'Action Type':    \"Risk Assessment\",\n                    'Action Name':    \"Risk Self Assessment\",\n                    'Action Status':  \"Pending\",\n                    'Shift ID':       shiftListGathering.'Shift ID',\n                    'BESA_Shift':     shiftListGathering.BESA_Shift\n                }\n            );\n            Collect(\n                col_EngineerActionList,\n                {\n                    ActionGUID:          GUID(),\n                    'Client LookUp':     clientRecord,\n                    'Booking LookUp':    bookingRecord,\n                    'Site LookUp':       siteRecord,\n                    'Action Status':     If(IsBlank(wthExistingInductionGUID), \"Pending\", \"Not Required\"),\n                    'Induction GUID':    wthExistingInductionGUID,\n                    'Action Type':       \"Site Induction\",\n                    'Action Name':       \"Site Induction Form\",\n                    'Shift ID':          shiftListGathering.'Shift ID'\n                }\n            )\n        )\n    );\n\n    // =============================================\n    // RAMs\n    // =============================================\n    // col_ShiftListGather_Sites removed (dead code — never referenced downstream)\n\n    ForAll(\n        col_ShiftListGather As shiftItem,\n        With(\n            {\n                wthHasRAMs: CountRows(\n                    Filter(\n                        col_BookingElementCheck,\n                        'Shift ID' = shiftItem.'Shift ID' &&\n                        CountRows(\n                            Filter(BESA_Documents, 'Direct Related GUID' = bookingElementService)\n                        ) > 0\n                    )\n                ) > 0\n            },\n            If(\n                wthHasRAMs,\n                Collect(\n                    col_EngineerActionList,\n                    {\n                        ActionGUID:       GUID(),\n                        'Client LookUp':  shiftItem.'Booking LookUp'.'Client LookUp',\n                        'Booking LookUp': shiftItem.'Booking LookUp',\n                        'Site LookUp':    shiftItem.'Site LookUp',\n                        'Action Type':    \"RAMs\",\n                        'Action Name':    \"RAMs Form\",\n                        'Action Status':  If(shiftItem.'Generate RAMs' = true, \"Complete\", \"Pending\"),\n                        'RAMS LookUp':    Blank(),\n                        'Shift ID':       shiftItem.'Shift ID'\n                    }\n                )\n            )\n        )\n    );\n\n    // =============================================\n    // BOOKING ELEMENTS — Services\n    // =============================================\n    // Step 1: raw Dataverse filter (no AddColumns — anti-pattern #7 fix)\n    ClearCollect(\n        col_BookingElementCheck_Raw,\n        Filter(BESA_BookingElements, 'Shift ID' in col_ShiftListGather.'Shift ID')\n    );\n    // Step 2: AddColumns on local collection\n    ClearCollect(\n        col_BookingElementCheck,\n        AddColumns(\n            col_BookingElementCheck_Raw,\n            bookingElementService, Text('Booking Service Lookup'.BESA_BookingService),\n            cachedTestType, Text('Order Service LookUp'.'Service LookUp'.'Test Type')\n        )\n    );\n\n    ForAll(\n        col_BookingElementCheck As itemBookingElement,\n        With(\n            {\n                wthBookingRec: First(Filter(BESA_Bookings,\n                    Text('Booking ID') = Text(itemBookingElement.'Booking LookUp'.'Booking ID')\n                ))\n            },\n            With({\n                wthBookingLookUp: wthBookingRec,\n                wthSiteLookUp:    itemBookingElement.'Site LookUp',\n                wthClientLookUp:  wthBookingRec.'Client LookUp'\n            },\n            Collect(\n                col_EngineerActionList,\n                {\n                    ActionGUID:               GUID(),\n                    'Client LookUp':          wthClientLookUp,\n                    'Booking LookUp':         wthBookingLookUp,\n                    'Site LookUp':            wthSiteLookUp,\n                    'Action Type':            \"Service\",\n                    'Action Name':            \"Service\",\n                    'Action Status':          Switch(\n                                                  itemBookingElement.'Booking Element Status',\n                                                  \"Pending Completion\", \"Completed\",\n                                                  \"Aborted\",            \"Aborted\",\n                                                  \"Pending\"\n                                              ),\n                    'Element LookUp':         itemBookingElement.'Element LookUp',\n                    'Booking Element LookUp': itemBookingElement,\n                    'Shift ID':               itemBookingElement.'Shift ID',\n                    cachedTestType:           itemBookingElement.cachedTestType,\n                    cachedClientName:         Text(wthClientLookUp.'Client Name'),\n                    cachedSiteName:           Text(wthSiteLookUp.'Site Name'),\n                    cachedSiteContact:        Text(wthSiteLookUp.'Site Contact LookUp'.'Contact Name'),\n                    cachedPhase:              Text(itemBookingElement.'Element LookUp'.Phase),\n                    cachedBlock:              Text(itemBookingElement.'Element LookUp'.Block),\n                    cachedElementName:        Text(itemBookingElement.'Element LookUp'.'Element Name'),\n                    cachedBookingElementGUID: Text(itemBookingElement.BESA_BookingElement)\n                }\n            ))\n        )\n    );\n\n    // =============================================\n    // NON-BOOKING SHIFTS — Misc\n    // =============================================\n    ClearCollect(\n        col_ShiftListNonBookingCheck,\n        RenameColumns(\n            ShowColumns(\n                Filter(\n                    BESA_Shifts,\n                    'User GUID' = Text(varStaffViewID.BESA_EngineerList),\n                    'Shift Date' >= Today(), 'Shift Date' < DateAdd(Today(), 1, TimeUnit.Days),\n                    'Shift Type' <> \"Booking\",\n                    'Shift Type' <> \"Activity\"\n                ),\n                'Shift Type', 'Booking ID', 'Shift Date', 'User GUID', 'Shift ID'\n            ),\n            sy_bookingid, BookingTempID\n        )\n    );\n\n    ForAll(\n        col_ShiftListNonBookingCheck As itemNonBookingItem,\n        Collect(\n            col_EngineerActionList,\n            {\n                ActionGUID:      GUID(),\n                'Action Status': \"Pending\",\n                'Action Type':   \"Misc\",\n                'Action Name':   itemNonBookingItem.'Shift Type',\n                'Shift ID':      itemNonBookingItem.'Shift ID'\n            }\n        )\n    );\n\n    // =============================================\n    // ACTIVITIES\n    // =============================================\n    ClearCollect(\n        col_ShiftListActivities,\n        Filter(\n            BESA_Shifts,\n            'User GUID' = Text(varStaffViewID.BESA_EngineerList),\n            'Shift Date' >= Today(), 'Shift Date' < DateAdd(Today(), 1, TimeUnit.Days),\n            'Shift Type' = \"Activity\"\n        )\n    );\n\n    ForAll(\n        col_ShiftListActivities As activityShift,\n        With(\n            {\n                wthActivityRecord: First(Filter(\n                    BESA_Activities,\n                    Text('Shift GUID') = activityShift.'Shift ID'\n                ))\n            },\n            Collect(\n                col_EngineerActionList,\n                {\n                    ActionGUID:            GUID(),\n                    'Action Status':       If(wthActivityRecord.'Activity Status' = \"Scheduled\", \"Pending\", wthActivityRecord.'Activity Status'),\n                    'Action Type':         \"Activity\",\n                    'Action Name':         wthActivityRecord.'Activity Name',\n                    'Additional Comments': activityShift.'Additional Comments',\n                    'Client LookUp':       wthActivityRecord.'Client LookUp',\n                    'Shift ID':            activityShift.'Shift ID',\n                    'Activity LookUp':     wthActivityRecord\n                    \n                }\n            )\n        )\n    );\n\n    // =============================================\n    // MERGE — Shift Timeline\n    // =============================================\n    ClearCollect(\n        col_ShiftsFiltered,\n        Filter(\n            BESA_Shifts,\n            'User GUID' = Text(varStaffViewID.BESA_EngineerList),\n            'Shift Date' >= Today(), 'Shift Date' < DateAdd(Today(), 1, TimeUnit.Days),\n            'Shift Type' <> \"Activity\"\n        )\n    );\n\n    ClearCollect(\n        col_ShiftsWithIndex,\n        ForAll(\n            Sequence(CountRows(col_ShiftsFiltered)),\n            With(\n                { idx: Value(ThisRecord.Value) },\n                Patch(\n                    Last(FirstN(col_ShiftsFiltered, idx)),\n                    {},\n                    { ShiftIndex: idx }\n                )\n            )\n        )\n    );\n\n    Clear(col_ShiftTimeline);\n\n    ForAll(\n        col_ShiftsWithIndex As shift,\n        Collect(\n            col_ShiftTimeline,\n            {\n                RowType:            \"Shift\",\n                'Shift ID':         shift.'Shift ID',\n                'Shift Type':       shift.'Shift Type',\n                'Shift Date':       shift.'Shift Date',\n                SortOrder:          shift.ShiftIndex * 1000,\n                'Shift Booking ID': shift.'Booking ID',\n                'Site LookUp':      shift.'Site LookUp',\n                'Booking LookUp':   shift.'Booking LookUp'\n            }\n        );\n        ForAll(\n            Filter(col_EngineerActionList, 'Shift ID' = shift.'Shift ID') As act,\n            Collect(\n                col_ShiftTimeline,\n                {\n                    RowType:                  \"Action\",\n                    ShiftActionID:            act.ActionGUID,\n                    'Shift ID':               act.'Shift ID',\n                    'Action Type':            act.'Action Type',\n                    'Action Name':            act.'Action Name',\n                    'Action Status':          act.'Action Status',\n                    'Booking LookUp':         act.'Booking LookUp',\n                    'Site LookUp':            act.'Site LookUp',\n                    'Induction GUID':         act.'Induction GUID',\n                    'RAMS LookUp':            act.'RAMS LookUp',\n                    'Element LookUp':         act.'Element LookUp',\n                    'Booking Element LookUp': act.'Booking Element LookUp',\n                    'Client LookUp':          act.'Client LookUp',\n                    SortOrder:                shift.ShiftIndex * 1000 +\n                        Switch(\n                            act.'Action Type',\n                            \"Site Induction\",  10,\n                            \"Risk Assessment\", 20,\n                            \"RAMs\",            30,\n                            \"Service\",         40,\n                            \"Misc\",            50,\n                            60\n                        ),\n                    // ── THESE ARE MISSING HERE ──\n                    cachedTestType:           act.cachedTestType,\n                    cachedClientName:         act.cachedClientName,\n                    cachedSiteName:           act.cachedSiteName,\n                    cachedSiteContact:        act.cachedSiteContact,\n                    cachedPhase:              act.cachedPhase,\n                    cachedBlock:              act.cachedBlock,\n                    cachedElementName:        act.cachedElementName,\n                    cachedBookingElementGUID: act.cachedBookingElementGUID\n                }\n            )\n        )\n    );\n\n    // Activity rows (no shift header)\n    ForAll(\n        Filter(col_EngineerActionList, 'Action Type' = \"Activity\") As act,\n        Collect(\n            col_ShiftTimeline,\n            {\n                RowType:               \"Action\",\n                ShiftActionID:         act.ActionGUID,\n                'Shift ID':            act.'Shift ID',\n                'Action Type':         act.'Action Type',\n                'Action Name':         act.'Action Name',\n                'Action Status':       act.'Action Status',\n                'Additional Comments': act.'Additional Comments',\n                'Client LookUp':       act.'Client LookUp',\n                'Activity LookUp':     act.'Activity LookUp',\n                SortOrder:             99000\n            }\n        )\n    );\n\n    // ══════════════════════════════════════════════\n    // CACHE — Persist everything for offline use\n    // ══════════════════════════════════════════════\n    // SaveData(col_EngineerActionList, \"col_EngineerActionList_offline\");\n    // SaveData(col_ShiftTimeline, \"col_ShiftTimeline_offline\");\n\n    // ══════════════════════════════════════════════\n    // FLATTEN — Create offline-safe version of timeline\n    // ══════════════════════════════════════════════\n    ClearCollect(\n        col_ShiftTimeline_Flat,\n        ForAll(\n            col_ShiftTimeline As row,\n            {\n                RowType: row.RowType,\n                ShiftActionID: Text(row.ShiftActionID),\n                ShiftID: row.'Shift ID',\n                ShiftType: row.'Shift Type',\n                ShiftDate: row.'Shift Date',\n                SortOrder: row.SortOrder,\n                ShiftBookingID: row.'Shift Booking ID',\n                ActionType: row.'Action Type',\n                ActionName: row.'Action Name',\n                ActionStatus: row.'Action Status',\n                InductionGUID: row.'Induction GUID',\n                AdditionalComments: row.'Additional Comments',\n                SiteContact: Text(row.'Site LookUp'.'Site Contact LookUp'.'Contact Name'),\n                ClientGUID: Text(row.'Client LookUp'.BESA_Client),\n                ClientName: Text(row.'Client LookUp'.'Client Name'),\n                BookingGUID: Text(row.'Booking LookUp'.'Booking ID'),\n                SiteGUID: Text(row.'Site LookUp'.'Site ID'),\n                SiteName: Text(row.'Site LookUp'.'Site Name'),\n                ElementName: Text(row.'Element LookUp'.'Element Name'),\n                ElementGUID: Text(row.'Element LookUp'.BESA_Element),\n                BookingElementGUID: Text(row.'Booking Element LookUp'.BESA_BookingElement),\n                BookingElementPhase: Text(row.'Booking Element LookUp'.'Element LookUp'.Phase),\n                BookingElementBlock: Text(row.'Booking Element LookUp'.'Element LookUp'.Block),\n                ServiceTestType: Text(row.cachedTestType),\n                ServiceDivision: Text(row.'Booking Element LookUp'.'Order Service LookUp'.Division),\n                ServiceName: Text(row.'Booking Element LookUp'.'Order Service LookUp'.Service)\n            }\n        )\n    );\n\n    // Rebuild col_ShiftTimeline from flat so online uses _* fields\n    ClearCollect(\n        col_ShiftTimeline,\n        ForAll(\n            col_ShiftTimeline_Flat As row,\n            {\n                RowType: row.RowType,\n                ShiftActionID: If(!IsBlank(row.ShiftActionID), GUID(row.ShiftActionID), GUID()),\n                'Shift ID': row.ShiftID,\n                'Shift Type': row.ShiftType,\n                'Shift Date': row.ShiftDate,\n                SortOrder: row.SortOrder,\n                'Shift Booking ID': row.ShiftBookingID,\n                'Action Type': row.ActionType,\n                'Action Name': row.ActionName,\n                'Action Status': row.ActionStatus,\n                'Induction GUID': row.InductionGUID,\n                'Additional Comments': row.AdditionalComments,\n                _ClientName: row.ClientName,\n                _ClientGUID: row.ClientGUID,\n                _BookingGUID: row.BookingGUID,\n                _SiteGUID: row.SiteGUID,\n                _SiteName: row.SiteName,\n                _SiteContact: row.SiteContact,\n                _ElementName: row.ElementName,\n                _ElementGUID: row.ElementGUID,\n                _BookingElementGUID: row.BookingElementGUID,\n                _Phase: row.BookingElementPhase,\n                _Block: row.BookingElementBlock,\n                _ServiceTestType: row.ServiceTestType,\n                _ServiceDivision: row.ServiceDivision,\n                _ServiceName: row.ServiceName\n            }\n        )\n    );\n\n    // ══════════════════════════════════════════════\n    // CACHE — Persist everything for offline use\n    // ══════════════════════════════════════════════\n    IfError(SaveData(col_ShiftTimeline_Flat, \"col_ShiftTimeline_Flat_offline\"), Blank());\n    SaveData(col_EngineerActionList, \"col_EngineerActionList_offline\");\n\n    ////\n    SaveData(col_ShiftListGather, \"col_ShiftListGather_offline\");\n    SaveData(col_BookingElementCheck, \"col_BookingElementCheck_offline\");\n    SaveData(col_ShiftListNonBookingCheck, \"col_ShiftListNonBookingCheck_offline\");\n    SaveData(col_ShiftListActivities, \"col_ShiftListActivities_offline\");\n\n    Set(varOfflineMode, false);,\n\n    // ══════════════════════════════════════════════\n    // OFFLINE — Use cached data from LoadData above\n    // ══════════════════════════════════════════════\n\n    // Restore staff ID\n    ClearCollect(col_StaffIDCache, {id: \"\", name: \"\"});\n    IfError(LoadData(col_StaffIDCache, \"varStaffViewBESAID_offline\", true),Blank());\n    // Set(varStaffViewID.BESA_EngineerList, First(Filter(col_StaffIDCache,name = \"\")).id);\n\n    // Restore equipment\n    IfError(LoadData(col_AcousticEquipmentMasterList, \"col_AcousticEquipmentMasterList_offline\", true),Blank());\n\n    Set(varOfflineMode, true);\n);"
    StartScreen: =Screen_EngineerHome
