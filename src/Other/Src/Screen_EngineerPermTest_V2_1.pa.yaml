                                    - ButtonCanvas12_6:
                                        Control: Button@0.0.45
                                        Properties:
                                          Height: =30
                                          Icon: ="Save"
                                          OnSelect: |-
                                            =// ===== SAVE POST-TEST DATA FOR SELECTED TESTRUN =====
                                            Set(varSelectedTestRunID,GUID("710c102e-d11b-f111-8341-7ced8d94ab2b"));
                                            With(
                                                {
                                                    // 1️⃣ Precompute fan pressures for Post-Test
                                                    wfx_data: Filter(
                                                        AddColumns(
                                                            col_FanOffPressuresPost, 
                                                            CorrectedInput1,
                                                            Value(RawInput) * CalibScaler + CalibConst
                                                        ),
                                                        !IsBlank(RawInput)
                                                    ),
                                                    wfx_Positive: Filter(
                                                        AddColumns(
                                                            col_FanOffPressuresPost, 
                                                            CorrectedInput1,
                                                            Value(RawInput) * CalibScaler + CalibConst
                                                        ),
                                                        !IsBlank(RawInput) && (Value(RawInput) * CalibScaler + CalibConst) > 0
                                                    ),
                                                    wfx_Negative: Filter(
                                                        AddColumns(
                                                            col_FanOffPressuresPost, 
                                                            CorrectedInput1,
                                                            Value(RawInput) * CalibScaler + CalibConst
                                                        ),
                                                        !IsBlank(RawInput) && (Value(RawInput) * CalibScaler + CalibConst) < 0
                                                    )
                                                },

                                                // 2️⃣ Patch only the selected TestRun
                                                Set(
                                                    varTestRunRecord,
                                                    Patch(
                                                        BESA_TestRuns,
                                                        LookUp(BESA_TestRuns, BESA_TestRun = varSelectedTestRunID),
                                                        {
                                                            SummaryResults: JSON(
                                                                {
                                                                    ExternalTemperature: Value(Coalesce(TaskNameInput_80.Text, "0")),
                                                                    CorrectedExternalTemperature: Value(Coalesce(inputEnvelopeFloorArea_112.Text, "0")),
                                                                    BarometricPressure: Value(Coalesce(TaskNameInput_81.Text, "0")),
                                                                    CorrectedBarometricPressure: Value(Coalesce(inputEnvelopeFloorArea_113.Text, "0")),
                                                                    Windspeed: 0,
                                                                    CorrectedWindspeed: 0,
                                                                    AvgPositiveDp: Value(IfError(Average(wfx_Positive, CorrectedInput1), 0)),
                                                                    AvgNegativeDp: Value(IfError(Average(wfx_Negative, CorrectedInput1), 0)),
                                                                    AvgTotalDp: Value(IfError(Average(wfx_data, CorrectedInput1), 0)),

                                                                    InternalTemperatures: Table(
                                                                        ForAll(
                                                                            col_PermPostAtmosphericConditions As tempRec,
                                                                            {
                                                                                RowNumber: Value(tempRec.RowNumber),
                                                                                Location: Text(tempRec.Location),
                                                                                Temperature: Value(tempRec.Temperature),
                                                                                CorrectedTemperature: Value(tempRec.'Corrected Temperature'),
                                                                                Complete: tempRec.Complete
                                                                            }
                                                                        )
                                                                    ),

                                                                    DifferentialPressures: Table(
                                                                        ForAll(
                                                                            Sort(
                                                                                Filter(
                                                                                    col_EquipmentLocationsItems_Display,
                                                                                    !IsBlank(SetLocationRef),
                                                                                    Selected,
                                                                                    EquipmentType = "Manometer"
                                                                                ),
                                                                                ManometerType
                                                                            ) As Manometer,
                                                                            With(
                                                                                {
                                                                                    filteredReadings: SortByColumns(
                                                                                        Filter(
                                                                                            col_PressureReadings_Display,
                                                                                            SerialNumber = Manometer.SerialNumber
                                                                                        ),
                                                                                        "SortOrder", SortOrder.Ascending
                                                                                    )
                                                                                },
                                                                                {
                                                                                    SerialNumber: Text(Manometer.SerialNumber),
                                                                                    ManometerType: Text(Manometer.ManometerType),
                                                                                    CL: Value(varTestRunResults.CL),
                                                                                    Q50: Value(varTestRunResults.Q50),
                                                                                    ELA: Value(varTestRunResults.ELA),
                                                                                    AP50: Value(varTestRunResults.AP50),
                                                                                    R2: Value(varTestRunResults.R2),
                                                                                    Cenv: Value(varTestRunResults.Cenv),
                                                                                    Exponent: Value(varTestRunResults.Exp),
                                                                                    Readings: Table(
                                                                                        ForAll(
                                                                                            filteredReadings As Reading,
                                                                                            {
                                                                                                SortOrder: Value(Reading.SortOrder),
                                                                                                PointTarget: Value(Reading.PointTarget),
                                                                                                PressurePointValue: Value(Reading.PressurePointValue),
                                                                                                PressurePointCorrectedValue: Value(Reading.PressurePointCorrectedValue),
                                                                                                PressurePointFanFlow: Value(Reading.PressurePointFanFlow),
                                                                                                ReadingActiveCalculation: Value(Reading.ReadingActiveCalculation), 
                                                                                                TotalFlow: Value(LookUp(col_PressureReadings_Header, SetNumber = Reading.SetNumber && Value = Reading.Value, TotalFlow))
                                                                                            }
                                                                                        )
                                                                                    )
                                                                                }
                                                                            )
                                                                        )
                                                                    ),

                                                                    FanOffPressures: Table(
                                                                        ForAll(
                                                                            col_FanOffPressuresPost As fanRec,
                                                                            {
                                                                                SerialNumber: Text(fanRec.SerialNumber),
                                                                                ReadingNo: Value(fanRec.ReadingNo),
                                                                                RawInput: Value(fanRec.RawInput),
                                                                                CorrectedInput: Value(fanRec.CorrectedInput),
                                                                                CalibScaler: Value(fanRec.CalibScaler),
                                                                                CalibConst: Value(fanRec.CalibConst)
                                                                            }
                                                                        )
                                                                    )
                                                                }
                                                            )
                                                        }
                                                    )
                                                )
                                            );

                                            // ✅ Notify user
                                            Notify("Post-Test Data saved successfully", NotificationType.Success);

                                            // 3️⃣ Get the freshly patched TestRun from Dataverse
                                            Set(
                                                varUpdatedTestRun,
                                                LookUp(
                                                    BESA_TestRuns,
                                                    BESA_TestRun = varSelectedTestRunID
                                                )
                                            );

                                            // 4️⃣ Update local col_TestRun for only the selected TestRun
                                            UpdateIf(
                                                col_TestRun,
                                                TestID = varSelectedTestRunID,
                                                {
                                                    PreTestData: ParseJSON(varUpdatedTestRun.PreTestData), 
