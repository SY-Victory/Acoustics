                  - Label15_1:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        BorderColor: =RGBA(0, 18, 107, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =10
                        Text: |+
                          =
                          "Deviation Notes: 
                          " & 
                          With(
                                {d: ctxDeviations},
                                If(
                                    !(d.ErrorR2 || d.ErrorN || d.ErrorGap || d.ErrorRange
                                      || d.Error50Pa || d.Error100Pa || d.ErrorMinPressure
                                      || d.ErrorNumberDataPoints || d.ErrorStaticInitial
                                      || d.ErrorStaticFinal || d.ErrorPressureVariance
                                      || d.ErrorFanOffReading || d.ErrorHighBuild
                                      //|| d.ErrorTempSeal 
                                      || d.ErrorZone),
                                    "None",
                                    Concatenate(
                                        If(d.ErrorN,
                                            "The flow exponent is outside the theoretical limits (0.5–1.0). ", ""),
                                        If(d.ErrorStaticInitial,
                                            "Initial static pressure exceeds ±5 Pa guideline. ", ""),
                                        If(d.ErrorNumberDataPoints,
                                            "Insufficient data points recorded (minimum 7 required). ", ""),
                                        If(d.ErrorStaticFinal,
                                            "Final static pressure exceeds ±5 Pa guideline. ", ""),
                                        If(d.ErrorR2,
                                            "Correlation (r²) below 0.98 — data does not comply with test standard. ", ""),
                                        If(d.ErrorGap,
                                            "Pressure increment exceeds 10 Pa between consecutive points. ", ""),
                                        If(d.Error50Pa,
                                            "Minimum 50 Pa differential was not achieved. ", ""),
                                        If(d.Error100Pa,
                                            "Maximum pressure of " & d.MaxPThreshold
                                            & " Pa exceeded — reduce fan pressure immediately. ", ""),
                                        If(d.ErrorMinPressure,
                                            "Minimum pressure below threshold ("
                                            & Round(d.MinPThreshold, 1) & " Pa). ", ""),
                                        If(d.ErrorPressureVariance,
                                            "Building pressure variance exceeds 10% between gauges. ", ""),
                                        If(d.ErrorFanOffReading,
                                            "Not all fan-off pressure readings have been taken. ", ""),
                                        If(d.ErrorRange,
                                            "Pressure range is not greater than 30 Pa. ", ""),
                                        If(d.ErrorHighBuild,
                                            "Insufficient pressure equalisation points recorded. ", ""),
                                        If(d.ErrorZone,
                                            "Zone/sample test — 20% of envelope area required, target improved by 10%. ", "")
                                        //,If(d.ErrorTempSeal, "Temporary sealing not fully in accordance with test standard. ", "")
                                    )
                                )
                            )

                        VerticalAlign: =VerticalAlign.Bottom
                        Width: =Parent.Width - 100
      - rectBackgroundPopUps_16:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(245, 245, 245, 0.51)
