                                                OnSelect: |+
                                                  =
                                                  With(
                                                      {
                                                          // 1️⃣ Precompute fan pressures
                                                          wfx_data: Filter(
                                                              AddColumns(
                                                                  col_FanOffPressures,
                                                                  CorrectedInput1,
                                                                  Value(RawInput) * CalibScaler + CalibConst
                                                              ),
                                                              !IsBlank(RawInput)
                                                          ),
                                                          wfx_Positive: Filter(
                                                              AddColumns(
                                                                  col_FanOffPressures,
                                                                  CorrectedInput1,
                                                                  Value(RawInput) * CalibScaler + CalibConst
                                                              ),
                                                              !IsBlank(RawInput) && (Value(RawInput) * CalibScaler + CalibConst) > 0
                                                          ),
                                                          wfx_Negative: Filter(
                                                              AddColumns(
                                                                  col_FanOffPressures,
                                                                  CorrectedInput1,
                                                                  Value(RawInput) * CalibScaler + CalibConst
                                                              ),
                                                              !IsBlank(RawInput) && (Value(RawInput) * CalibScaler + CalibConst) < 0
                                                          )
                                                      },

                                                      // 2️⃣ Patch only the selected TestRun
                                                      Set(
                                                          varTestRunRecord,
                                                          Patch(
                                                              BESA_TestRuns,
                                                              LookUp(BESA_TestRuns, BESA_TestRun = varSelectedTestRunID),
                                                              {
                                                                  PreTestData: JSON(
                                                      {
                                                          ExternalTemperature: Value(Coalesce(TaskNameInput_75.Text, "0")),
                                                          CorrectedExternalTemperature: Value(Coalesce(inputEnvelopeFloorArea_106.Text, "0")),
                                                          BarometricPressure: Value(Coalesce(TaskNameInput_76.Text, "0")),
                                                          CorrectedBarometricPressure: Value(Coalesce(inputEnvelopeFloorArea_107.Text, "0")),
                                                          Windspeed: 0,
                                                          CorrectedWindspeed: 0,
                                                          AvgPositiveDp: Value(IfError(Average(wfx_Positive, CorrectedInput1), 0)),
                                                          AvgNegativeDp: Value(IfError(Average(wfx_Negative, CorrectedInput1), 0)),
                                                          AvgTotalDp: Value(IfError(Average(wfx_data, CorrectedInput1), 0)),

                                                          InternalTemperatures: Table(
                                                              ForAll(
                                                                  col_PermPreAtmosphericConditions As tempRec,
                                                                  {
                                                                      RowNumber: Value(tempRec.RowNumber),
                                                                      Location: Text(tempRec.Location),
                                                                      Temperature: Value(tempRec.Temperature),
                                                                      CorrectedTemperature: Value(tempRec.'Corrected Temperature'),
                                                                      Complete: tempRec.Complete
                                                                  }
                                                              )
                                                          ),

                                                          FanOffPressures: Table(
                                                              ForAll(
                                                                  col_FanOffPressures As fanRec,
                                                                  {
                                                                      SerialNumber: Text(fanRec.SerialNumber),
                                                                      ReadingNo: Value(fanRec.ReadingNo),
                                                                      RawInput: Value(fanRec.RawInput),
                                                                      CorrectedInput: Value(fanRec.CorrectedInput),
                                                                      CalibScaler: Value(fanRec.CalibScaler),
                                                                      CalibConst: Value(fanRec.CalibConst)
                                                                  }
                                                              )
                                                          )
                                                      }
                                                  )
                                                                  //PostTestData: PostTestData,
                                                                  //TempSealingData: Table(TempSealingData),
                                                                  ///EquipmentLocations: Table(EquipmentLocations),
                                                                  //EquipmentItems: Table(EquipmentItems),
                                                                  //SummaryResults: SummaryResults
                                                              }
                                                          )
                                                      )
                                                  );

                                                  Notify("Pre-Test Data saved successfully", NotificationType.Success);

                                                  // 1️⃣ Get the freshly patched TestRun from Dataverse
                                                  Set(
                                                      varUpdatedTestRun,
                                                      LookUp(
                                                          BESA_TestRuns,
                                                          BESA_TestRun = varSelectedTestRunID
                                                      )
                                                  );

                                                  // 2️⃣ Update local col_TestRun for only the selected TestRun
                                                  UpdateIf(
                                                      col_TestRun,
                                                      TestID = varSelectedTestRunID,
                                                      {
                                                          PreTestData: ParseJSON(varUpdatedTestRun.PreTestData),
                                                          PostTestData: ParseJSON(varUpdatedTestRun.PostTestData),
                                                          TempSealingData: ParseJSON(varUpdatedTestRun.TempSealingData),
                                                         // EquipmentLocations: ParseJSON(varUpdatedTestRun.EquipmentLocations),
                                                        // EquipmentItems: ParseJSON(varUpdatedTestRun.EquipmentItems),
                                                          SummaryResults: ParseJSON(varUpdatedTestRun.SummaryResults),
                                                          TestStatus: varUpdatedTestRun.'Test Status'
                                                      }
                                                  );

                                                  Set(varSelectedTherometer, comboPreSelectedThermo_2.Selected);
                                                  Set(varSelectedBarometer, comboPreSelectedBaro_2.Selected);

                                                  Set(varSelectedThermometerLU, LookUp(col_Thermometers, SerialNo = comboPreSelectedThermo_2.Selected.SerialNumber));
                                                  Set(varSelectedBarometerLU, LookUp(col_Barometers, GaugeRef = comboPreSelectedBaro_2.Selected.SerialNumber));



