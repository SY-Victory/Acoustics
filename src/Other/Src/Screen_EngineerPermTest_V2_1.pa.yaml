                                          Default: =Text(ThisItem.PressurePointValue)
                                          DisabledBorderColor: =RGBA(128, 128, 128, 1)
                                          DisplayMode: =If(ThisItem.ReadingActiveCalculation, DisplayMode.Edit, DisplayMode.Disabled)
                                          Fill: =If(IsBlank(Self.Text),RGBA(255, 255, 205, 1),RGBA(205, 245, 205, 1))
