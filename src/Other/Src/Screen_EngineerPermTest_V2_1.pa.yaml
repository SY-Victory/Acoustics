                                    - ButtonCanvas12_7:
                                        Control: Button@0.0.45
                                        Properties:
                                          Height: =33
                                          Icon: ="Save"
                                          OnSelect: "=\nSet(\n    varTestRunRecord,\n    Patch(\n        BESA_TestRuns,\n        LookUp(BESA_TestRuns, BESA_TestRun = varSelectedTestRunID),\n        {\n            'Test Status': \"Complete\",\n            SummaryResults: JSON(\n                {\n                    \n                    Results: {\n                        CL:   varTestRunResults.CL,\n                        Q50:  varTestRunResults.Q50,\n                        ELA:  varTestRunResults.ELA,\n                        AP50: varTestRunResults.AP50,\n                        R2:   varTestRunResults.R2,\n                        Cenv: varTestRunResults.Cenv,\n                        Exp:  varTestRunResults.Exp\n                    },\n\n                   \n                    ErrorR2:                ctxDeviations.ErrorR2,\n                    ErrorN:                 ctxDeviations.ErrorN,\n                    ErrorGap:               ctxDeviations.ErrorGap,\n                    ErrorRange:             ctxDeviations.ErrorRange,\n                    Error50Pa:              ctxDeviations.Error50Pa,\n                    Error100Pa:             ctxDeviations.Error100Pa,\n                    ErrorMinPressure:       ctxDeviations.ErrorMinPressure,\n                    ErrorNumberDataPoints:  ctxDeviations.ErrorNumberDataPoints,\n                    ErrorStaticInitial:     ctxDeviations.ErrorStaticInitial,\n                    ErrorStaticFinal:       ctxDeviations.ErrorStaticFinal,\n                    ErrorPressureVariance:  ctxDeviations.ErrorPressureVariance,\n                    ErrorFanOffReading:     ctxDeviations.ErrorFanOffReading,\n                    ErrorHighBuild:         ctxDeviations.ErrorHighBuild,\n                    //ErrorTempSeal:          ctxDeviations.ErrorTempSeal,\n                    ErrorZone:              ctxDeviations.ErrorZone,\n                    PointCount:             ctxDeviations.PointCount,\n                    MaxP:                   ctxDeviations.MaxP,\n                    MinP:                   ctxDeviations.MinP,\n                    MaxGap:                 ctxDeviations.MaxGap,\n                    MinPThreshold:          ctxDeviations.MinPThreshold,\n                    MaxPThreshold:          ctxDeviations.MaxPThreshold,\n\n                    DifferentialPressures: Table(\n                            ForAll(\n                                Sort(\n                                    Filter(\n                                        col_EquipmentLocationsItems_Display,\n                                        !IsBlank(SetLocationRef),\n                                        Selected,\n                                        EquipmentType = \"Manometer\"\n                                    ),\n                                    ManometerType\n                                ) As Manometer,\n                                With(\n                                    {\n                                        filteredReadings: SortByColumns(\n                                            Filter(\n                                                col_PressureReadings,\n                                                SerialNumber = Manometer.SerialNumber\n                                            ),\n                                            \"SortOrder\", SortOrder.Ascending\n                                        )\n                                    },\n                                    {\n                                        SerialNumber: Text(Manometer.SerialNumber),\n                                        ManometerType: Text(Manometer.ManometerType),\n                                        CL: Value(varTestRunResults.CL),\n                                        Q50: Value(varTestRunResults.Q50),\n                                        ELA: Value(varTestRunResults.ELA),\n                                        AP50: Value(varTestRunResults.AP50),\n                                        R2: Value(varTestRunResults.R2),\n                                        Cenv: Value(varTestRunResults.Cenv),\n                                        Exponent: Value(varTestRunResults.Exp),\n                                        Readings: Table(\n                                            ForAll(\n                                                filteredReadings As Reading,\n                                                {\n                                                    SortOrder: Value(Reading.SortOrder),\n                                                    PointTarget: Value(Reading.PointTarget),\n                                                    PressurePointValue: Value(Reading.PressurePointValue),\n                                                    PressurePointCorrectedValue: Value(Reading.PressurePointCorrectedValue),\n                                                    PressurePointFanFlow: Value(Reading.PressurePointFanFlow),\n                                                    ReadingActiveCalculation: Value(Reading.ReadingActiveCalculation), \n                                                    TotalFlow: Value(LookUp(col_PressureReadings_Header, SetNumber = Reading.SetNumber && Value = Reading.Value, TotalFlow))\n                                                }\n                                            )\n                                        )\n                                    }\n                                )\n                            )\n                        ),\n\n                    \n                    DeviationNotes: With(\n                        {d: ctxDeviations},\n                        If(\n                            !(d.ErrorR2 || d.ErrorN || d.ErrorGap || d.ErrorRange\n                              || d.Error50Pa || d.Error100Pa || d.ErrorMinPressure\n                              || d.ErrorNumberDataPoints || d.ErrorStaticInitial\n                              || d.ErrorStaticFinal || d.ErrorPressureVariance\n                              || d.ErrorFanOffReading || d.ErrorHighBuild\n                              //|| d.ErrorTempSeal \n                              || d.ErrorZone),\n                            \"None\",\n                            Concatenate(\n                                If(d.ErrorN,                 \"The flow exponent is outside the theoretical limits (0.5–1.0). \", \"\"),\n                                If(d.ErrorStaticInitial,     \"Initial static pressure exceeds ±5 Pa guideline. \", \"\"),\n                                If(d.ErrorNumberDataPoints,  \"Insufficient data points recorded (minimum 7 required). \", \"\"),\n                                If(d.ErrorStaticFinal,       \"Final static pressure exceeds ±5 Pa guideline. \", \"\"),\n                                If(d.ErrorR2,                \"Correlation (r²) below 0.98 — data does not comply with test standard. \", \"\"),\n                                If(d.ErrorGap,               \"Pressure increment exceeds 10 Pa between consecutive points. \", \"\"),\n                                If(d.Error50Pa,              \"Minimum 50 Pa differential was not achieved. \", \"\"),\n                                If(d.Error100Pa,             \"Maximum pressure of \" & d.MaxPThreshold & \" Pa exceeded — reduce fan pressure immediately. \", \"\"),\n                                If(d.ErrorMinPressure,       \"Minimum pressure below threshold (\" & Round(d.MinPThreshold, 1) & \" Pa). \", \"\"),\n                                If(d.ErrorPressureVariance,  \"Building pressure variance exceeds 10% between gauges. \", \"\"),\n                                If(d.ErrorFanOffReading,     \"Not all fan-off pressure readings have been taken. \", \"\"),\n                                If(d.ErrorRange,             \"Pressure range is not greater than 30 Pa. \", \"\"),\n                                If(d.ErrorHighBuild,         \"Insufficient pressure equalisation points recorded. \", \"\"),\n                                If(d.ErrorZone,              \"Zone/sample test — 20% of envelope area required, target improved by 10%. \", \"\")\n                                //,If(d.ErrorTempSeal,          \"Temporary sealing not fully in accordance with test standard. \", \"\")\n                            )\n                        )\n                    ),\n                    DeviationEngineerNotes: inputEngineerDeviationNotes_1.Text,\n\n                    \n                    PressureReadings: Table(\n                        ForAll(\n                            col_PressureReadings As pr,\n                            {\n                                Value:                      pr.Value,\n                                SetNumber:                  pr.SetNumber,\n                                ManometerType:              pr.ManometerType,\n                                SerialNumber:               pr.SerialNumber,\n                                ReadingActiveCalculation:   pr.ReadingActiveCalculation,\n                                PressurePointValue:         pr.PressurePointValue,\n                                PressurePointCorrectedValue:pr.PressurePointCorrectedValue,\n                                PressurePointFanFlow:       pr.PressurePointFanFlow,\n                                CalibScaler:                pr.CalibDetails.Scaler,\n                                CalibConst:                 pr.CalibDetails.Const\n                            }\n                        )\n                    )\n                }\n            )\n        }\n    )\n);\n\n\nNotify(\"Test Run marked as complete - Generating Graph\", NotificationType.Success);\n\n\nSet(\n    varUpdatedTestRun,\n    LookUp(BESA_TestRuns, BESA_TestRun = varSelectedTestRunID)\n);\n\nUpdateIf(\n    col_TestRun,\n    TestID = varSelectedTestRunID,\n    {\n        TestStatus:     varUpdatedTestRun.'Test Status',\n        SummaryResults: ParseJSON(varUpdatedTestRun.SummaryResults)\n    }\n);\n\n\nUpdateIf(\n    col_PermTestMenu,\n    MenuCategory = \"Test Data\" && MenuLabel = \"Test Data - Run \" & Text(varSelectedTestNo),\n    {\n        Status:       \"Complete\",\n        DisplayLabel: \"Test Data - Run \" & Text(varSelectedTestNo) & \" ✓\"\n    }\n);"
