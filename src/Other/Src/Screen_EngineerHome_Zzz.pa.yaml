                  Layout: ='ButtonCanvas.Layout'.IconBefore
                  OnSelect: "=ClearCollect(col_EngineerActionList, \n{ \n    'Site LookUp':First(col_Sites), \n    'Action Type': \"\", \n    'Action Name': \"\", \n    'Booking LookUp':First(col_Bookings), \n    'Induction LookUp':First(col_SiteInductions), \n    'Action Status':\"\", \n    'RAMS LookUp':First(col_RiskAssesments), \n    'Element LookUp':First(col_ElementList), \n    'Booking Element LookUp':First(col_BookingElement),\n    'Shift ID': \"\"\n});\n\nClear(col_EngineerActionList);\n\n//Site Information\n\nClearCollect(col_ShiftListCheck, AddColumns(RenameColumns(ShowColumns(Filter(col_ShiftList, 'Technician GUID' = varStaffViewID.StaffID, 'Shift Date' = dateEngineerSelectedView.SelectedDate, 'Shift Type' = \"Booking\"), 'Shift Type', BookingID, 'Shift Date', 'Technician GUID'), BookingID, BookingTempID), 'Site LookUp', LookUp(col_BookingsSchedule, BookingID = BookingTempID, 'Site LookUp'))); \n\nForAll(col_ShiftListCheck As shiftListCheck, \n    //IsBlank(LookUp(col_SiteInductions, 'Staff LookUp'.StaffID = shiftListCheck.'Technician GUID' && 'Site LookUp'.SiteID = shiftListCheck.'Site LookUp'.SiteID && 'Induction Status' = \"Completed\")), \n    Collect(col_EngineerActionList, \n    { \n        'Booking LookUp':LookUp(col_Bookings, BookingReference = shiftListCheck.BookingTempID), \n        'Site LookUp':LookUp(col_Sites, SiteID = shiftListCheck.'Site LookUp'.SiteID), \n        'Induction LookUp':LookUp(col_SiteInductions, 'Staff LookUp'.StaffID = shiftListCheck.'Technician GUID' && 'Site LookUp'.SiteID = shiftListCheck.'Site LookUp'.SiteID && 'Induction Status' = \"Completed\"),\n        'Action Status': If(IsBlank(LookUp(col_SiteInductions, 'Staff LookUp'.StaffID = shiftListCheck.'Technician GUID' && 'Site LookUp'.SiteID = shiftListCheck.'Site LookUp'.SiteID && 'Induction Status' = \"Completed\")), \"Pending\", \"Not Required\"),\n        'Action Type':\"Site Induction\", \n        'Action Name':\"Site Induction Form\"\n    }); \n    Collect(col_EngineerActionList, \n    { \n        'Booking LookUp':LookUp(col_Bookings, BookingReference = shiftListCheck.BookingTempID), \n        'Site LookUp':LookUp(col_Sites, SiteID = shiftListCheck.'Site LookUp'.SiteID), \n        //'Induction LookUp':LookUp(col_SiteInductions, 'Staff LookUp'.StaffID = shiftListCheck.'Technician GUID' && 'Site LookUp'.SiteID = shiftListCheck.'Site LookUp'.SiteID && 'Induction Status' = \"Completed\"),\n        'Action Type':\"RAMs\", \n        'Action Name':\"RAMs Form\",\n        'Action Status':If(IsBlank(LookUp(col_RiskAssesments, 'Staff LookUp'.StaffID = shiftListCheck.'Technician GUID' && 'Site LookUp'.SiteID = shiftListCheck.'Site LookUp'.SiteID && 'Assesment Date' = dateEngineerSelectedView.SelectedDate)), \"Pending\", If(IsBlank(LookUp(col_RiskAssesments, 'Staff LookUp'.StaffID = shiftListCheck.'Technician GUID' && 'Site LookUp'.SiteID = shiftListCheck.'Site LookUp'.SiteID && 'Assesment Date' = dateEngineerSelectedView.SelectedDate, 'Assesment Status' = \"Completed\")), \"Drafted\", \"Completed\")),\n        'RAMS LookUp':LookUp(col_RiskAssesments, 'Staff LookUp'.StaffID = shiftListCheck.'Technician GUID' && 'Site LookUp'.SiteID = shiftListCheck.'Site LookUp'.SiteID && 'Assesment Date' = dateEngineerSelectedView.SelectedDate)\n    }); \n    );\n    \n\n    ClearCollect(col_ShiftListCheck, AddColumns(RenameColumns(ShowColumns(Filter(col_ShiftList, 'Technician GUID' = varStaffViewID.StaffID, 'Shift Date' = dateEngineerSelectedView.SelectedDate, 'Shift Type' = \"Booking\"), 'Shift Type', BookingID, 'Shift Date', 'Technician GUID', 'Shift ID'), BookingID, BookingTempID), 'Site LookUp', LookUp(col_BookingsSchedule, BookingID = BookingTempID, 'Site LookUp'))); \n\n\n//Booking Elements for each Shift\nClearCollect(col_BookingElementCheck, Filter(col_BookingElement, 'Shift ID' in col_ShiftListCheck.'Shift ID'));\n\nForAll(col_BookingElementCheck As itemBookingElement, \nCollect(col_EngineerActionList, \n    { \n        'Booking LookUp':LookUp(col_Bookings, BookingReference = itemBookingElement.BookingID), \n        'Site LookUp':LookUp(col_Sites, SiteID = itemBookingElement.'Site LookUp'.SiteID), \n        //'Induction LookUp':LookUp(col_SiteInductions, 'Staff LookUp'.StaffID = shiftListCheck.'Technician GUID' && 'Site LookUp'.SiteID = shiftListCheck.'Site LookUp'.SiteID && 'Induction Status' = \"Completed\"),\n        'Action Status': \"Pending\",\n        'Action Type':\"Service\", \n        'Action Name':\"Service\", \n        'Element LookUp':itemBookingElement.'Element LookUp', \n        'Booking Element LookUp':LookUp(col_BookingElement, BookingElementID = itemBookingElement.BookingElementID), \n        'Shift ID':itemBookingElement.'Shift ID'\n    }));\n\n\n//Non Booking Shifts\nClearCollect(col_ShiftListNonBookingCheck, RenameColumns(ShowColumns(Filter(col_ShiftList, 'Technician GUID' = varStaffViewID.StaffID, 'Shift Date' = dateEngineerSelectedView.SelectedDate, 'Shift Type' <> \"Booking\"), 'Shift Type', BookingID, 'Shift Date', 'Technician GUID', 'Shift ID'), BookingID, BookingTempID));\n\nForAll(col_ShiftListNonBookingCheck As itemNonBookingItem, \nCollect(col_EngineerActionList,\n{ \n    'Action Status': \"Pending\", \n    'Action Type':\"Misc\", \n    'Action Name':itemNonBookingItem.'Shift Type', \n    'Shift ID':itemNonBookingItem.'Shift ID'\n}));\n\n\n\n"
                  Text: ="Action List"
