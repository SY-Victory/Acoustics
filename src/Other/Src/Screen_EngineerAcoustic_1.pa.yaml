                  - SiteDataReadings1:
                      Control: CodeComponent
                      ComponentName: sy_StromaAcoustic.SiteDataReadings
                      Properties:
                        Height: =630
                        OnChange: |-
                          =UpdateContext({varPartitionJson: Self.PartitionsJSON})
                        PartitionsJSON: "=JSON(\n    ForAll(\n        Sort(col_AcousticPartitions,PartitionLabel) As p,\n        With({ps: LookUp(col_PerformanceStandards, StandardName = Text(ParseJSON(ThisItem.'Test Info').TargetStandard)).Profile},\n        {\n            id: Text(p.PartitionID),\n            partitionLabel: p.PartitionLabel,\n            testReportNumber: If(IsBlank(p.TestReportNumber), \"\", p.TestReportNumber),\n            testCategory: p.TestCategory,\n            partitionType: p.PartitionType,\n            sourceRoom: p.SourceRoom,\n            sourceRoomVolume: p.SourceRoomVolume,\n            receiverRoom: p.ReceiverRoom,\n            receiverRoomVolume: p.ReceiverRoomVolume,\n            separatingElementArea: p.SeparatingElementArea,\n            metricToReport: If(p.PartitionType = \"Airborne\",\n                First(Table(ps.airborneOutputMetrics)),\n                First(Table(ps.impactOutputMetrics))\n                ),\n            standardisedRT: Value(ps.standardisedRT),\n            requiredValue: If(IsBlank(p.RequiredValue), 0, p.RequiredValue),\n            L1: p.L1,\n            L2: p.L2,\n            B2: p.B2,\n            T2: p.T2,\n            sixDbOk: If(IsBlank(p.SixDbRuleMet), false, p.SixDbRuleMet),\n            bgCorr: If(IsBlank(p.BackgroundCorrectionApplied), false, p.BackgroundCorrectionApplied),\n            fitToTest: If(IsBlank(p.FitToTest), false, p.FitToTest),\n            provisionalResult: If(IsBlank(p.ProvisionalResult), \"\", p.ProvisionalResult),\n            verifiedResult: If(IsBlank(p.VerifiedResult), \"\", p.VerifiedResult),\n            comments: If(IsBlank(p.Comments), \"\", p.Comments)\n        }\n        )\n        \n    )\n)"
                        TestInfoJSON: =Text(varActionRecord.'Test Info')
