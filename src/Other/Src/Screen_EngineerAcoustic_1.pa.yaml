                              - lblAvgAP50_2:
                                  Control: Label@2.5.1
                                  Properties:
                                    Height: =25
                                    Text: |-
                                      =With(
                                          {
                                              wthD: LookUp(col_TestRun, RunSelected = true && Text(TestMetaData.TestType) = "Depressurisation").SummaryResults.Results,
                                              wthP: LookUp(col_TestRun, RunSelected = true && Text(TestMetaData.TestType) = "Pressurisation").SummaryResults.Results
