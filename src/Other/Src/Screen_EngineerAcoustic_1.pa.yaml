            - iconPageHeaderIcon_31:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  Height: =35
                  Icon: =Icon.Home
                  OnSelect: |-
                    =Set(varTestViewMode, false);
                    Navigate(Screen_EngineerHome);
                  PaddingBottom: =5
                  PaddingTop: =5
                  Width: =35
                  X: =8
                  Y: =10
            - iconPageHeaderRefresh_28:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  Height: =35
                  Icon: =Icon.Sync
                  OnSelect: |-
                    =//col_SelectedSets
                    // ═══════════════════════════════════════
                    // SYNC — Push queued offline records to Dataverse
                    // ═══════════════════════════════════════
                    If(
                        Connection.Connected && CountRows(Filter(col_OfflineTests, Synced = false)) > 0,

                        ForAll(
                            Filter(col_OfflineTests, Synced = false) As offTest,

                            // Create the BESA_Tests record
                            With(
                        {
                            _be: LookUp(
                                BESA_BookingElements,
                                BESA_BookingElement = GUID(offTest.BookingElementID)
                            )
                        },
                        With(
                            {
                                _booking: _be.'Booking LookUp',
                                _site: _be.'Site LookUp',
                                _shift: LookUp(BESA_Shifts, 'Shift ID' = offTest.ShiftID)
                            },
                            With(
                                {
                                    _client: _booking.'Client LookUp',
                                    _newTest: Patch(
                                        BESA_Tests,
                                        Defaults(BESA_Tests),
                                        {
                                            'Booking Element LookUp': _be,
                                            'Shift LookUp': _shift,
                                            'Client LookUp': _booking.'Client LookUp',
                                            'Booking LookUp': _booking,
                                            'Site LookUp': _site,
                                            'Test Status': offTest.TestStatus,
                                            'Section Status': offTest.SectionStatus,
                                            'Test Info': offTest.TestInfo,
                                            'Test Number': 1
                                        }
                                    )
                                },

                                // Sync Runs for this test
                                ForAll(
                                    Filter(col_OfflineTestRuns, LocalTestID = offTest.LocalID && RunType = "Run") As offRun,

                                    With(
                                        {
                                            _newRun: Patch(
                                                BESA_TestRuns,
                                                Defaults(BESA_TestRuns),
                                                {
                                                    'Test LookUp': _newTest,
                                                    'Test Name': offRun.TestName,
                                                    'Run Date': offRun.RunDate,
                                                    Engineer: offRun.Engineer,
                                                    'Test Status': offRun.TestStatus,
                                                    'Run Meta Data': offRun.RunMetaData,
                                                    'Run Type': "Run"
                                                }
                                            )
                                        },

                                        // Sync Partitions under this run
                                        ForAll(
                                            Filter(col_OfflineTestRuns, ParentRunGUID = offRun.LocalRunID) As offPart,
                                            Patch(
                                                BESA_TestRuns,
                                                Defaults(BESA_TestRuns),
                                                {
                                                    'Test LookUp': _newTest,
                                                    'Parent Run GUID': Text(_newRun.BESA_TestRun),
                                                    'Run Type': "Partition",
                                                    'Test No': offPart.TestNo,
                                                    'Test Name': offPart.TestName,
                                                    'Test Status': offPart.TestStatus,
                                                    PartitionData: offPart.PartitionData,
                                                    TestMetaData: offPart.TestMetaData,
                                                    PreTestData: offPart.PreTestData
                                                }
                                            )))
                                        )
                                    )
                                );

                                // Mark as synced
                                Patch(col_OfflineTests, offTest, {Synced: true})
                            )
                        );

                        // Mark all runs as synced
                        ForAll(
                            Filter(col_OfflineTestRuns, Synced = false) As r,
                            Patch(col_OfflineTestRuns, r, {Synced: true})
                        );

                        SaveData(col_OfflineTests, "col_OfflineTests_offline");
                        SaveData(col_OfflineTestRuns, "col_OfflineTestRuns_offline");

                        Notify("Offline data synced to Dataverse", NotificationType.Success)
                    );
                    // Sync

                    If(
                        Connection.Connected && CountRows(colPartition) > 0,
                        ForAll(
                            colPartition As rec,
                            Patch(
                                BESA_TestRuns,
                                LookUp(
                                    BESA_TestRuns,
                                    BESA_TestRun = LookUp(
                                        col_AcousticPartitions,
                                        Text(PartitionID) = rec.id
                                    ).PartitionID
                                ),
                                {
                                    PartitionData: JSON(
                                        {
                                            PartitionLabel: rec.partitionLabel,
                                            TestReportNumber: rec.testReportNumber,
                                            TestCategory: rec.testCategory,
                                            PartitionType: rec.partitionType,
                                            ConstructionType: rec.constructionType,
                                            SourceRoom: rec.sourceRoom,
                                            SourceRoomVolume: rec.sourceRoomVolume,
                                            ReceiverRoom: rec.receiverRoom,
                                            ReceiverRoomVolume: rec.receiverRoomVolume,
                                            SeparatingElementArea: rec.separatingElementArea,
                                            MetricToReport: rec.metricToReport,
                                            StandardisedRT: rec.standardisedRT,
                                            RequiredValue: rec.requiredValue,
                                            L1: rec.L1,
                                            L2: rec.L2,
                                            B2: rec.B2,
                                            T2: rec.T2,
                                            SixDbOk: rec.sixDbOk,
                                            BgCorr: rec.bgCorr,
                                            FitToTest: rec.fitToTest,
                                            ProvisionalResult: rec.provisionalResult,
                                            VerifiedResult: rec.verifiedResult,
                                            Comments: rec.comments
                                        }
                                    ),
                                    TestMetaData: JSON(
                                        {
                                            SixDbRuleMet: rec.sixDbOk,
                                            BackgroundCorrectionApplied: rec.bgCorr,
                                            ResultLimitedByBackground: false,
                                            SmallRoomUsed: false
                                        }
                                    ),
                                    SummaryResults: JSON(
                                        {
                                            ProvisionalResult: rec.provisionalResult,
                                            VerifiedResult: rec.verifiedResult
                                        }
                                    )
                                }
                            )
                        );
                        Clear(colPartition);
                        ClearData("colPartition_offline");
                        Notify("Synced offline data to Dataverse", NotificationType.Success)
                    );
                  PaddingBottom: =7
                  PaddingTop: =7
                  Width: =35
                  X: =43
                  Y: =10
