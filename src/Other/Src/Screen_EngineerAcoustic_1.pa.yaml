      - TabList3_8:
          Control: TabList@2.2.31
          Properties:
            BasePaletteColor: =fxPrimary
            DefaultSelectedItems: =[col_PermTestMenu]
            Height: =46
            Items: =Sort(col_AcousticTestMenu,Sort)
            OnChange: =
            OnSelect: |+
              =Set(
                  varTestMenu,
                  Self.Selected
              );
              If(
                  Self.Selected.MenuCategory = "Test Data",
                  Set(
                      varTestSubMenu,
                      "Equipment"
                  )
              );
              Switch(
                  Self.Selected.MenuCategory,
                  "Test Details",
                  UpdateContext({varEngineer:LookUp(BESA_EngineerLists,BESA_EngineerList = varStaffViewID.BESA_EngineerList)});
                  With(
                      {
                          _engineerEquipment: If(
                              !IsBlank(varEngineer.'Equipment Set'),
                              ParseJSON(varEngineer.'Equipment Set'),
                              Blank()
                          )
                      },
                      ClearCollect(
                          col_AcousticEquipment,
                          {
                              Sort: 1,
                              EquipmentType: "Sound Level Meter",
                              SelectedValue: If(
                                  !IsBlank(Text(varTestInfo.SoundLevelMeter)) && Text(varTestInfo.SoundLevelMeter) <> "",
                                  Text(varTestInfo.SoundLevelMeter),
                                  !IsBlank(_engineerEquipment),
                                  Text(_engineerEquipment.SoundLevelMeter),
                                  ""
                              )
                          },
                          {
                              Sort: 2,
                              EquipmentType: "Calibrator",
                              SelectedValue: If(
                                  !IsBlank(Text(varTestInfo.Calibrator)) && Text(varTestInfo.Calibrator) <> "",
                                  Text(varTestInfo.Calibrator),
                                  !IsBlank(_engineerEquipment),
                                  Text(_engineerEquipment.Calibrator),
                                  ""
                              )
                          },
                          {
                              Sort: 3,
                              EquipmentType: "Sound Source",
                              SelectedValue: If(
                                  !IsBlank(Text(varTestInfo.SoundSource)) && Text(varTestInfo.SoundSource) <> "",
                                  Text(varTestInfo.SoundSource),
                                  !IsBlank(_engineerEquipment),
                                  Text(_engineerEquipment.SoundSource),
                                  ""
                              )
                          },
                          {
                              Sort: 4,
                              EquipmentType: "Tapping Machine",
                              SelectedValue: If(
                                  !IsBlank(Text(varTestInfo.TappingMachine)) && Text(varTestInfo.TappingMachine) <> "",
                                  Text(varTestInfo.TappingMachine),
                                  !IsBlank(_engineerEquipment),
                                  Text(_engineerEquipment.TappingMachine),
                                  ""
                              )
                          }
                      )
                  );
                  ,
                  "Partition",
                  ClearCollect(col_PartitionJson, 
                      ForAll(
                          col_AcousticPartitions As p,
                          {
                              id: Text(p.PartitionID),
                              partitionLabel: p.PartitionLabel,
                              testCategory: p.TestCategory,
                              sourceRoom: p.SourceRoom,
                              sourceRoomVolume: p.SourceRoomVolume,
                              receiverRoom: p.ReceiverRoom,
                              receiverRoomVolume: p.ReceiverRoomVolume,
                              L1: p.L1,
                              L2: p.L2,
                              B2: p.B2,
                              T2: p.T2,
                              sixDbOk: If(IsBlank(p.SixDbRuleMet), false, p.SixDbRuleMet),
                              bgCorr: If(IsBlank(p.BackgroundCorrectionApplied), false, p.BackgroundCorrectionApplied),
                              fitToTest: If(IsBlank(p.FitToTest), false, p.FitToTest),
                              provisionalResult: If(IsBlank(p.ProvisionalResult), "", p.ProvisionalResult),
                              verifiedResult: If(IsBlank(p.VerifiedResult), "", p.VerifiedResult),
                              requiredValue: If(IsBlank(p.RequiredValue), 0, p.RequiredValue),
                              comments: If(IsBlank(p.Comments), "", p.Comments)
                          }
                      )
                  );
                  ClearCollect(
                      col_TestRunsAndPartitions,
                      AddColumns(
                          col_AcousticTestRuns,
                          IsPartition, false,
                          StatusIcon, Switch(TestStatus, "Complete", "✓", "In Progress", "🔄", "⚠️"),
                          CompletedCount, CountRows(Filter(col_AcousticPartitions, TestRunID = TestRunID && TestStatus = "Complete")),
                          TotalCount, CountRows(Filter(col_AcousticPartitions, TestRunID = TestRunID)),
                          DisplayResult, "",
                          DisplayRequired, "",
                          DisplayDeviations, "",
                          PartitionNo, 0
                      )
                  );

                  Collect(
                      col_TestRunsAndPartitions,
                      AddColumns(
                          col_AcousticPartitions,
                          IsPartition, true,
                          StatusIcon, Switch(TestStatus, "Complete", "✓", "In Progress", "🔄", "⚠️"),
                          CompletedCount, 0,
                          TotalCount, 0,
                          DisplayResult,
                          If(
                              TestCategory = "Impact",
                              If(!IsBlank(LnTw), Text(LnTw) & " dB", "—"),
                              If(!IsBlank(DnTwPlusCtr), Text(DnTwPlusCtr) & " dB", "—")
                          ),
                          DisplayRequired,
                          If(
                              TestCategory = "Impact",
                              "≤" & Text(RequiredValue) & " dB",
                              "≥" & Text(RequiredValue) & " dB"
                          ),
                          DisplayDeviations,
                          If(!SixDbRuleMet, "[4]", "")
                              & If(ResultLimitedByBackground, " ≥/≤", "")
                      )
                  ),
                  "Report & Export",
                  ClearCollect(
                      col_AirborneResults,
                      ForAll(
                          SortByColumns(
                              Filter(col_AcousticPartitions, TestCategory = "Airborne"),
                              "PartitionNo",
                              SortOrder.Ascending
                          ) As part,
                          With(
                              {
                                  _parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID)
                              },
                              {
                                  Sort: part.PartitionNo,
                                  DateOfTest: Text(DateValue(_parentRun.RunDate), "dd/mm/yyyy"),
                                  TestReportNumber: Text(ParseJSON(
                                      LookUp(BESA_TestRuns, BESA_TestRun = part.PartitionID).PartitionData
                                  ).TestReportNumber),
                                  SourceRoom: part.SourceRoom,
                                  ReceiverRoom: part.ReceiverRoom,
                                  PartitionType: part.PartitionType,
                                  Measured: If(
                                      !IsBlank(part.DnTwPlusCtr),
                                      Text(part.DnTwPlusCtr)
                                          & If(!part.SixDbRuleMet, "[4]", "")
                                          & If(part.ResultLimitedByBackground, "≥", ""),
                                      "—"
                                  ),
                                  MeasuredValue: If(!IsBlank(part.DnTwPlusCtr), part.DnTwPlusCtr, 0),
                                  Required: "≥" & Text(part.RequiredValue),
                                  RequiredValue: part.RequiredValue,
                                  PassFail: part.PassFail,
                                  RunLabel: _parentRun.RunLabel,
                                  Engineer: _parentRun.Engineer
                              }
                          )
                      )
                  );
                  ClearCollect(
                      col_ImpactResults,
                      ForAll(
                          SortByColumns(
                              Filter(col_AcousticPartitions, TestCategory = "Impact"),
                              "PartitionNo",
                              SortOrder.Ascending
                          ) As part,
                          With(
                              {
                                  _parentRun: LookUp(col_AcousticTestRuns, TestRunID = part.TestRunID)
                              },
                              {
                                  Sort: part.PartitionNo,
                                  DateOfTest: Text(DateValue(_parentRun.RunDate), "dd/mm/yyyy"),
                                  TestReportNumber: Text(ParseJSON(
                                      LookUp(BESA_TestRuns, BESA_TestRun = part.PartitionID).PartitionData
                                  ).TestReportNumber),
                                  SourceRoom: part.SourceRoom,
                                  ReceiverRoom: part.ReceiverRoom,
                                  Measured: If(
                                      !IsBlank(part.LnTw),
                                      Text(part.LnTw)
                                          & If(part.ResultLimitedByBackground, "≤", ""),
                                      "—"
                                  ),
                                  MeasuredValue: If(!IsBlank(part.LnTw), part.LnTw, 0),
                                  Required: "≤" & Text(part.RequiredValue),
                                  RequiredValue: part.RequiredValue,
                                  PassFail: part.PassFail,
                                  RunLabel: _parentRun.RunLabel,
                                  Engineer: _parentRun.Engineer
                              }
                          )
                      )
                  );
              );

              ClearCollect(
                  col_AcousticDisplayMenu,
                  {
                      MenuLabel: "Summary",
                      MenuCategory: "Summary",
