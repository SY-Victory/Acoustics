       {Value: \"Norsonic - Nor1225\"},\n            {Value: \"Svantek - SV22\"}\n        ),\n        calibrator: Table(\n            {Value: \"Bruel & Kjaer - 4231\"},\n            {Value: \"Norsonic - Nor1251\"},\n            {Value: \"Svantek - SV33\"}\n        ),\n        soundSource: Table(\n            {Value: \"Pulse PLS-12PA\"},\n            {Value: \"Norsonic - Nor276\"},\n            {Value: \"JBL EON615\"},\n            {Value: \"Look Line D-412\"},\n            {Value: \"Bruel & Kjaer - 4292-L\"}\n        ),\n        tappingMachine: Table(\n            {Value: \"Norsonic - Nor277\"},\n            {Value: \"Norsonic - Nor279\"},\n            {Value: \"Bruel & Kjaer - 3207\"},\n            {Value: \"Look Line - EM50\"}\n        ),\n        testers: Table({Value: \"\"}),\n        domesticCommercial: Table(\n            {Value: \"Domestic\"},\n            {Value: \"Commercial\"}\n        ),\n        extentOfTest: Table(\n            {Value: \"Pre-Completion\"},\n            {Value: \"Post-Completion\"},\n            {Value: \"Diagnostic\"},\n            {Value: \"Remedial Re-Test\"}\n        ),\n        typeOfTest: Table(\n            {Value: \"Airborne\"},\n            {Value: \"Impact\"},\n            {Value: \"Airborne & Impact\"}\n        ),\n        samplingMethod: Table(\n            {Value: \"Manually scanned\"},\n            {Value: \"Fixed microphone positions\"}\n        ),\n        reverbMethod: Table(\n            {Value: \"Interrupted\"},\n            {Value: \"Integrated impulse response\"}\n        ),\n        evalRange: Table(\n            {Value: \"T20\"},\n            {Value: \"T30\"}\n        ),\n        testConditions: Table(\n            \n            {Value: \"Unfurnished\"},\n            {Value: \"All test rooms essentially complete and unfurnished. All doors and windows shut including ventilators where applicable. All cupboard/en-suite doors open where applicable.\"}\n        ),\n        floorFinish: Table(\n            {Value: \"Soft covering (carpet)\"},\n            {Value: \"Hard covering (tile/laminate/vinyl)\"},\n            {Value: \"Bare screed/concrete\"},\n            {Value: \"Engineered timber\"},\n            {Value: \"As appropriate according to standard\"},\n            {Value: \"Vinyl\"}\n        ),\n        sensitivity: Table(\n            {Value: \"No significant variation in sensitivity levels observed over test period\"},\n            {Value: \"Significant variation observed - see notes\"},\n            {Value: \"Within ±0.3 dB\"}\n        ),\n        freqStart: Table(\n            {Value: \"50\"},\n            {Value: \"100\"}\n        ),\n        freqEnd: Table(\n            {Value: \"3150\"},\n            {Value: \"5000\"}\n        ),\n        avgTime: Table(\n            {Value: \"6\"},\n            {Value: \"15\"},\n            {Value: \"30\"}\n        )\n    }\n)"
