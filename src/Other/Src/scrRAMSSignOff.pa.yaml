Screens:
  scrRAMSSignOff:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - lblScreenTitle:
          Control: Text@0.0.51
          Properties:
            Align: ='TextCanvas.Align'.Start
            FontColor: =RGBA(255, 255, 255, 1)
            Height: =56
            Size: =18
            Text: ="RAMS Sign-Off"
            VerticalAlign: =VerticalAlign.Middle
            Weight: ='TextCanvas.Weight'.Semibold
            Width: =600
            X: =114
      - rectHeaderBg:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(7, 110, 108, 1)
            Height: =56
            Width: =Parent.Width
      - rectLeftPanel:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 0.12)
            BorderThickness: =1
            Fill: =RGBA(255, 255, 255, 1)
            Height: =690
            Width: =660
            X: =16
            Y: =68
      - lblElementsHeader:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =24
            Size: =11
            Text: ="Elements being signed off:"
            Width: =500
            X: =28
            Y: =80
      - lblElementCount:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(100, 100, 100, 1)
            Font: =Font.'Open Sans'
            Height: =24
            Size: =10
            Text: =CountRows(col_SelectedSignOffElements) & " element(s)"
            Width: =160
            X: =508
            Y: =80
      - galSelectedElements:
          Control: Gallery@2.15.0
          Variant: Horizontal
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Height: =72
            Items: =col_SelectedSignOffElements
            TemplatePadding: =6
            TemplateSize: =160
            Width: =632
            X: =28
            Y: =106
          Children:
            - rectElementChip:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 0.3)
                  BorderThickness: =1
                  Fill: =RGBA(232, 240, 254, 1)
                  Height: =56
                  Width: =154
                  Y: =4
            - iconElement:
                Control: Classic/Icon@2.5.0
                Properties:
                  Color: =RGBA(0, 18, 107, 1)
                  Height: =22
                  Icon: =Icon.Location
                  Width: =22
                  X: =6
                  Y: =10
            - lblElementName:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Color: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =36
                  Size: =9
                  Text: =ThisItem.ElementName
                  Width: =122
                  X: =30
                  Y: =8
      - rectDividerElements:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 18, 107, 0.12)
            Height: =1
            Width: =624
            X: =28
            Y: =186
      - lblRAMSDocsHeader:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =24
            Size: =11
            Text: ="RAMS Documents - Select to View Each:"
            Width: =500
            X: =28
            Y: =194
      - galRAMSDocs:
          Control: Gallery@2.15.0
          Variant: Horizontal
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Height: =108
            Items: =col_RAMSDocuments
            TemplatePadding: =6
            TemplateSize: =150
            Width: =632
            X: =28
            Y: =220
          Children:
            - rectRAMSCard_1:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 0.25)
                  BorderThickness: =1
                  Fill: =RGBA(232, 240, 254, 1)
                  Height: =90
                  Width: =138
                  Y: =2
            - iconRAMSDoc_1:
                Control: Classic/Icon@2.5.0
                Properties:
                  Color: =RGBA(0, 18, 107, 1)
                  Height: =26
                  Icon: =Icon.Document
                  Width: =26
                  X: =56
                  Y: =8
            - lblRAMSDocName_1:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =30
                  Size: =9
                  Text: =ThisItem.'Document ID'
                  Width: =130
                  X: =4
                  Y: =36
            - btnViewRAMSDoc_1:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(0, 18, 107, 1)
                  Height: =22
                  OnSelect: =Launch(ThisItem.'Document Link')
                  Text: ="View"
                  Width: =90
                  X: =24
                  Y: =68
      - rectDividerDocs:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 18, 107, 0.12)
            Height: =1
            Width: =624
            X: =28
            Y: =336
      - lblJobInfoTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =22
            Size: =11
            Text: ="Job Details"
            Width: =300
            X: =28
            Y: =344
      - lblJobService:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(100, 100, 100, 1)
            Font: =Font.'Open Sans'
            Height: =22
            Size: =10
            Text: ="Service(s):"
            Width: =110
            X: =28
            Y: =370
      - lblJobServiceVal:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(30, 30, 30, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =110
            Overflow: =Overflow.Scroll
            Size: =10
            Text: =varSignOffActivity
            Width: =490
            X: =144
            Y: =370
      - lblJobAction:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(100, 100, 100, 1)
            Font: =Font.'Open Sans'
            Height: =22
            Size: =10
            Text: ="Action:"
            Width: =110
            X: =28
            Y: =480
      - lblJobActionVal:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(30, 30, 30, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =22
            Size: =10
            Text: =varActionRecord.'Action Name'
            Width: =490
            X: =144
            Y: =480
      - rectRightPanel:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 0.12)
            BorderThickness: =1
            Fill: =RGBA(255, 255, 255, 1)
            Height: =690
            Width: =668
            X: =690
            Y: =68
      - lblEngineerHeader:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =24
            Size: =11
            Text: ="Engineer"
            Width: =300
            X: =702
            Y: =80
      - rectEngineerBg:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 0.2)
            BorderThickness: =1
            Fill: =RGBA(232, 240, 254, 1)
            Height: =40
            Width: =640
            X: =702
            Y: =108
      - iconEngineerUser:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 18, 107, 1)
            Height: =28
            Icon: =Icon.Person
            Width: =28
            X: =710
            Y: =114
      - lblEngineerName:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Size: =12
            Text: =User().FullName
            Width: =580
            X: =744
            Y: =108
      - rectDividerEng:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 18, 107, 0.12)
            Height: =1
            Width: =640
            X: =702
            Y: =158
      - lblSignatureSection:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =24
            Size: =11
            Text: ="Signature - Sign to Acknowledge RAMS:"
            Width: =480
            X: =702
            Y: =166
      - rectSigBg:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 0.3)
            BorderThickness: =1
            Fill: =RGBA(255, 255, 255, 1)
            Height: =240
            Width: =640
            X: =702
            Y: =196
      - penRAMSSignOff:
          Control: PenInput@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderThickness: =0
            Height: =240
            Width: =640
            X: =702
            Y: =196
      - rectDividerSig:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 18, 107, 0.12)
            Height: =1
            Width: =640
            X: =702
            Y: =446
      - rectDividerSubmit:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 18, 107, 0.12)
            Height: =1
            Width: =640
            X: =702
            Y: =520
      - lblSubmitNote:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(140, 140, 140, 1)
            Font: =Font.'Open Sans'
            Height: =36
            Size: =9
            Text: ="Submitting will generate a signed RAMS document and update the status of all selected elements."
            Width: =640
            X: =702
            Y: =528
      - lblActivityHeader:
          Control: Text@0.0.51
          Properties:
            Align: ='TextCanvas.Align'.End
            FontColor: =RGBA(255, 255, 255, 0.75)
            Height: =56
            Size: =11
            Text: =varSignOffActivity
            VerticalAlign: =VerticalAlign.Middle
            Weight: ='TextCanvas.Weight'.Medium
            Width: =500
            X: =852
      - checkConfirm:
          Control: CheckBox@0.0.30
          Properties:
            FontItalic: =true
            Label: ="I confirm I have reviewed all RAMS documents and acknowledge the contents for the elements listed above"
            Width: =630
            X: =702
            Y: =454
      - btnSubmitRAMSSignOff:
          Control: Button@0.0.45
          Properties:
            BasePaletteColor: =RGBA(8, 222, 8, 1)
            DisplayMode: |-
              =If(
                  !checkConfirm.Checked || IsBlank(penRAMSSignOff.Image),
                  DisplayMode.Disabled,
                  DisplayMode.Edit
              )
            Height: =44
            Icon: ="Send"
            OnSelect: |-
              =Patch(col_EngineerActionList,
                  LookUp(col_EngineerActionList, ActionGUID = varActionRecord.ShiftActionID),
                  {'Action Status': "Complete"});
              Patch(col_ShiftTimeline,
                  LookUp(col_ShiftTimeline, ShiftActionID = varActionRecord.ShiftActionID),
                  {'Action Status': "Complete"});
              Patch(
                  BESA_Shifts,
                  LookUp(BESA_Shifts, BESA_Shift = GUID(varCurrentShiftID)),
                  {'Generate RAMs': true}
              );
              Patch(BESA_Documents,
                  Defaults(BESA_Documents),
                  {
                      'Document Image': penRAMSSignOff.Image,
                      'Direct Related GUID': varCurrentShiftID,
                      'Document Type': "RAMS SignOff"
                  }
              );
              Notify("RAMS Signed off!", NotificationType.Success);
              Reset(checkConfirm);
              Reset(penRAMSSignOff);
              Back()
            Text: ="Submit & Confirm Completion"
            Width: =320
            X: =862
            Y: =580
      - btnCancelScreen:
          Control: Button@0.0.45
          Properties:
            Appearance: ='ButtonCanvas.Appearance'.Secondary
            Height: =44
            OnSelect: |-
              =Reset(checkConfirm);
              Reset(penRAMSSignOff);
              Back()
            Text: ="Cancel"
            Width: =140
            X: =702
            Y: =580
      - btnClearSig:
          Control: Button@0.0.45
          Properties:
            Appearance: ='ButtonCanvas.Appearance'.Secondary
            Height: =26
            OnSelect: =Reset(penRAMSSignOff)
            Text: ="Clear"
            Width: =80
            X: =1262
            Y: =165
      - btnBack:
          Control: Button@0.0.45
          Properties:
            Appearance: ='ButtonCanvas.Appearance'.Secondary
            BasePaletteColor: =RGBA(255, 255, 255, 1)
            Height: =36
            OnSelect: =Back()
            Text: ="< Back"
            Width: =90
            X: =12
            Y: =10
