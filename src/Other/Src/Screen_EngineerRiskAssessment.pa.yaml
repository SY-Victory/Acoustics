                      Properties:
                        Align: ='TextCanvas.Align'.Start
                        FontColor: =RGBA(255, 255, 255, 1)
                        Height: =35
                        Size: =13
                        Text: ="Sign Off"
                        VerticalAlign: =VerticalAlign.Middle
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =300
                        X: =10
                  - lblSignOffCompletedBy_1:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        Size: =11
                        Text: ="Completed by:"
                        X: =10
                        Y: =43
                  - lblSignOffCompletedByVal_1:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        Height: =32
                        Size: =11
                        Text: =varStaffViewID.'Staff Name'
                        Width: =300
                        X: =165
                        Y: =43
                  - lblSignOffDate_1:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        Size: =11
                        Text: |-
                          ="Date: " & Text(Today(), "dd/mm/yyyy")
                        Width: =280
                        X: =475
                        Y: =43
                  - lblRAMSSignatureLbl:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        Size: =11
                        Text: ="Signature:"
                        X: =10
                        Y: =83
                  - penRAMSSignature:
                      Control: PenInput@2.3.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        BorderThickness: =1
                        Height: =120
                        Width: =500
                        X: =165
                        Y: =83
                  - btnRAMSSignatureClear:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Secondary
                        Height: =30
                        OnSelect: =Reset(penRAMSSignature)
                        Text: ="Clear"
                        Width: =80
                        X: =670
                        Y: =83
                  - checkRAMSConfirm_1:
                      Control: CheckBox@0.0.30
                      Properties:
                        FontItalic: =true
                        Height: =30
                        Label: ="I confirm I have reviewed all risks on this form and the information is accurate"
                        Width: =700
                        X: =10
                        Y: =218
                  - btnRAMSSave_1:
                      Control: Button@0.0.45
                      Properties:
                        Align: =Align.Center
                        Appearance: ='ButtonCanvas.Appearance'.Primary
                        BasePaletteColor: =RGBA(8, 222, 8, 1)
                        DisplayMode: =If(!checkRAMSConfirm_1.Checked, DisplayMode.Disabled, DisplayMode.Edit)
                        Icon: ="Save"
                        OnSelect: |-
                          =Patch(BESA_Shifts,
                              LookUp(BESA_Shifts, 'Shift ID' = varCurrentShiftID),
                              {
                                  'Risk Assesment JSON': JSON(
                                      {
                                          JobNumber: varRAMSJobNum,
                                          SiteName: varRAMSSiteName,
                                          ProNumber: varRAMSProNum,
                                          Activity: varRAMSActivities,
                                          Elements: varRAMSElements,
                                          CompletedBy: varStaffViewID.'Staff Name',
                                          CompletedDate: Text(Today(), "dd/mm/yyyy"),
                                          General: col_RAMSTake2General,
                                          Site: col_RAMSTake2Site,
                                          Risks: col_RAMSTake2Risks
                                      }
                                  )
                              }
                          );
                          Patch(BESA_Documents,
                              Defaults(BESA_Documents),
                              {
                                  'Document Image': penRAMSSignature.Image,
                                  'Direct Related GUID': varActionRecord.'Shift ID', 
                                  'Document Type': "Risk Assessment" //& varRAMSJobNum & " - " & Text(Today(), "dd/mm/yyyy")
                              }
                          );
                          Patch(col_EngineerActionList,
                              LookUp(col_EngineerActionList, ActionGUID = varActionRecord.ActionGUID),
                              {'Action Status': "Completed"}
                          );
                          Patch(col_ShiftTimeline,
                              LookUp(col_ShiftTimeline, ShiftActionID = varActionRecord.ActionGUID),
                              {'Action Status': "Completed"}
                          );
                          Reset(checkRAMSConfirm_1);
                          Reset(penRAMSSignature);
                          Back()
                        Text: ="Save RAMS Take 2"
                        Width: =200
                        X: =760
                        Y: =216
