            {ID: 6, Risk: "Excessive dust", Answer: "N/A", Comments: ""},
            {ID: 7, Risk: "Excessive noise", Answer: "N/A", Comments: ""},
            {ID: 8, Risk: "Poor Lighting", Answer: "N/A", Comments: ""},
            {ID: 9, Risk: "Exposed utilities", Answer: "N/A", Comments: ""},
            {ID: 10, Risk: "Confined Spaces", Answer: "N/A", Comments: ""},
            {ID: 11, Risk: "Poor Housekeeping", Answer: "N/A", Comments: ""},
            {ID: 12, Risk: "Extreme weather (Ice, High Temps, High Winds)", Answer: "N/A", Comments: ""},
            {ID: 13, Risk: "Poor Access", Answer: "N/A", Comments: ""},
            {ID: 14, Risk: "Other trades working in the area", Answer: "N/A", Comments: ""},
            {ID: 15, Risk: "Overhead works (cranes, roofing, scaffold)", Answer: "N/A", Comments: ""},
