                  OnSelect: "=/*Patch(col_Notes,Defaults(col_Notes),\n{\n    NotesID: GUID(),\n    Name:Text(Now(),\"dd/mm/yy\")&\"-\"&User().FullName,\n    'Note Type':varNoteView, \n    'Created On':Now(), \n    'Created By': User().EntraObjectId\n}\n);\n*/\n\nPatch(\n    col_Notes,\n    Defaults(col_Notes),\n    {\n        NotesID: GUID(),\n        //'Note Text': txtNoteInput.Text,\n        'Note Type': varNoteView,\n        'Order LookUp': Switch(\n            varNoteView,\n            \"Order\", varNoteOpenOrder,\n            \"Booking\", If(!IsBlank(varNoteOpenBooking), varNoteOpenOrder, Blank()),\n    \n            Blank()\n        ),\n        'Booking LookUp': Switch(\n            varNoteView,\n            \"Booking\", varNoteOpenBooking,\n            \n            Blank()\n        ),\n        'Site LookUp': Blank(),\n        /*Switch(\n            varNoteView,\n            \"Site\", varNoteOpenSite,\n            Blank()\n            */\n        'Envelope LookUp':Switch(\n            varNoteView,\n            \"Envelope\", varNoteOpenEnvelope,\n           \n            Blank()\n        ),\n        'Created On': Now(),\n        'Created By': User().EntraObjectId\n    }\n)\n"
