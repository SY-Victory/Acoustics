ComponentDefinitions:
  component_SettingsMenu:
    DefinitionType: CanvasComponent
    AccessAppScope: true
    Properties:
      Fill: =RGBA(7, 110, 108, 0.75)
      Height: =768
      Width: =200
    Children:
      - gallery_colMenu_1:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Items: =col_SettingsMenu
            TemplateSize: =35
            Width: =Parent.Width
            Y: =135
          Children:
            - Icon1_1:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =If(varActiveScreen = ThisItem.Screen, RGBA(255, 255, 255, 1), RGBA(255, 255, 255, 0.5))
                  Height: =30
                  Icon: =ThisItem.MenuIcon
                  OnSelect: |-
                    =Set(varActiveScreen, ThisItem.Screen);
                    Navigate(ThisItem.Screen);
                  PaddingBottom: =3
                  PaddingTop: =3
                  Tooltip: =ThisItem.MenuLabel
                  Width: =30
                  Y: =3
            - Label1:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =If(varActiveScreen = ThisItem.Screen, RGBA(255, 255, 255, 1), RGBA(255, 255, 255, 0.5))
                  Font: =Font.'Open Sans'
                  Height: =35
                  OnSelect: =Select(Parent)
                  Size: =11
                  Text: =ThisItem.MenuLabel
                  Width: =155
                  X: =35
            - Button1:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(0, 0, 0, 0)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(0, 0, 0, 0)
                  Font: =Font.'Open Sans'
                  Height: =35
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =RGBA(237, 237, 237, 0.46)
                  OnSelect: |-
                    =Set(varActiveScreen, ThisItem.Screen);
                    Navigate(ThisItem.Screen);
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Size: =0
                  Text: =
                  Width: =190
                  Y: =1
